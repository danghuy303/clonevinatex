export default "<div class=\"modal-header\">\n    <h5 class=\"modal-title\">{{opt==='add'?'Thêm mới':'Cập nhật'}} thửa đất</h5>\n    <button *ngIf=\"false\" type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\n        <span aria-hidden=\"true\">&times;</span>\n    </button>\n    <button pButton pRipple type=\"button\" icon=\"pi pi-question\" class=\"p-button-rounded p-button-text\" (click)=\"taiHDSD()\"></button>\n</div>\n<div class=\"modal-body\">\n    <p-tabView>\n        <p-tabPanel header=\"Thông tin chung\">\n            <div class=\"p-d-flex p-flex-column p-flex-md-row\" *ngIf=\"opt!=='add'\">\n                <div *ngFor=\"let cap of capQuanLy\" class=\"p-field-checkbox p-mr-3\">\n                    <p-radioButton inputId=\"cap.value\" name=\"cap.value\" [value]=\"cap.value\"\n                        [(ngModel)]=\"item.TaiSanDat.MaHanhDong\"></p-radioButton>\n                    <label style=\"margin-bottom:0px\" [for]=\"cap.value\">{{cap.label}}</label>\n                </div>\n            </div>\n            <app-crud-thong-tin-chung [(item)]=\"item\" [opt]=\"opt\"></app-crud-thong-tin-chung>\n        </p-tabPanel>\n        <p-tabPanel header=\"Tài sản trên đất\">\n            <app-crud-tai-san-tren-dat [(TaiSanDatNhas)]=\"item.TaiSanDatNhas\"></app-crud-tai-san-tren-dat>\n        </p-tabPanel>\n        <p-tabPanel header=\"Ảnh hiện trạng\">\n            <app-crud-so-do [(BanVe)]=\"item.SoDos\"></app-crud-so-do>\n        </p-tabPanel>\n        <p-tabPanel header=\"Tình trạng pháp lý\">\n            <app-crud-tinh-trang-phap-ly [(BienDongs)]=item.BienDongs></app-crud-tinh-trang-phap-ly>\n        </p-tabPanel>\n        <p-tabPanel header=\"Hồ sơ - văn bản pháp quy\">\n            <app-crud-hsvb-phap-quy [(TepDinhKems)]=\"item.HoSos\"></app-crud-hsvb-phap-quy>\n        </p-tabPanel>\n    </p-tabView>\n</div>\n<div class=\"modal-footer\">\n    <button pButton pRipple label=\"Lưu\" icon=\"pi pi-plus\" class=\"p-button-sm p-mr-2\" (click)=\"accept()\"></button>\n    <button pButton pRipple label=\"Lưu và Thêm mới\" icon=\"pi pi-plus\" class=\"p-button-sm  p-mr-2\"\n        (click)=\"accept('more')\"></button>\n    <button pButton pRipple label=\"Thoát\" icon=\"pi pi-trash\"\n        class=\"p-button-sm p-button-outlined p-button-secondary p-mr-2\" (click)=\"activeModal.dismiss()\"></button>\n</div>\n<!-- <div class=\"p-dialog-footer\" style=\"padding-bottom: 0px;padding-right: 0px;\">\n    <button pButton label=\"Xác nhận\" icon=\"pi pi-check\" class=\"p-button-sm p-button-success p-mr-2\"></button>\n    <button pButton label=\"Hủy bỏ\" icon=\"pi pi-times\" class=\"p-button-sm p-button-danger p-mr-2\"></button>\n</div> -->";
