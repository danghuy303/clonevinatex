export default "<div class=\"modal-header\">\n    <h5 class=\"modal-title\">{{opt==='add'?'Thêm mới':'Cập nhật'}} hồ sơ - văn bản pháp quy</h5>\n    <button *ngIf=\"false\" type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\n        <span aria-hidden=\"true\">&times;</span>\n    </button>\n</div>\n<div class=\"modal-body\">\n    <div class=\"p-grid\">\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Tên văn bản:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" [ngModel]=\"item.TenVanBan\"\n                    (ngModelChange)=\"item.TenVanBan=vietHoaChuCaiDau($event)\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Số văn bản:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" [ngModel]=\"item.SoVanBan\"\n                    (ngModelChange)=\"item.SoVanBan=vietHoaChuCaiDau($event)\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Loại văn bản:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <p-dropdown [filter]=\"true\" [options]=\"listLoaiVanBan\" placeholder=\"Chọn loại văn bản\"\n                    styleClass=\"p-inputtext-sm\" [(ngModel)]=\"item.IdLoaiVanBan\" >\n                </p-dropdown>\n            </div>\n        </div>\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Ngày quyết định:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <p-calendar dateFormat=\"dd/mm/yy\" inputStyleClass=\"p-inputtext-sm\" [monthNavigator]=\"true\"\n                    [yearNavigator]=\"true\" [yearRange]=\"yearRange\" [locale]=\"lang\" [(ngModel)]=\"item.NgayQuyetDinh\"\n                    inputId=\"icon\" [showIcon]=\"true\" placeholder=\"dd/mm/yyyy\">\n                </p-calendar>\n            </div>\n        </div>\n\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Cơ quan ban hành:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" [ngModel]=\"item.CoQuanBanHanh\"\n                    (ngModelChange)=\"item.CoQuanBanHanh=vietHoaChuCaiDau($event)\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Trích yếu:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" [ngModel]=\"item.GhiChu\"\n                    (ngModelChange)=\"item.GhiChu=vietHoaChuCaiDau($event)\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Nơi lưu trữ văn bản gốc:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" [ngModel]=\"item.NoiLuuTruGoc\"\n                    (ngModelChange)=\"item.NoiLuuTruGoc=vietHoaChuCaiDau($event)\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row\">\n            <label class=\"p-col-12 p-lg-5 p-p-0 my-auto\">Tài liệu đính kèm:</label>\n            <div class=\"p-col-12 p-lg-7 p-p-0\">\n                <div class=\"p-inputgroup\">\n                    <input type=\"text\" pInputText class=\"p-inputtext-sm\" [(ngModel)]=\"item.TenGoc\" disabled>\n                    <button type=\"button\" pButton pRipple icon=\"pi pi-upload\"\n                        class=\"p-button-sm p-button-text p-button-secondary\" (click)=\"taiLenFileDinhKem()\"></button>\n                    <!-- <button type=\"button\" pButton pRipple icon=\"pi pi-download\" class=\"p-button-sm p-button-text p-button-secondary\"\n                        (click)=\"taiXuongFileDinhKem()\"></button> -->\n                </div>\n            </div>\n        </div>\n    </div>\n</div>\n<div class=\"modal-footer\">\n    <button pButton pRipple label=\"Lưu\" icon=\"pi pi-plus\" class=\"p-button-sm p-mr-2\" (click)=\"accept('add')\"></button>\n    <button pButton pRipple label=\"Lưu và Thêm mới\" icon=\"pi pi-plus\" class=\"p-button-sm  p-mr-2\"\n        (click)=\"accept('more')\"></button>\n    <button pButton pRipple label=\"Thoát\" icon=\"pi pi-trash\"\n        class=\"p-button-sm p-button-outlined p-button-secondary p-mr-2\" (click)=\"activeModal.dismiss('')\"></button>\n</div>";
