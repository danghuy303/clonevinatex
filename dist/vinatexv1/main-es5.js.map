export default "<div style=\"width: 100% !important;overflow-x: auto;\">\n    <table style=\"width: 100%;\" class=\"timeline\">\n        <thead>\n            <tr>\n                <th style=\"width: 7em;\"></th>\n                <th>Hiện trạng sử dụng</th>\n                <th>Tình trạng pháp lý</th>\n                <th>Hồ sơ văn bản</th>\n            </tr>\n        </thead>\n        <tbody>\n            <tr *ngFor=\"let item of items\">\n                <td style=\"text-align: right; position: relative;\">\n                    <div class=\"date\">{{item.ThoiGian}}<span style=\"font-size: 48px; position: absolute\">&bull;</span>\n                    </div>\n                </td>\n                <td>\n                    <p *ngFor=\"let HTSD of item.HienTrangSuDung\">\n                        - {{HTSD}}\n                    </p>\n                </td>\n                <td>\n                    <p *ngFor=\"let BD of item.BienDong\">\n                        - {{BD}}\n                    </p>\n                </td>\n                <td>\n                    <p *ngFor=\"let HSVB of item.HoSoVanBan\">\n                        - {{HSVB}}\n                    </p>\n                </td>\n            </tr>\n        </tbody>\n    </table>\n</div>";
