export default "<div class=\"text-center bg-white p-4\">\n    <h5>BÁO CÁO SẢN LƯỢNG CHI TIẾT</h5>\n    <div class=\"p-d-flex p-ai-center p-jc-between p-mb-3\">\n        <div>\n            <p-tabView (onChange)=\"changeTab($event)\" styleClass=\"no-content\">\n                <p-tabPanel header=\"Theo máy\">\n                </p-tabPanel>\n                <p-tabPanel header=\"Theo mặt hàng\">\n                </p-tabPanel>\n            </p-tabView>\n        </div>\n        <div class=\"p-d-flex p-flex-row\">\n            <!-- <div class=\"p-mr-2\">\n                <p-dropdown [options]=\"listLoaiPhuongAn\" placeholder=\"Chọn phương án\" styleClass=\"p-inputtext-sm\"\n                    [(ngModel)]=\"filter.LoaiPhuongAn\" optionLabel=\"name\" [showClear]=\"true\"></p-dropdown>\n            </div> -->\n            <div class=\"p-mr-2\">\n                <p-calendar dateFormat=\"dd/mm/yy\" inputStyleClass=\"p-inputtext-sm\" [showIcon]=\"true\"\n                    [(ngModel)]=\"filter.Ngay\" inputId=\"icon\" placeholder=\"Ngày\">\n                </p-calendar>\n            </div>\n            <div style=\"margin: auto;\">\n                <p-checkbox [(ngModel)]=\"filter.checkLuyKe\" (onChange)=\"changeLuyKe($event)\" binary=\"true\" inputId=\"binary\"></p-checkbox>\n                <label style=\"margin: auto 0px auto 10px;\" for=\"binary\">Lũy kế</label>\n            </div>\n        </div>\n    </div>\n    <p-table [value]=\"items\" styleClass=\"p-datatable-gridlines p-datatable-sm\">\n        <ng-template pTemplate=\"header\">\n            <tr>\n                <th rowspan=\"2\">Công đoạn</th>\n                <th rowspan=\"2\">Mặt hàng</th>\n                <th *ngFor=\"let th of r1\" [attr.colspan]=\"th.cs\" [attr.rowspan]=\"th.rs\">\n                    {{th.label}}\n                </th>\n            </tr>\n            <tr>\n                <th *ngFor=\"let th of r2\">\n                    {{th.label}}\n                </th>\n            </tr>\n        </ng-template>\n        <ng-template pTemplate=\"body\" let-item let-i=\"rowIndex\">\n            <tr>\n                <td></td>\n                <td></td>\n                <td></td>\n                <td></td>\n            </tr>\n        </ng-template>\n    </p-table>\n</div>";
