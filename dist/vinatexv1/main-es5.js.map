export default "<div class=\"modal-header\">\n    <h5 class=\"modal-title\">Đổi mật khẩu</h5>\n    <button *ngIf=\"false\" type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\n        <span aria-hidden=\"true\">&times;</span>\n    </button>\n</div>\n<div class=\"modal-body\">\n    <div class=\"p-grid\">\n        <div class=\"p-col-12 p-p-3 d-flex flex-column\">\n            <label>Mật khẩu cũ:</label>\n            <input type=\"password\" pPassword placeholder=\"Mật khẩu cũ\" class=\"p-inputtext-sm\"\n                [(ngModel)]=\"oldPass\" [feedback]=\"false\" />\n        </div>\n        <div class=\"p-col-12 p-p-3 d-flex flex-column\">\n            <label>Mật khẩu mới:</label>\n            <input type=\"password\" pPassword placeholder=\"Mật khẩu mới\" class=\"p-inputtext-sm\"\n                [(ngModel)]=\"newPass\" />\n        </div>\n        <div class=\"p-col-12 p-p-3 d-flex flex-column\">\n            <label>Xác nhận mật khẩu mới:</label>\n            <input type=\"password\" pPassword placeholder=\"Xác nhận mật khẩu\" class=\"p-inputtext-sm\"\n                [(ngModel)]=\"confirmPass\" [feedback]=\"false\" />\n        </div>\n    </div>\n</div>\n<div class=\"modal-footer\">\n    <button pButton pRipple label=\"Xác nhận\" \n        class=\"p-button-sm p-mr-2\" (click)=\"ChangePass()\"></button>\n    <button pButton pRipple label=\"Thoát\" icon=\"pi pi-trash\"\n        class=\"p-button-sm p-button-outlined p-button-secondary p-mr-2\" (click)=\"_activeModal.dismiss()\"></button>\n</div>";
