export default "<div class=\"modal-header\">\n    <h5 class=\"modal-title\">Chọn tệp excel</h5>\n    <button *ngIf=\"false\" type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\n        <span aria-hidden=\"true\">&times;</span>\n    </button>\n</div>\n<div class=\"modal-body\">\n    <div class=\"p-col-12 p-d-flex p-flex-row\" *ngIf=\"title!=='Thông tin người sử dụng'\">\n        <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Tài liệu đính kèm:</label>\n        <div class=\"p-col-12 p-lg-8 p-p-0\">\n            <div class=\"p-inputgroup\">\n                <input type=\"text\" pInputText class=\"p-inputtext-sm\"\n                    [(ngModel)]=\"TepImport.TenGoc\" disabled>\n                <button type=\"button\" pButton pRipple icon=\"pi pi-upload\" class=\"p-button-sm p-button-text p-button-secondary\"\n                    (click)=\"taiLenFileDinhKem()\"></button>\n            </div>\n        </div>\n    </div>\n</div>\n<div class=\"modal-footer\">\n    <button pButton pRipple label=\"Tải tệp mẫu\" class=\"p-button-sm p-mr-2\" (click)=\"taiTepMau()\"></button>\n    <button pButton pRipple label=\"Xác nhận\" class=\"p-button-sm p-mr-2\" (click)=\"accept()\"></button>\n    <button pButton pRipple label=\"Hủy\" class=\"p-button-sm p-button-outlined p-button-secondary p-mr-2\" (click)=\"_modalActive.dismiss()\"></button>\n</div>";
