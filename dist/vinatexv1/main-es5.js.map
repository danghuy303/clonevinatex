export default "<div class=\"p-grid\">\n    <div class=\"p-col-4 p-d-flex p-flex-row\">\n        <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Tài liệu đính kèm:</label>\n        <div class=\"p-col-12 p-lg-8 p-p-0\">\n            <div class=\"p-inputgroup\">\n                <input type=\"text\" pInputText class=\"p-inputtext-sm\" [(ngModel)]=\"hdsd.TenGoc\" disabled>\n                <button type=\"button\" pButton pRipple icon=\"pi pi-upload\"\n                    class=\"p-button-sm p-button-text p-button-secondary\" (click)=\"taiLenFileDinhKem()\"></button>\n            </div>\n        </div>\n    </div>\n    <button pButton pRipple label=\"Xác nhận\" class=\"p-button-sm p-mr-2\" (click)=\"uploadHDSD()\"></button>\n</div>";
