export default "<div class=\"modal-header\">\n    <h5 class=\"modal-title\">Báo cáo tổng hợp</h5>\n    <button *ngIf=\"false\" type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\n        <span aria-hidden=\"true\">&times;</span>\n    </button>\n</div>\n<div class=\"modal-body\">\n    <app-baocaotaichinh [IDVung]=\"IDVung\"></app-baocaotaichinh>\n</div>\n<div class=\"modal-footer\">\n    <button pButton pRipple label=\"Đóng\" class=\"p-button-sm p-button-outlined p-button-secondary p-mr-2\" (click)=\"_modalActive.dismiss()\"></button>\n</div>";
