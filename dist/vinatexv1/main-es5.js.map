export default "<div class=\"modal-header\">\n    <h5 class=\"modal-title\">{{opt==='add'?'Thêm mới':'Cập nhật'}} danh mục đối tác</h5>\n    <button *ngIf=\"false\" type=\"button\" class=\"close\" aria-label=\"Close\" (click)=\"activeModal.dismiss('Cross click')\">\n        <span aria-hidden=\"true\">&times;</span>\n    </button>\n</div>\n<div class=\"modal-body\">\n    <div class=\"p-grid\">\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Mã <span class=\"text-danger\">*</span>:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.Ma\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Tên <span class=\"text-danger\">*</span>:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.Ten\" pInputText />\n            </div>\n        </div>\n        <!-- <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Tên công ty <span class=\"text-danger\">*</span>:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.TenCongTy\" pInputText />\n            </div>\n        </div> -->\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Địa chỉ:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.DiaChi\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Số GPKD:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.SoGiayPhepKinhDoanh\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Ngày cấp GPKD:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <p-calendar dateFormat=\"dd/mm/yy\" inputStyleClass=\"p-inputtext-sm\"  [locale]=\"lang\" [monthNavigator]=\"true\" [yearNavigator]=\"true\" [yearRange]=\"yearRange\" [showIcon]=\"true\" [(ngModel)]=\"item.NgayCapGiayPhep\"\n                    inputId=\"icon\" placeholder=\"dd/mm/yyyy\">\n                </p-calendar>\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Người đại diện pháp luật:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.TenNguoiDaiDienPhapLuat\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Chức vụ:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.ChucVu\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Số tài khoản:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.SoTaiKhoan\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Địa chỉ ngân hàng:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.DiaChiNganHang\" pInputText />\n            </div>\n        </div>\n        <div class=\"p-col-12 p-d-flex p-flex-row\">\n            <label class=\"p-col-12 p-lg-4 p-p-0 my-auto\">Ghi chú:</label>\n            <div class=\"p-col-12 p-lg-8 p-p-0\">\n                <input type=\"text\" class=\"p-inputtext-sm\" (keyup.enter)=\"accept()\" [(ngModel)]=\"item.GhiChu\" pInputText />\n            </div>\n        </div>\n    </div>\n</div>\n<div class=\"modal-footer\">\n    <button pButton pRipple label=\"Chấp nhận\" class=\"p-button-sm p-mr-2\" (click)=\"accept()\"></button>\n    <button pButton pRipple label=\"Thoát\" class=\"p-button-sm p-button-outlined p-button-secondary p-mr-2\" (click)=\"activeModal.dismiss()\"></button>\n</div>";
