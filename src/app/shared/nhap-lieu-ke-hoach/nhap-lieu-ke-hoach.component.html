<div class="wrapper">
  <div class="p-mb-3 p-mt-3">
    <h4 style="color:#1f2779">{{title}}</h4>
  </div>
  <div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <button pButton label="Thêm mới" icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="add()"></button>
    <div class="p-inputgroup" style="width: 300px;">
      <input [(ngModel)]="keyWord" type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText/>
      <!-- <button type="button" pButton pRipple icon="pi pi-search"
          class="p-button-secondary p-button-sm p-button-text"></button> -->
      <button type="button" pButton pRipple icon="pi pi-refresh"
          class="p-button-secondary p-button-sm p-button-text" (click)="ResetData()"></button>
  </div>
  </div>
  <div>
    <p-table [columns]="cols" [value]="items | filter: keyWord" [paginator]="true" [rows]="10"
      styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped">
      <ng-template pTemplate="header" let-columns>
        <tr>
          <th style="width: 80px">STT</th>
          <th *ngFor="let col of columns" [style]="col.style">
            {{col.header}}
          </th>
          <th style="width: 150px"></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item let-columns="columns" let-i="rowIndex">
        <tr>
          <td style="text-align: center">{{i + 1}}</td>
          <td *ngFor="let col of columns" [style]="col.dataStyle">
            {{item[col.field]}}
          </td>
          <td style="text-align: center">
            <button pButton pRipple type="button" icon="pi pi-pencil"
              class="p-button-rounded p-button-secondary p-button-text p-button-sm" (click)="update(item)"></button>
            <!-- <button pButton pRipple type="button" icon="pi pi-trash"
            class="p-button-rounded p-button-secondary p-button-text p-button-sm" (click)="deleteItem(item)"></button> -->
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="paginatorleft">
        <b>
          Tổng số bản ghi {{(items | filter: keyWord)?.length}}
        </b>
       </ng-template> 
    </p-table>
  </div>
</div>
