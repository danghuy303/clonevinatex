<div class="modal-header">
  <h5 class="modal-title">{{title}}</h5>
</div>
<div class="modal-body">
  <div class="p-d-flex p-jc-between">
    <div class="modal-bt p-mb-4 ">
      <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm" (click)="activeModal.dismiss()"></button>
      <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm" (click)="ChapNhan()"></button>
    </div>
    <div class="d-flex" style="width: 400px">
        <p-dropdown [filter]="true" [options]="listNam" placeholder="Chọn năm" styleClass="p-inputtext-sm"
          [(ngModel)]="nam" (onChange)="GetListNam()" style="width: 100%"></p-dropdown>
    </div>
  </div>
  <div>
    <p-table [value]="item.ListChiPhi" styleClass="p-datatable-sm wrap-text p-datatable-striped p-datatable-gridlines">
      <ng-template pTemplate="header">
        <tr>
          <th>Tên</th>
          <th *ngFor="let label of labelThang">{{label}}</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-chiphi>
        <tr>
          <td>{{chiphi.Ten}}</td>
          <ng-container *ngIf="chiphi.ListChiPhi">
            <td *ngFor="let thang of chiphi.ListChiPhi">
              <p-inputNumber [(ngModel)]="thang.DonGia"></p-inputNumber>
              <!-- {{thang.DonGia}} -->
            </td>
          </ng-container>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
