<p-table [value]="Items" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width:50px">
            <col style="width:200px">
            <col style="width:120px">
            <col style="width:150px">
            <col style="">
            <col *ngIf="isXoa" style="width:80px">
        </colgroup>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>STT</th>
            <th>Loại nhiên liệu</th>
            <th>Đơn vị tính</th>
            <th>Định mức</th>
            <th>Ghi chú</th>
            <th *ngIf="isXoa" style="width: 80px;"><button pButton pRipple type="button" icon="pi pi-plus"
                    class="p-button-rounded p-button-sm " (click)="add()">
                </button></th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
        <tr>
            <td class="text-center">{{i+1}}</td>
            <td>
                <p-dropdown [filter]="true" [options]="listLoaiNhienLieu" placeholder="Chọn" [showClear]="true"
                    styleClass="p-inputtext-sm" [(ngModel)]="item.IdLoaiNhieuLieu"></p-dropdown>
            </td>
            <td><input type="text" class="p-inputtext-sm" [(ngModel)]="item.DonViTinh" pInputText /> </td>
            <td>
                <p-inputNumber locale="en-EN" [(ngModel)]="item.DinhMuc" [minFractionDigits]="5" [maxFractionDigits]="3"
                    placeholder="">
                </p-inputNumber>
            </td>
            <td>
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.GhiChu" [ngbTooltip]="item.GhiChu"
                    pInputText />
            </td>
            <td *ngIf="isXoa" class="text-center">
                <button pButton pRipple icon="pi pi-trash"
                    class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2" (click)="delete(i)"
                    pTooltip="Xóa" showDelay="1000" tooltipPosition="bottom"></button>
            </td>
        </tr>
    </ng-template>
</p-table>
