<p-table [value]="Items" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width:50px">
            <col style="width:150px">
            <col style="width:120px">
            <col style="width:150px">
            <col style="width:100px">
            <col style="width:100px">
            <col style="width:100px">
            <col style="width:70px">
            <!-- <col style=""> -->
            <col style="width:70px">
        </colgroup>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th>STT</th>
            <th>Ngày áp dụng</th>
            <th>Đơn vị tính</th>
            <th>Sản lượng</th>
            <th>Số ca làm việc/ngày</th>
            <th>Số ngày làm/tháng</th>
            <th>Số tháng/năm</th>
            <th>Hoạt động</th>
            <!-- <th>Ghi chú</th> -->
            <th style="width: 70px;"><button pButton pRipple type="button" icon="pi pi-plus"
                    class="p-button-rounded p-button-sm " (click)="add()">
                </button></th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
        <tr>
            <td class="text-center">{{i+1}}</td>
            <td>
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                    [(ngModel)]="item.NgayApDung" (ngModelChange)="changeData()" inputId="icon">
                </p-calendar>
            </td>
            <td><input type="text" class="p-inputtext-sm" [(ngModel)]="item.DonViTinh" (ngModelChange)="changeData()" pInputText /> </td>
            <td>
                <p-inputNumber locale="en-EN" [(ngModel)]="item.DinhMuc" (ngModelChange)="changeData()" [minFractionDigits]="2" [maxFractionDigits]="2"
                    placeholder="">
                </p-inputNumber>
            </td>
            <td>
                <p-inputNumber locale="en-EN" [(ngModel)]="item.SoCa" (ngModelChange)="changeData()" placeholder="">
                </p-inputNumber>
            </td>
            <td>
                <p-inputNumber locale="en-EN" [(ngModel)]="item.SoNgay" (ngModelChange)="changeData()" placeholder="">
                </p-inputNumber>
            </td>
            <td>
                <p-inputNumber locale="en-EN" [(ngModel)]="item.SoThang" (ngModelChange)="changeData()" placeholder="">
                </p-inputNumber>
            </td>
            <td class="text-center">
                <p-checkbox [(ngModel)]="item.IsHoatDong" binary="true" inputId="binary"
                    (onChange)="handleHoatDong(item)"></p-checkbox>
            </td>
            <!-- <td>
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.GhiChu" (ngModelChange)="changeData()" [ngbTooltip]="item.GhiChu"
                    pInputText />
            </td> -->
            <td class="text-center">
                <button pButton pRipple icon="pi pi-trash"
                    class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2" (click)="delete(i)"
                    pTooltip="Xóa" showDelay="1000" tooltipPosition="bottom"></button>
            </td>
        </tr>
    </ng-template>
</p-table>
