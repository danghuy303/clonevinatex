<div class="wrapper">
  <div class="p-mb-3 p-mt-3">
    <h4 style="color:#1f2779">Danh mục loại container</h4>
  </div>
  <div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <button pButton label="Thêm mới" icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="add()"></button>
  </div>
  <div>
    <p-table [columns]="cols" [value]="listDanhMuc"
      styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped">
      <ng-template pTemplate="header" let-columns>
        <tr>
          <th *ngFor="let col of columns" [style]="col.style">
            {{col.header}}
          </th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body">
        <tr>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
