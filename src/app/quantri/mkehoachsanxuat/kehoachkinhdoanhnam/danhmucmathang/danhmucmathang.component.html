<div class="modal-header">
  <h5 class="modal-title">Danh mục mặt hàng</h5>
</div>
<div class="modal-body">
  <div class="p-d-flex p-flex-row p-jc-between">
    <div class="modal-bt p-mb-3">
      <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
        (click)="activeModal.dismiss()"></button>
      <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm "></button>
    </div>
  </div>
  <div>
    <p-table [value]="listMatHang" styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped">
      <ng-template pTemplate="colgroup">
        <colgroup>
          <col style="width: 50px">
          <col>
          <col>
          <col>
          <col>
          <col>
          <col>
        </colgroup>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>
            <p-checkbox value="checkedAll" (onChange)="checkAll()"></p-checkbox>
          </th>
          <th>Mặt hàng</th>
          <th>Mã</th>
          <th>Loại sợi</th>
          <th>Chỉ số Ne</th>
          <th>Độ săn</th>
          <th>Ghi chú</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td  class="text-center">
            <p-checkbox value="product.checked" (onChange)="check(product)"></p-checkbox>
          </td>
          <td>{{product.Ten}}</td>
          <td>{{product.Ma}}</td>
          <td class="text-center">{{product.LoaiSoi}}</td>
          <td class="text-right">{{product.ChiSoNe}}</td>
          <td class="text-right">{{product.DoSan}}</td>
          <td class="text-right">{{product.GhiChu}}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
