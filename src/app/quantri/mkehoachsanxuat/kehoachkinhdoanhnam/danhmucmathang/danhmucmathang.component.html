<div class="modal-header">
  <h5 class="modal-title">Danh mục mặt hàng</h5>
</div>
<div class="modal-body">
  <div class="p-d-flex p-jc-between p-ai-center p-mb-3">
    <div class="modal-bt">
      <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
        (click)="activeModal.dismiss()"></button>
      <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm" (click)="ChapNhan()"></button>
    </div>
    <div class="p-inputgroup" style="width: 200px">
      <span class="p-inputgroup-addon p-inputtext-sm"><i class="pi pi-search"></i></span>
      <input class="p-inputtext-sm" [(ngModel)]="keyword" type="text" placeholder="Tìm kiếm" pInputText />
    </div>
  </div>
  <div>
    <p-table [value]="listMatHang | filter: keyword" styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped"
      [paginator]="true" [rows]="10">
      <ng-template pTemplate="colgroup">
        <colgroup>
          <col style="width: 50px">
          <col>
          <col>
          <col>
          <col>
          <col>
          <col>
        </colgroup>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>
            <p-checkbox value="checkedAll" [(ngModel)]="checkedAll" (onChange)="CheckAll($event)"></p-checkbox>
          </th>
          <th>Mặt hàng</th>
          <th>Mã</th>
          <th>Loại sợi</th>
          <th>Chỉ số Ne</th>
          <th>Độ săn</th>
          <th>Ghi chú</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td class="text-center">
            <p-checkbox [binary]="true" [(ngModel)]="product.checked" (onChange)="Check()"></p-checkbox>
          </td>
          <td>{{product.Ten}}</td>
          <td>{{product.Ma}}</td>
          <td class="text-center">{{product.LoaiSoi}}</td>
          <td class="text-right">{{product.Ne}}</td>
          <td class="text-right">{{product.DoSan}}</td>
          <td class="text-right">{{product.GhiChu}}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="paginatorleft">
        <b>Tổng số bản ghi {{(listMatHang.length | filter: keyword).length}}</b>
      </ng-template>
    </p-table>
  </div>
</div>
