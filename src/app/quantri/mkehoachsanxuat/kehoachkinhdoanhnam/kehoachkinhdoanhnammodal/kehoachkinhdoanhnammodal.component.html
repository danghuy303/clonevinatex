<div class="modal-header">
  <h5 class="modal-title">Phiếu kế hoạch kinh doanh năm</h5>
  <div class="d-flex flex-column flex-lg-row">
    <div>
      <span style="font-weight: bold;">Số quy trình: {{kehoach.SoQuyTrinh}}</span>
    </div>
    <div class="ml-lg-3 mr-lg-3">
      <span style="font-weight: bold;">TG Tạo: {{kehoach.Created | date:'dd/MM/yyyy'}}</span>
    </div>
    <div>
      <span style="font-weight: bold;">TG Duyệt: </span>
    </div>
  </div>
</div>
<div class="modal-body">
  <div class="p-d-flex p-flex-row p-jc-between">
    <div class="modal-bt p-mb-4 ">
      <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
        (click)="activeModal.dismiss()"></button>
      <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm " (click)="GhiLai()"
        *ngIf="checkbutton.Ghi"></button>
      <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
        (click)="XoaQuyTrinh()"></button>
      <button pButton pRipple type="button" label="Không duyệt" class="p-mr-2 p-button-sm" (click)="KhongDuyet()"
        *ngIf="checkbutton.KhongDuyet"></button>
      <button pButton pRipple type="button" label="Chuyển tiếp" class="p-mr-2 p-button-sm" (click)="ChuyenDuyet()"
        *ngIf="checkbutton.ChuyenTiep"></button>
    </div>
  </div>
  <div class="p-grid">
    <div class="p-col-12 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-1 p-p-0 my-auto">Người lập:</label>
      <div class="p-col-12 p-lg-11 p-p-0">
        {{kehoach.TenNguoiLap}}
      </div>
    </div>
    <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tên kế hoạch:</label>
      <div class="p-col-12 p-lg-10 p-p-0 my-auto">
        <input type="text" class="p-inputtext-sm" [(ngModel)]="kehoach.TenKeHoach" placeholder="Nhập nội dung" pInputText />
      </div>
    </div>
    <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-2 p-p-0 my-auto">Năm kế hoạch:</label>
      <div class="p-col-12 p-lg-10 p-p-0 my-auto">
        <p-dropdown [(ngModel)]="kehoach.Nam" [filter]="true" [options]="years" placeholder="Chọn năm" [showClear]="true"
        styleClass="p-inputtext-sm"></p-dropdown>
      </div>
    </div>
    <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-2 p-p-0 my-auto">Chi số gốc:</label>
      <div class="p-col-12 p-lg-10 p-p-0 my-auto">
        <p-inputNumber [(ngModel)]="kehoach.NeGoc" inputId="minmaxfraction" mode="decimal" [minFractionDigits]="3" placeholder="Nhập chi số gốc">
        </p-inputNumber>
        <!-- <p-dropdown [filter]="true" [options]="listMatHang" placeholder="Chọn mặt hàng" [showClear]="true"
          styleClass="p-inputtext-sm"></p-dropdown> -->
      </div>
    </div>
    <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-2 p-p-0 my-auto">Nội dung:</label>
      <div class="p-col-12 p-lg-10 p-p-0 my-auto">
        <input type="text" class="p-inputtext-sm" [(ngModel)]="kehoach.NoiDung" placeholder="Nhập nội dung" pInputText />
      </div>
    </div>
    <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row p-p-2">
      <label class="p-col-12 p-lg-4 p-p-0 my-auto">Tiền tệ:</label>
      <div class="p-col-12 p-lg-8 p-p-0 my-auto">
        <p-dropdown [(ngModel)]="kehoach.MaDonViTienTe" [filter]="true" [options]="listDonViTienTe" placeholder="Chọn đơn vị tiền tệ" [showClear]="true" styleClass="p-inputtext-sm"></p-dropdown>
      </div>
    </div>
    <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày lập:</label>
      <div class="p-col-12 p-lg-8 p-p-0 my-auto">
        <!-- <p-calendar [(ngModel)]="kehoach.NgayLap" [showIcon]="true" inputId="icon" placeholder="Chọn ngày"></p-calendar> -->
        <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true" [locale]="lang"
              [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon" [(ngModel)]="kehoach.NgayLap"
              placeholder="dd/mm/yyyy">
            </p-calendar>
      </div>
    </div>
    <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
      <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú:</label>
      <div class="p-col-12 p-lg-10 p-p-0 my-auto">
        <input type="text" class="p-inputtext-sm" [(ngModel)]="kehoach.GhiChu" placeholder="Nhập nội dung" pInputText />
      </div>
    </div>
  </div>

  <!-- table -->
  <div class="p-mt-3">
    <div class="p-col-12 p-p-0 pintable-container" style="height: 50vh;" voiPintable [pinnedCols]="1">
      <table>
        <thead>
          <tr>
            <th class="tc-w-200">
              <div class="d-flex p-jc-center p-ai-center">
                <span class="p-mr-2">Sản phẩm</span>
                <span>
                  <button pButton pRipple type="button" icon="pi pi-plus" class="p-button-rounded p-button-secondary p-button-sm" (click)="AddSanPham()"></button>
                </span>
              </div>
            </th>
            <th class="tc-w-200">Nhà máy</th>
            <th class="tc-w-121">Hợp đồng</th>
            <th class="tc-w-200">Tổng sản lượng (tấn)</th>
            <th *ngFor="let label of labelThang" class="tc-w-140">{{label}} (tấn)</th>
          </tr>
        </thead>
        <tbody>
          <ng-container  *ngIf="kehoach.lstKH_KeHoachKinhDoanh_SanPham.length">
            <tr *ngFor="let sanpham of kehoach.lstKH_KeHoachKinhDoanh_SanPham; let i = index">
              <td class="tc-w-200 p-px-2" style="background-color: #fff;z-index: 9999;">
                <div class="d-flex p-ai-center">
                  <span>
                    {{sanpham.TenSanPham}}
                  </span>
                  <button *ngIf="sanpham.isKhongHopDong" pButton pRipple type="button" icon="pi pi-trash" class="p-button-rounded p-button-danger p-button-text" (click)="DeleteSanPham(i)"></button>
                </div>
              </td>
              <td class="tc-w-200 p-px-2">{{sanpham.lstKH_KeHoachKinhDoanh_SanPham_NhaMay[0].TenNhaMay}}</td>
              <td class="tc-w-121 p-px-2 text-center">
                <button *ngIf="!sanpham.isKhongHopDong" pButton pRipple type="button" label="Danh sách hợp đồng" class="p-button-text" (click)="SeeHopDongDetail(sanpham)"></button>
              </td>
              <td class="tc-w-200 p-px-2 text-right">
                <p-inputNumber *ngIf="sanpham.lstKH_KeHoachKinhDoanh_SanPham_NhaMay.length" [disabled]="true" [(ngModel)]="sanpham.lstKH_KeHoachKinhDoanh_SanPham_NhaMay[0].TongSanLuongThang" locale="en-US"></p-inputNumber>
              </td>
              <ng-container 
                *ngIf="sanpham.lstKH_KeHoachKinhDoanh_SanPham_NhaMay.length"
              >
                <td *ngFor="let thang of sanpham.lstKH_KeHoachKinhDoanh_SanPham_NhaMay[0].lstKH_KeHoachKinhDoanh_SanPham_ChiTietKH" class="tc-w-140 text-center">
                  <button pButton pRipple type="button" [label]="thang.SanLuongThang.toString()" class="p-button-text" (click)="SeeMonthDetail(sanpham, thang)"></button>
                </td>
              </ng-container>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>
  </div>
</div>
