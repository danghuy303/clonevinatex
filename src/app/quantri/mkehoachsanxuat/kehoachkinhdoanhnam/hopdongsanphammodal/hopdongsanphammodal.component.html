<div class="modal-header">
  <h5 class="modal-title">Danh sách hợp đồng của sản phẩm {{tenSanPham}} năm kế hoạch {{nam}} </h5>
</div>
<div class="modal-body">
  <div class="p-d-flex p-flex-row p-jc-between">
    <div class="modal-bt p-mb-3">
      <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
        (click)="activeModal.dismiss()"></button>
      <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm" (click)="ChapNhan()"></button>
    </div>
  </div>
  <div>
    <p-table [value]="listHopDong" styleClass="p-datatable-sm p-datatable-gridlines p-datatable-striped">
      <ng-template pTemplate="colgroup">
        <colgroup>
          <col>
          <col>
          <col>
          <col>
        </colgroup>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th>Hợp đồng</th>
          <th>Tổng sản lượng (tấn)</th>
          <th>Đã sản xuất (tấn)</th>
          <th>Sản lượng dở dang (tấn)</th>
          <th>Còn lại (tấn)</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-product>
        <tr>
          <td>{{product.TenHopDong}}</td>
          <td class="text-right">{{product.TongSanLuong | number:'0.0'}}</td>
          <td class="text-right">
            <!-- <p-inputNumber [(ngModel)]="product.SanLuongDaSanXuat" locale="en-US" mode="decimal" [min]="0" [minFractionDigits]="3" (onBlur)="CountSLConlai()">
            </p-inputNumber> -->
            {{product.SanLuongDaSanXuat | number:'0.0'}}
          </td>
          <td class="text-right">
            <p-inputNumber [(ngModel)]="product.SanLuongDaSanXuat" locale="en-US" mode="decimal" [max]="product.TongSanLuong" [min]="0" [minFractionDigits]="3" (onBlur)="CountSLConlai()">
            </p-inputNumber>
          </td>
          <td class="text-right">{{product.ConLai | number:'0.0'}}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
