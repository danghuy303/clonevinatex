<div class="content">
    <div class="year">
        <div class="" style="width:15vw">
            <p-dropdown [options]="listNam" placeholder="Chọn năm" [(ngModel)]="filter.Nam"></p-dropdown>
        </div>
    </div>
    <div class="chart py-3">
        <p-chart type="bar" [data]="data" [options]="chartOptions"></p-chart>
    </div>
    <div class="table-BaoCao">
        <p-table [value]="ListBaoCao">
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center">Tên báo cáo</th>
                    <th class="text-center" *ngFor="let LabelThang of ListLabelThang">{{LabelThang}}</th>
                  
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-baoCao>
                <tr>
                    <td class="text-center">{{baoCao.name}}</td>
                    <td class="text-center" *ngFor="let LabelThang of ListLabelThang">{{LabelThang}}</td>
                </tr>
            </ng-template>
            </p-table>
    </div>
</div>
