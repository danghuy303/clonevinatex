<p-panel>
  <ng-template pTemplate="header" class="p-jc-start">
    <b class="p-mr-3">Đơn giá</b>
    <button 
      class="p-button-sm p-button-info" 
      pButton 
      pRipple 
      type="button" 
      icon="pi pi-dollar" 
      label="Tính chi phí"
      (click)="tinhChiPhi()"
    ></button>
  </ng-template>
  <div class="p-col-12 p-p-0 p-mb-3 pintable-container" style="height: 30vh;" voiPintable [pinnedCols]="3">
    <table>
      <thead>
        <tr>
          <th class="tc-w-40">STT</th>
          <th class="tc-w-280 text-left">Sản phẩm</th>
          <th class="tc-w-40">ĐVT</th>
          <ng-container *ngFor="let thang of listLableThang">
            <th class="tc-w-150 text-right">{{thang}}</th>
          </ng-container>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngFor="let sanpham of kehoach.listChiPhiBanHang.DonGia.listDonGia; let i = index">  
          <tr>
            <td class="tc-w-40 text-center" style="z-index: 1">{{i + 1}}</td>
            <td class="tc-w-280" style="z-index: 1">{{sanpham.Ten}}</td>
            <td class="tc-w-40 text-center" style="z-index: 1">VNĐ</td>
            <ng-container *ngFor="let thang of sanpham.listThang">
              <td class="tc-w-150">
                <p-inputNumber
                  [(ngModel)]="thang.Gia"
                  [min]="0"
                  [maxFractionDigits]="3"
                  [minFractionDigits]="0"
                  mode="decimal"
                  locale="en-US"
                  (ngModelChange)="countAllSum()"
                ></p-inputNumber>
              </td>
            </ng-container>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</p-panel>

<p-panel>
  <ng-template pTemplate="header" class="p-jc-start">
    <b class="p-mr-3">Chi phí</b>
  </ng-template>
  <div class="p-col-12 p-p-0 pintable-container" style="height: 30vh;" voiPintable [pinnedCols]="3">
    <table>
      <thead>
        <tr>
          <th class="tc-w-40">STT</th>
          <th class="tc-w-280 text-left">Sản phẩm</th>
          <th class="tc-w-40">ĐVT</th>
          <ng-container *ngFor="let thang of listLableThang">
            <th class="tc-w-150 text-right">{{thang}}</th>
          </ng-container>
          <th class="tc-w-150">Tổng</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="(kehoach.listChiPhiBanHang != null || kehoach.listChiPhiBanHang != undefined)">
          <td [attr.colspan]="2" class="p-p-2"><b>Cộng</b></td>
          <td style="display: none"></td>
          <td class="text-center">VNĐ</td>
          <ng-container *ngFor="let thang of verticalSum">
            <td class="text-right tc-w-150">
              <b>{{thang | number: '0.0'}}</b>
            </td>
          </ng-container>
        </tr>
        <ng-container *ngFor="let sanpham of kehoach.listChiPhiBanHang.ChiPhi.listChiPhi; let i = index">  
          <tr>
            <td class="tc-w-40 text-center">{{i + 1}}</td>
            <td class="tc-w-280">{{sanpham.Ten}}</td>
            <td class="tc-w-40 text-center">{{sanpham.DonViTinh}}</td>
            <ng-container *ngFor="let thang of sanpham.listThang">
              <td class="tc-w-150 text-right">
                {{thang.ChiPhi | number: "0.0"}}
              </td>
            </ng-container>
            <td class="tc-w-150 text-right">
              <b>{{sanpham.TongChiPhi | number: '0.0'}}</b>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</p-panel>
