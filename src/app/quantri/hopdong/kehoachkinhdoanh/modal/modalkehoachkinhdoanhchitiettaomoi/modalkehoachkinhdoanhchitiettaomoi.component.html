<div class="modal-header">
  <h5 class="modal-title">Kế hoạch kinh doanh</h5>
  <!-- <button type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
          <span aria-hidden="true">&times;</span>
      </button> -->
  <!-- <span class="p-button-sm p-button-sm p-button-text close" aria-hidden="true"
      (click)="this.activeModal.dismiss()">×</span>  -->
  <div class="d-flex flex-column flex-lg-row">
    <div>
      <span style="font-weight: bold;">Số phiếu:</span>
    </div>
    <div class="ml-lg-3 mr-lg-3">
      <span style="font-weight: bold;">TG Tạo:</span>
    </div>
    <div>
      <span style="font-weight: bold;">TG Duyệt:</span>
    </div>
  </div>
</div>
<div class="modal-body">
  <div class="p-d-flex p-flex-row p-jc-between">
    <div class="modal-bt p-mb-4">
      <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm" (click)="activeModal.dismiss('close')"></button>
      <button pButton pRipple type="button" label="Lưu nháp" class="p-mr-2 p-button-sm " (click)="GhiLai()"></button>
      <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm " (click)="ChapNhan()"></button>
      <button pButton pRipple type="button" label="Cập nhật đơn giá" class="p-mr-2 p-button-sm" (click)="CapNhatDonGia()"></button>
    </div>
  </div>
  <p-panel header="Thông tin chung">
    <div class="p-col-12 p-0">
      <div class="p-grid">
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
          <label class="p-col-12 p-lg-3 p-p-0 my-auto">Tên kế hoạch: </label>
          <div class="p-col-12 p-lg-9 p-p-0">
            <input type="text" class="p-inputtext-sm" [(ngModel)]="item.TenKeHoach" pInputText />
          </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
          <label class="p-col-12 p-lg-3 p-p-0 my-auto">Năm kế hoạch :</label>
          <div class="p-col-12 p-lg-9 p-p-0">
            <p-dropdown [filter]="true" [options]="listNam" placeholder="Chọn năm" [(ngModel)]="item.Nam" styleClass="p-inputtext-sm">
            </p-dropdown>
          </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
          <label class="p-col-12 p-lg-3 p-p-0 my-auto">Người lập: </label>
          <div class="p-col-12 p-lg-9 p-p-0">
            <!-- <p-dropdown [filter]="true" [options]="listNhaMay" placeholder="Chọn người lập" [(ngModel)]="item.ng"
              styleClass="p-inputtext-sm">
            </p-dropdown> --> {{userInfo.TenNhanVien}}
          </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
          <label class="p-col-12 p-lg-3 p-p-0 my-auto">Ngày lập: </label>
          <div class="p-col-12 p-lg-9 p-p-0">
            <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon" [(ngModel)]="item.NgayLap" placeholder="dd/mm/yyyy">
            </p-calendar>
          </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
          <label class="p-col-12 p-lg-3 p-p-0 my-auto">Nội dung: </label>
          <div class="p-col-12 p-lg-9 p-p-0">
            <textarea pInputTextarea autoResize="autoResize" [(ngModel)]="item.NoiDung"></textarea>
          </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
          <label class="p-col-12 p-lg-3 p-p-0 my-auto">Ghi chú: </label>
          <div class="p-col-12 p-lg-9 p-p-0">
            <textarea pInputTextarea autoResize="autoResize" [(ngModel)]="item.GhiChu"></textarea>
          </div>
        </div>
      </div>
    </div>
  </p-panel>
  <p-panel header="Chọn sản phẩm">
    <p-multiSelect [options]="listMatHang" [(ngModel)]="item.selectedItems" (onChange)="changeItem(item)" defaultLabel="Chọn mặt hàng"></p-multiSelect>
    <div class="p-col-12 p-p-0 pintable-container" style="height: 90vh;" voiPintable [pinnedCols]="0">
      <table>
        <thead>
          <th class="tc-w-200">Sản phẩm</th>
          <th class="tc-w-121">Tổng sản lượng</th>
          <th class="tc-w-121">SLHĐ</th>
          <th class="tc-w-121">SL đã sản xuất</th>
          <th class="tc-w-121">SL còn lại</th>
          <th class="tc-w-121">SL dang dở</th>
          <th class="tc-w-121">Thời gian</th>
          <th class="tc-w-121">SL Dự kiến</th>
          <th class="tc-w-121">SL cần lập kế hoạch</th>
          <th class="tc-w-121">SL lập KH hiện hành</th>
          <th class="tc-w-200">Nhà máy</th>
          <th *ngFor="let label of labelThang" class="tc-w-100">{{label}}</th>
          <th class="tc-w-100"></th>
        </thead>
        <tbody>
         
          <ng-container *ngFor="let item of item.listItem">
            <tr>
              <td class="text-center tc-w-200" (click)="TheoDoi(item)">
                {{item.TenMatHang}}
              </td>
              <td class="text-center tc-w-121"><p-inputNumber disabled="disabled" [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="item.TongSanLuong">
              </p-inputNumber></td>
              <td class="text-center tc-w-121"><p-inputNumber disabled="disabled" [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="item.TongSanLuongHopDong">
              </p-inputNumber></td>
              <td class="text-center tc-w-121"><p-inputNumber disabled="disabled" [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="item.TongSanLuongDaThucHien">
              </p-inputNumber></td>
              <td class="text-center tc-w-121">
                <p-inputNumber disabled="disabled" [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="item.TongSanLuongConLaiPhaiThucHien">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-121">
                <p-inputNumber  [minFractionDigits]="0" locale="vi-VN" (onBlur)="TinhTongSanLuongTungMatHang()" [(ngModel)]="item.SanLuongDangDo">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-121">
                
              </td>
              <td class="text-center tc-w-121">
                <p-inputNumber  [minFractionDigits]="0" locale="vi-VN" (onBlur)="TinhTongSanLuongTungMatHang()" [(ngModel)]="item.SanLuongDuKien">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-121">
                <p-inputNumber disabled="disabled" [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="item.SanLuongCanLapKeHoach">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-121">
                <p-inputNumber disabled="disabled" [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="item.SoLuongDaLapKeHoach">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-200">
                <p-multiSelect [options]="listNhaMay" [(ngModel)]="item.selectedNhaMay" (onChange)="changeNhaMay(item)" defaultLabel="Chọn nhà máy"></p-multiSelect>
              </td>
              <td class="text-center tc-w-100" *ngFor="let prop of propThang">
                <p-inputNumber [disabled]="true" [minFractionDigits]="0" locale="vi-VN" [ngModel]="item[prop]">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-100">
              </td>
            </tr>
            <tr *ngFor="let nhaMay of item.listNhaMay">
              <td class="text-center tc-w-200">
              </td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121"></td>
              <td class="text-center tc-w-121">
              </td>
              <td class="text-center tc-w-121">
                <p-inputNumber [minFractionDigits]="0" [disabled]="true" locale="vi-VN" [ngModel]="nhaMay.SoLuongDaLapKeHoach">
                </p-inputNumber>
              </td>
              <td class="text-center tc-w-200">
                {{nhaMay.TenNhaMay}}
              </td>
              <td class="text-center tc-w-100" *ngFor="let prop of propThang">
                <p-inputNumber [minFractionDigits]="0" locale="vi-VN" (onBlur)="TinhSoLuongDaLapKeHoach(nhaMay,item)" [(ngModel)]="nhaMay[prop]">
                </p-inputNumber>
              </td>
              <td class=" text-center tc-w-100">
              </td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>

  </p-panel>
</div>
<div class="modal-footer">
 
</div>
