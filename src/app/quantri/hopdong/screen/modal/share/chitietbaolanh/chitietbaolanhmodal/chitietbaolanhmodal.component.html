<div class="modal-header">

    <h5 class="modal-title">Bão lãnh hợp đồng</h5>
    <button *ngIf="false"
            type="button"
            class="close"
            aria-label="Close"
            (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>

<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4">
            <button pButton
                    pRipple
                    type="button"
                    label="Quay lại"
                    class="p-mr-2 p-button-sm"
                    (click)="activeModal.dismiss('close')"></button>
            <button pButton
                    pRipple
                    type="button"
                    label="Ghi lại"
                    class="p-mr-2 p-button-sm"></button>

        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Loại bảo lãnh:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <div class="p-col-12 p-xl-9 p-p-0">
                    <p-dropdown [filter]="true"
                                placeholder="Chọn loại bảo lãnh"
                                styleClass="p-inputtext-sm"></p-dropdown>
                </div>
            </div>
        </div>
        <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Số bảo lãnh:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <div class="p-col-12 p-xl-9 p-p-0">
                    <input type="text"
                           class="p-inputtext-sm"
                           pInputText />
                </div>
            </div>
        </div>
        <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">

            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Giá trị bảo lãnh <span class="required"></span> :</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-inputNumber class="p-col-6"
                               [minFractionDigits]="2"
                               locale="vi-VN"> </p-inputNumber>
            </div>
        </div>
        <div class="p-col-12 p-lg-2 p-d-flex p-flex-row p-ai-center p-pb-3 ">

            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Trước thuế </label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-checkbox name="groupname"
                            value="val1"></p-checkbox>
            </div>

        </div>
        <div class="p-col-12 p-lg-3 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">



            <p-inputNumber class="p-col-6"
                           [minFractionDigits]="2"
                           locale="vi-VN"> </p-inputNumber>
            <div class="p-p-0 p-d-flex p-ai-center p-jc-center">
                <span style="background-color: #ccc; padding: 7px"
                      class="p-input-icon-left"> <i class="fas fa-percent"></i>&nbsp; </span>
            </div>

        </div>

        <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Hiệu lực bảo lãnh:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <div class="p-col-12 p-xl-9 p-p-0">
                    <p-calendar inputStyleClass="p-inputtext-sm"
                                dateFormat="dd/mm/yy"
                                [yearNavigator]="true"
                                placeholder="dd/mm/yyyy"> </p-calendar>
                </div>
            </div>
        </div>
        <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tình trạng bảo lãnh:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <div class="p-col-12 p-xl-9 p-p-0">
                    <p-dropdown [filter]="true"
                                placeholder="Chọn tình trạng"
                                styleClass="p-inputtext-sm"></p-dropdown>
                </div>
            </div>
        </div>
        <div class="p-col-12  p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-1 p-p-0 my-auto">Ghi chú</label>

            <div class="p-col-11 p-p-0">
                <input type="text"
                       class="p-inputtext-sm"
                       pInputText />

            </div>
        </div>
    </div>
    <div class="modal-footer">

    </div>
