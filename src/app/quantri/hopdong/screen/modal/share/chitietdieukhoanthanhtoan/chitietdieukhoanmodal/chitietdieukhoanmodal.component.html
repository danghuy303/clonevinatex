<div class="modal-header">
    <!-- {{opt==='add'?'Thêm mới':'Cập nhật'}} -->
    <h5 class="modal-title">Thông tin thanh toán/tạm ứng</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
  
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm" (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm" ></button>
       
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Nội dung thanh toán/tạm ứng:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-1 p-p-0 my-auto">Giá trị:</label>
            <div class="p-col-12 p-d-flex p-lg-11 p-p-0">
                <p-inputNumber class="p-col-6" [minFractionDigits]="2" locale="vi-VN"> </p-inputNumber>
                <p-inputNumber class="p-col-2" [minFractionDigits]="2" locale="vi-VN"> </p-inputNumber>
                <div class="p-p-0 p-d-flex p-ai-center p-jc-center">
                    <span style="background-color: #ccc; padding: 7px" class="p-input-icon-left"> <i class="fas fa-percent"></i>&nbsp; <label style="margin: 0px" for="">hợp đồng</label> </span>
                </div>
                <div style="margin-left: 30px;" class="p-pl-4 p-lg-2 p-d-flex p-ai-center p-jc-center">
                    <p-checkbox value="val1"></p-checkbox>&nbsp;&nbsp; <label class="p-col-12 p-lg p-p-0 my-auto" style="margin: 0">Trước thuế</label>
                </div>
            </div>
        </div>

        <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Loại thanh toán/tạm ứng:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <p-dropdown [filter]="true" placeholder="Chọn loại thanh toán" styleClass="p-inputtext-sm"  ></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ngày thanh toán/tạm ứng:</label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-calendar inputStyleClass="p-inputtext-sm"  dateFormat="dd/mm/yy" [yearNavigator]="true"   placeholder="dd/mm/yyyy"> </p-calendar>
            </div>
        </div>
        <div class="p-mb-3 p-py-2">
            <button pButton pRipple label="Danh mục thủ tục thanh toán"   class="p-button-sm p-mr-2 p-my-3"></button>
            <div></div>
        <div class="p-col-12 p-p-0 d-flex flex-column">
            <p-table styleClass="p-datatable-sm wrap-text p-datatable-gridlines">
                <ng-template pTemplate="colgroup">
                    <colgroup>
                        <col style="width: 50px" />
                        <col />
                        <col />
                        <col />
                        <col />
                       
                        <!-- <col> -->
                        <!-- <col style="width:130px"> -->
                    </colgroup>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th>STT</th>
                        <th>Tên thủ tục</th>
                        <th>Bản gốc</th>
                        <th>Bản photo</th>
                        <th></th>
                        
                        <!-- <th>Số máy bố trí</th> -->
                        <!-- <th>Thao tác</th> -->
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-mathang let-i="rowIndex">
                    <!-- <tr>
                        <td class="text-center">{{ i + 1 }}</td>
                        <td class="text-center">{{ mathang.Ten }}</td>
                        <td class="text-center">
                            <p-dropdown [options]="mathang.listNMtemp" placeholder="Chọn Nm" styleClass="p-inputtext-sm" [(ngModel)]="mathang.ChiSoMoi" (onChange)="SetChiSo($event, mathang)"></p-dropdown>
                        </td>
                        <td class="text-center"> {{ mathang.KhoiLuongSanXuat | number: "0.0-2" }}
                          
                        </td>
                        <td class="text-center">{{ mathang.SanLuongCa | number: "0.0-2" }}</td>
                        <td class="text-center">{{ mathang.NangSuatDinhMuc | number: "0.0-2" }}</td>
                        <td class="text-center">{{ mathang.SoMayTinhToan | number: "0.0-2" }}</td>
                       
                    </tr> -->
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
<div class="modal-footer">
    <!-- <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2" (click)="accept()"></button>
    <button pButton pRipple label="Thoát" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"
        (click)="activeModal.dismiss()"></button> -->
</div>
