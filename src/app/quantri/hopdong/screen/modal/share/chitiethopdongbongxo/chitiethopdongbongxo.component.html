    <p-panel header="Thông tin hợp đồng" [style]="{ 'margin-bottom': '2em'}" [toggleable]="true">
        <div class="p-grid">
            <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Trích yếu:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Số hợp đồng:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Tên hợp đồng:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-3 p-p-0 my-auto">Loại hợp đồng:</label>
                <div class="p-col-12 p-xl-9 p-p-0">
                    <p-dropdown [filter]="true" placeholder="Chọn loại hợp đồng" styleClass="p-inputtext-sm"  ></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-3 p-p-0 my-auto">HĐ gốc:</label>
                <div class="p-col-12 p-lg-9 p-p-0">
                    <div class="p-inputgroup">
                        <input type="text" pInputText class="p-inputtext-sm"  disabled>
                        <button type="button" pButton pRipple icon="pi pi-upload"
                                class="p-button-sm p-button-text p-button-secondary"
                                ></button>
                </div>
                </div>
            </div>
            <div class="p-col-12 p-lg-3 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ngày ký:</label>
                <div class="p-col-12 p-xl-8 p-p-0">
                    <p-calendar inputStyleClass="p-inputtext-sm" [locale]="lang" dateFormat="dd/mm/yy" [yearNavigator]="true"   placeholder="dd/mm/yyyy"> </p-calendar>
                </div>
            </div>
            <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-3 p-p-0 my-auto">Giá trị hợp đồng:</label>
                <div class="p-col-12 p-xl-9 p-p-0">
                    <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.GiaBong">
                    </p-inputNumber>
                </div>
            </div>
            <div class="p-col-12 p-lg-3 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ngày bắt đầu:</label>
                <div class="p-col-12 p-xl-8 p-p-0">
                    <p-calendar inputStyleClass="p-inputtext-sm" [locale]="lang" dateFormat="dd/mm/yy" [yearNavigator]="true"   placeholder="dd/mm/yyyy"> </p-calendar>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ngày kết thúc:</label>
                <div class="p-col-12 p-xl-8 p-p-0">
                    <p-calendar inputStyleClass="p-inputtext-sm" [locale]="lang" dateFormat="dd/mm/yy" [yearNavigator]="true"   placeholder="dd/mm/yyyy"> </p-calendar>
                </div>
            </div>
            <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Triết khấu giữ lại:</label>
                <div class="p-col-12 p-xl-5 p-p-0 pr-2">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
                <div class="p-col-12 p-xl-3 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-3 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-3 p-p-0 my-auto">Loại tiền tệ:</label>
                <div class="p-col-12 p-xl-9 p-p-0">
                    <p-dropdown [filter]="true" placeholder="Chọn loại tiền tệ" styleClass="p-inputtext-sm"  ></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Hình thức thanh toán:</label>
                <div class="p-col-12 p-xl-8 p-p-0">
                    <p-dropdown [filter]="true" placeholder="Chọn hình thức thanh toán" styleClass="p-inputtext-sm"  ></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-2 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Bông:</label>
                <div class="p-col-12 p-xl-8 p-d-flex p-ai-center p-p-0">
                    <input type="radio" class="p-inputtext-sm" [(ngModel)]="item.isBong" />
                </div>
            </div>
            <div class="p-col-12 p-lg-3 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-4 p-p-0 my-auto">Xơ:</label>
                <div class="p-col-12 p-xl-8 p-d-flex p-ai-center p-p-0">
                    <input type="radio" class="p-inputtext-sm" [(ngModel)]="item.isXo" />
                </div>
            </div>
            <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-1 p-p-0 my-auto">Ghi chú:</label>
                <div class="p-col-12 p-xl-11 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <!-- thông tin nhà cung cấp -->
        </div>
    </p-panel>
    <p-panel header="Thông tin nhà cung cấp" [style]="{ 'margin-bottom': '2em'}" [toggleable]="true">
        <div class="p-grid">
            <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Tên công ty:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-3 p-p-0 my-auto">Người đại diện:</label>
                <div class="p-col-12 p-xl-9 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Địa chỉ:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Chức vụ:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-3 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-3 p-p-0 my-auto">Điện thoại:</label>
                <div class="p-col-12 p-xl-9 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Mã số thuế:</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <input type="text" class="p-inputtext-sm"  pInputText />
                </div>
            </div>
        </div>
    </p-panel>
