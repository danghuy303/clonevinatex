<div class="p-d-flex p-ai-center p-jc-between">
    <button pButton pRipple label="Thêm mới" icon="pi pi-plus" (click)="add()" class="p-button-sm p-mr-2"></button>
</div>
<div class="p-mt-2">
    <p-table styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines" [value]="quyTrinh.listKhieuNai">
        <ng-template pTemplate="colgroup">
            <colgroup>
                <col style="width:50px">
                <col style="width:120px">
                <col>
                <col>
                <col style="width:120px">
                <col>
                <col style="width:150px">
                <col style="width:100px">
            </colgroup>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th>STT</th>
                <th>Ngày khiếu nại</th>
                <th>Khách hàng</th>
                <th>Lô bông</th>
                <th>Ngày nhập</th>
                <th>Nội dung</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item let-i="rowIndex">
            <tr>
                <td class="text-center"> {{ i + 1 }} </td>
                <td class="text-center">{{item.NgayKhieuNai|date:'dd/MM/yyyy'}}</td>
                <td class="">{{item.khachHang}}</td>
                <td class="">{{item.tenLo}}</td>
                <td class="text-center">{{item.NgayLo |date:'dd/MM/yyyy'}}</td>
                <td class="">{{item.noiDung}}</td>
                <td class="text-center">{{item.TendmTrangThaiKhieuNai}}</td>
                <td class="text-center">
                    <button pButton pRipple type="button" icon="pi pi-pencil"
                        class="p-button-text p-button-sm p-button-secondary p-mr-2" (click)="edit(item,i)"
                        pTooltip="Sửa" showDelay="1000" tooltipPosition="bottom"></button>
                    <button pButton pRipple type="button" icon="pi pi-trash"
                        class="p-button-text p-button-sm p-button-secondary" (click)="delete(item,i)" pTooltip="Xóa"
                        showDelay="1000" tooltipPosition="bottom"></button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="summary">
            <!-- <div class="p-d-flex p-ai-center p-jc-between">
                Tổng số bản ghi {{paging.TotalItem}}.<p-paginator #paginator [totalRecords]="paging.TotalItem"
                    [rows]="20" (onPageChange)="changePage($event)"></p-paginator>
            </div> -->
        </ng-template>
    </p-table>
</div>
