<div class="bg-white p-p-3">
    <div class="p-mb-3 p-mt-3">
        <h4 style="color:#1f2779">Chi phí</h4>
    </div>
    <div class="d-flex justify-content-end p-mb-3">
        <strong>Tổng giá trị:{{tongGiaTriChiPhi | number:"0.0-0"}} (VNĐ)</strong>
    </div>
    <div class="p-mt-3">
        <p-table [value]="listChiPhiKhac"
            styleClass="p-datatable-sm wrap-text p-datatable-striped p-datatable-gridlines">
            <ng-template pTemplate="colgroup">
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center" style="width: 50px;">STT</th>
                    <th class="text-center">Tên chi phí</th>
                    <th class="text-center">Tháng/ Năm</th>
                    <th class="text-center">Giá trị</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center"> {{ 20 * (paging.CurrentPage - 1) + i + 1 }}</td>
                    <td> {{item.TenChiPhi}}</td>
                    <td class="text-center">{{item.Ngay | date:'MM/yyyy'}}</td>
                    <td class="text-right">{{item.GiaTri | number:"0.0-0"}}</td>
                </tr>
            </ng-template>
            <ng-template pTemplate="summary">
                <div class="p-d-flex p-ai-center p-jc-between">
                    Tổng số bản ghi {{paging.TotalCount}}.<p-paginator #paginator
                        [totalRecords]="paging.TotalCount" [rows]="20"
                        (onPageChange)="changePage($event)"></p-paginator>
                </div>
            </ng-template>
        </p-table>
    </div>
</div>
