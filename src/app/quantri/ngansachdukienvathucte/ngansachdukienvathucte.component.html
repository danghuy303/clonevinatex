<div class="content">
  <!-- input options -->
  <div class="options p-d-flex p-ai-center p-jc-between">
    <div class="p-d-flex flex-column flex-lg-row p-pl-0">
      <div class="p-d-flex flex-column flex-md-row mb-md-2 mb-lg-0">
        <div class="p-d-flex flex-column flex-md-row mb-md-2 mb-lg-0">
          <div class="p-mr-2">
            <p-dropdown [filter]="true" placeholder="Chọn bộ phận sử dụng" [options]="PhanXuong"
              styleClass="p-inputtext-sm" [(ngModel)]="filter.IdBoPhanSuDung" (onChange)="getDataBaoCao()"
              [showClear]="true"></p-dropdown>
          </div>
        </div>

        <div class="p-d-flex flex-column flex-md-row mb-md-2 mb-lg-0">
          <div class="p-mr-2">
            <p-dropdown [filter]="true" placeholder="Chọn loại thời gian" [options]="LoaiThoiGian"
              styleClass="p-inputtext-sm" [(ngModel)]="filter.LoaiThoiGian" (onChange)="getDataBaoCao()"></p-dropdown>
          </div>
        </div>

        <div class="p-mr-2">
          <p-calendar *ngIf="filter.LoaiThoiGian === 0" dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm"
            [monthNavigator]="true" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true"
            [(ngModel)]="filter.namThang" [locale]="lang" (onSelect)="getDataBaoCao()" inputId="icon"
            placeholder="dd/mm/yyyy">
          </p-calendar>
          <p-calendar *ngIf="filter.LoaiThoiGian === 2" dateFormat="mm/yy" view="month" inputStyleClass="p-inputtext-sm"
            [monthNavigator]="true" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true"
            [(ngModel)]="filter.namThang" [locale]="lang" (onSelect)="getDataBaoCao()" inputId="icon"
            placeholder="mm/yyyy">
          </p-calendar>
          <p-dropdown *ngIf="filter.LoaiThoiGian === 3" [filter]="true" [options]="listNam" [(ngModel)]="filter.nam"
            placeholder="Chọn năm" styleClass="p-inputtext-sm" (onChange)="getDataBaoCao()"></p-dropdown>
        </div>
        <!-- <div class="p-mr-2">
          <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" inputId="icon"
            placeholder="Từ ngày" [(ngModel)]="filter.TuNgay" (onSelect)="getDataBaoCao()">
          </p-calendar>
        </div>
        <div class="p-mr-2">
          <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" inputId="icon"
            placeholder="Đến ngày" [(ngModel)]="filter.DenNgay" (onSelect)="getDataBaoCao()">
          </p-calendar>
        </div> -->
      </div>
    </div>
  </div>

  <!-- chart -->
  <div class="bg-white mt-3 p-2">
    <h5 class="text-center">NGÂN SÁCH DỰ KIẾN VÀ THỰC TẾ</h5>
    <p-chart type="bar" [data]="data" [options]="chartOptions"></p-chart>

    <!-- <div>
      <p class="p-0 m-0" style="font-weight: bold">Chú thích:</p>
      <div>
        <span class="kehoach"></span>
        <span>Kế hoạch</span>
      </div>
      <div>
        <span class="thucte"></span>
        <span>Thực tế</span>
      </div>
    </div> -->
  </div>

  <div class="p-grid">
    <div class="p-col-12 p-lg-6 p-pl-0 p-pr-3">
      <app-baocaotonghoptaisanchiphivattu [filter]="filter"></app-baocaotonghoptaisanchiphivattu>
    </div>
    <div class="p-col-12 p-lg-6 p-pr-0 p-pl-3">
      <app-baocaotonghoptaisanchiphi [filter]="filter"></app-baocaotonghoptaisanchiphi>

    </div>
  </div>
</div>
