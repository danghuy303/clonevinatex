<div>
    <div class="modal-header">
        <div class="d-flex p-ai-center justify-content-between w-100">
            <h5 class="modal-title">{{opt==='add'?'Thêm mới':'Cập nhật'}} lô hàng</h5>
            <div *ngIf="item.MaQR" (click)="toggleZoomQR()" [ngClass]="{ 'zoomed': isQRZoomed }"
                style="display: inline-block; cursor: zoom-in; transition: transform 0.3s ease;">
                <qrcode *ngIf="item.MaQR" [qrdata]="item.QRType" [width]="isQRZoomed ? 200 : 50"
                    [errorCorrectionLevel]="'M'" [elementType]="'svg'">
                </qrcode>
            </div>
        </div>
    </div>
    <div class="modal-body">
        <div class="p-grid">
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Mã<span class="text-danger">*</span>:</label>
                <div class="p-col-12 p-lg-10 p-p-0 d-flex">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText />
                    <p-dropdown [filter]="true" [options]="options.listLoHang" placeholder="Danh sách mã lô"
                        optionLabel="Ma" [showClear]="true" style="width: 180px" [(ngModel)]="filter.LoHang"
                        styleClass="p-inputtext-sm" (onChange)="handleLoHang()"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tên<span class="text-danger">*</span>:</label>
                <div class="p-col-12 p-lg-10 p-p-0 d-flex">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ten" pInputText />
                    <p-dropdown [filter]="true" [options]="options.listLoHang" placeholder="Danh sách tên lô"
                        optionLabel="Ten" [showClear]="true" style="width: 180px" [(ngModel)]="filter.LoHang"
                        styleClass="p-inputtext-sm" (onChange)="handleLoHang()"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Chọn mặt hàng:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-dropdown [filter]="true" [options]="options.listMatHang" placeholder="Chọn"
                        [(ngModel)]="item._IddmItem" styleClass="p-inputtext-sm"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ngày<span class="text-danger">*</span>:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [locale]="lang"
                        [monthNavigator]="true" [yearNavigator]="true" [showIcon]="true" [(ngModel)]="item.Ngay"
                        inputId="icon" placeholder="dd/mm/yyyy">
                    </p-calendar>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Màu lõi:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="text" class="p-inputtext-sm" (keyup.enter)="accept()" [(ngModel)]="item.MauLoi"
                        pInputText />
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Quy cách đóng gói:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-dropdown [filter]="true" [options]="options.listQuyCach" placeholder="Chọn" (onChange)="handleQuyCach()"
                        [(ngModel)]="item.QuyCachDongGoi" styleClass="p-inputtext-sm"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Trọng lượng (Kg/cone):</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <!-- a_lap 29/8/2025 yc TrongLuongKg_Cone lấy theo trọng lượng qc.đóng gói -->
                    <!-- <p-dropdown [filter]="true" [options]="options.listKgCone" placeholder="Chọn"
                        [(ngModel)]="item.TrongLuongKg_Cone" styleClass="p-inputtext-sm"></p-dropdown> -->
                    <p-inputNumber locale="en-EN" [(ngModel)]="item.TrongLuongKg_Cone" styleClass="p-inputtext-sm" [min]="0"
                        disabled>
                    </p-inputNumber>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Giao kế hoạch:</label>
                <div class="p-col-12 p-lg-10 p-p-0 d-flex">
                    <p-dropdown [filter]="true" [options]="listGiaoKeHoach" placeholder="Chọn kế hoạch giao"
                        [(ngModel)]="item.IdGiaoKeHoachSanXuat" styleClass="p-inputtext-sm w-full" style="width: 100%"
                        (onChange)="giaoKeHoach($event)"></p-dropdown>
                    <button pButton pRipple type="button" icon="pi pi-eye" title="Xem chi tiết"
                        class="p-button-text p-button-sm p-button-secondary"
                        (click)="xemChiTiet(item.IdGiaoKeHoachSanXuat,'GIAOKEHOACHSANXUAT')"></button>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Triển khai kế hoạch:</label>
                <div class="p-col-12 p-lg-10 p-p-0 d-flex">
                    <p-dropdown [filter]="true" [options]="listGiaoKeHoach_TrienKhai"
                        placeholder="Chọn triển khai kế hoạch" [(ngModel)]="item.IdGiaoKeHoachSanXuat_TrienKhai"
                        styleClass="p-inputtext-sm w-full" style="width: 100%"></p-dropdown>
                    <button pButton pRipple type="button" icon="pi pi-eye" title="Xem chi tiết"
                        class="p-button-text p-button-sm p-button-secondary"
                        (click)="xemChiTiet(item.IdGiaoKeHoachSanXuat_TrienKhai,'TRIENKHAIKEHOACHSANXUAT')"></button>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Phương án pha bông:</label>
                <div class="p-col-12 p-lg-10 p-p-0 d-flex">
                    <p-dropdown [filter]="true" [options]="options.listPhaBong" placeholder="Chọn"
                        [(ngModel)]="item.PhuongAnPhaBong" styleClass="p-inputtext-sm w-full"
                        style="width: 100%"></p-dropdown>
                    <button pButton pRipple type="button" icon="pi pi-eye" title="Xem chi tiết"
                        class="p-button-text p-button-sm p-button-secondary"
                        (click)="xemChiTiet(item.PhuongAnPhaBong,'PHUONGANPHABONG')"></button>
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="text" class="p-inputtext-sm" (keyup.enter)="accept()" [(ngModel)]="item.GhiChu"
                        pInputText />
                </div>
            </div>
            <div class="p-col-12 flex-column flex-lg-row d-flex">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Hoạt động:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="checkbox" class="p-inputtext-sm" [(ngModel)]="item.HoatDong" />
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button *ngIf="item.MaQR" (click)="handleQR()" pButton pRipple label="In QR"
            class="p-button-sm p-mr-2"></button>
        <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2" (click)="accept()"
            [disabled]="khongclicknhieu"></button>
        <button pButton pRipple label="Thoát" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"
            (click)="activeModal.dismiss()"></button>
    </div>
    <p-dialog header="In QR" [(visible)]="isQR" [style]="{ width: '25vw' }" [modal]="true" [baseZIndex]="10000">
        <div class="p-grid">
            <div class="p-col-6 p-p-2 d-flex flex-column">
                <div class="p-mb-1">Chọn kích thước in:</div>
                <div>
                    <p-dropdown [filter]="true" [options]="listKichThuoc" placeholder="Chọn"
                        [(ngModel)]="item.IdKichThuoc" styleClass="p-inputtext-sm"></p-dropdown>
                </div>
            </div>
            <div class="p-col-3 p-p-2 d-flex flex-column">
                <div class="p-mb-1">Số bản:</div>
                <div>
                    <p-inputNumber locale="en-EN" [(ngModel)]="item.SoBan" styleClass="p-inputtext-sm" [min]="0">
                    </p-inputNumber>
                </div>
            </div>
            <div class="p-col-3 p-p-2 d-flex flex-column">
                <div class="p-mb-1">Khổ giấy:</div>
                <div>
                    <p-inputNumber locale="en-EN" [(ngModel)]="item.KhoGiay" styleClass="p-inputtext-sm" [min]="0"
                        placeholder="inch">
                    </p-inputNumber>
                </div>
            </div>
        </div>
        <ng-template pTemplate="footer">
            <p-button icon="pi pi-check" (click)="displayBasic = false" label="Xác nhận in" (click)="InQrCode()"
                styleClass="p-button-sm"></p-button>
        </ng-template>
    </p-dialog>

</div>
