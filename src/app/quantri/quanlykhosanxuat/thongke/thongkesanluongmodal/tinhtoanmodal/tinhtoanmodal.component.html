<div class="modal-header">
    <h5 class="modal-title">Tính toán</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-grid">
        <div class="col-6">
            <label>Chiều dài đầu</label>
            <input pInputText type="text" [(ngModel)]="item.ChieuDai_Dau" disabled>
        </div>
        <div class="col-6">
            <label>Chiều dài cuối</label>
            <input pInputText [(ngModel)]="item.ChieuDai_Cuoi" (keyup.enter)="accept()" type="number">
        </div>
    </div>
</div>
<div class="modal-footer">
    <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2" (click)="accept()"></button>
    <button pButton pRipple label="Hủy" class="p-button-sm p-button-outlined p-mr-2"
        (click)="activeModal.dismiss()"></button>
</div>
