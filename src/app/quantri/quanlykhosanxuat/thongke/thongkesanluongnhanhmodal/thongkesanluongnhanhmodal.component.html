<div class="modal-header">
   <h5 class="modal-title">Thống kê sản lượng</h5>
   <!-- <div class="p-col-12 p-lg-4 p-p-0 d-flex flex-column flex-lg-row">
        <label class="p-col-12 p-lg-4 p-p-0 my-auto">Nhà máy:</label>
        <div class="p-col-12 p-lg-8 p-p-0">
            <p-dropdown [filter]="true" [options]="listNhaMay" placeholder="Chọn nhà máy" styleClass="p-inputtext-sm"
                [(ngModel)]="item.NhaMay" [disabled]="true"></p-dropdown>
        </div>
    </div> -->
   <div class="d-flex flex-column flex-lg-row">
      <div>
         <!-- <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}} -->
      </div>
      <div class="ml-lg-3 mr-lg-3">
         <span style="font-weight: bold">TG Tạo:</span>
         {{ item.Created | date: 'dd/MM/yyyy HH:mm' }}
      </div>
      <div>
         <span style="font-weight: bold">TG Duyệt:</span>
         {{ item.Modified | date: 'dd/MM/yyyy HH:mm' }}
      </div>
   </div>
   <button
      *ngIf="false"
      type="button"
      class="close"
      aria-label="Close"
      (click)="activeModal.dismiss('Cross click')">
      <span aria-hidden="true">&times;</span>
   </button>
</div>
<div class="modal-body">
   <div class="p-d-flex p-flex-row p-jc-between">
      <div class="modal-bt p-mb-4">
         <button
            pButton
            pRipple
            type="button"
            label="Quay lại"
            class="p-mr-2 p-button-sm"
            (click)="onClose()"></button>
         <!-- <button pButton pRipple type="button" label="Định mức" class="p-mr-2 p-button-sm " (click)="DinhMuc()"></button> -->
         <button
            pButton
            pRipple
            type="button"
            label="Lưu nháp"
            class="p-mr-2 p-button-sm"
            (click)="GhiLai()"
            *ngIf="checkbutton.Ghi"></button>
         <button
            pButton
            pRipple
            type="button"
            label="Xóa"
            class="p-mr-2 p-button-sm"
            *ngIf="checkbutton.Xoa"
            (click)="XoaQuyTrinh()"></button>
         <!-- <button pButton pRipple type="button" label="Không duyệt" class="p-mr-2 p-button-sm" (click)="KhongDuyet()"
                *ngIf="checkbutton.KhongDuyet"></button> -->
         <button
            pButton
            pRipple
            type="button"
            label="Xác nhận"
            class="p-mr-2 p-button-sm"
            (click)="ChuyenDuyet()"
            *ngIf="checkbutton.ChuyenTiep"></button>
         <!-- <button pButton pRipple type="button" label="Kết xuất" class="p-mr-2 p-button-sm"></button> -->
      </div>
   </div>
   <div class="p-grid">
      <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày:</label>
         <div class="p-col-12 p-lg-8 p-p-0">
            <p-calendar
               dateFormat="dd/mm/yy"
               inputStyleClass="p-inputtext-sm"
               [locale]="lang"
               [monthNavigator]="true"
               [yearNavigator]="true"
               [yearRange]="yearRange"
               [showIcon]="true"
               [(ngModel)]="item.Ngay"
               inputId="icon"
               placeholder="dd/mm/yyyy"
               (onSelect)="GetThongKeSanLuongNhanh()">
            </p-calendar>
         </div>
      </div>
      <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-4 p-p-0 my-auto">Thời điểm:</label>
         <div class="p-col-12 p-lg-8 p-p-0">
            <p-dropdown
               [filter]="true"
               [options]="listCaSanXuat"
               placeholder="Thời điểm"
               styleClass="p-inputtext-sm"
               [(ngModel)]="item.IddmCaSanXuat"
               (onChange)="GetThongKeSanLuongNhanh()"></p-dropdown>
         </div>
      </div>
      <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-4 p-p-0 my-auto">Phân xưởng:</label>
         <div class="p-col-12 p-lg-8 p-p-0">
            <p-dropdown
               [filter]="true"
               [options]="listPhanXuong"
               placeholder="Chọn phân xưởng"
               styleClass="p-inputtext-sm"
               [(ngModel)]="item.IddmPhanXuong">
            </p-dropdown>
         </div>
      </div>
      <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-4 p-p-0 my-auto">Công đoạn:</label>
         <div class="p-col-12 p-lg-8 p-p-0">
            <p-dropdown
               [filter]="true"
               [options]="listCongDoan"
               placeholder="Chọn công đoạn"
               styleClass="p-inputtext-sm"
               [(ngModel)]="item.CongDoan">
            </p-dropdown>
         </div>
      </div>
      <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-4 p-p-0 my-auto"
            >Ca<span class="text-danger">*</span>:</label
         >
         <div class="p-col-12 p-lg-8 p-p-0">
            <p-dropdown
               [filter]="true"
               [options]="listCaThucTe"
               placeholder="Ca"
               styleClass="p-inputtext-sm"
               [(ngModel)]="item.IddmCaSanXuatThucTe"></p-dropdown>
         </div>
      </div>
      <!-- <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row" *ngIf="item.CongDoan=='ONG'">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Lô hàng:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listLoHang" placeholder="Chọn lô hàng" styleClass="p-inputtext-sm"
                    [(ngModel)]="item.IdLoHang"></p-dropdown>
            </div>
            <button pButton pRipple icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="addLoHang()"></button>
        </div> -->
      <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ghi chú:</label>
         <div class="p-col-12 p-lg-8 p-p-0">
            <input
               type="text"
               class="p-inputtext-sm"
               [(ngModel)]="item.GhiChu"
               pInputText />
         </div>
      </div>
      <div class="p-col-12 p-lg-12 p-p-3 d-flex flex-column flex-lg-row">
         <label class="p-col-12 p-lg-1 p-p-0 my-auto">Nội dung:</label>
         <div class="p-col-12 p-lg-11 p-pt-0 p-pr-0 p-pb-0 p-pl-5">
            <!-- <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText /> -->
            <textarea pInputTextarea [(ngModel)]="item.NoiDung"></textarea>
         </div>
      </div>
      <!-- <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Trừ vào sản lượng gian máy:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <input type="checkbox" class="p-inputtext-sm text-left" [(ngModel)]="item.isTruVaoSanLuong" (change)="TinhTongKhoiLuongBong()"/>
            </div>
        </div> -->
      <!-- {{ ((item.listCongDoan | itemByCongDoan: item.CongDoan)?.listHeader) |json}} -->
      <div class="p-col-12 p-p-0 d-flex flex-column">
         <table class="table-sm table-striped table-bordered " style="overflow-y: visible !important;">
            <thead class="thead-dark">
               <tr>
                  <th rowspan="2">Máy</th>
                  <th rowspan="2">Mặt hàng</th>
                  <th
                     *ngFor="
                        let ca of (
                           item.listCongDoan | itemByCongDoan: item.CongDoan
                        )?.listHeader
                     "
                     [attr.colspan]="ca.listColumn.length">
                     {{ ca.TenCaSanXuat }}
                  </th>
               </tr>
               <tr>
                  <ng-container
                     *ngFor="
                        let ca of (
                           item.listCongDoan | itemByCongDoan: item.CongDoan
                        )?.listHeader
                     ">
                     <th *ngFor="let col of ca.listColumn">
                        {{ col.Label }}
                     </th>
                  </ng-container>
               </tr>
            </thead>
            <tbody>
               <tr
                  *ngFor="
                     let may of (
                        item.listCongDoan | itemByCongDoan: item.CongDoan
                     )?.listMay
                  ">
                  <td>
                     {{ may.TendmMay }}
                  </td>
                  <td>
                     {{ may.TenMatHang }}
                  </td>
                  <ng-container *ngFor="let ca of may.listCaSanXuat">
                     <td *ngFor="let chiso of ca.listColumn">
                        <ng-container *ngIf="chiso.LoaiInput === 'double'">
                           <p-inputNumber
                              [minFractionDigits]="3"
                              locale="en-EN"
                              [(ngModel)]="chiso.GiaTri_Double">
                           </p-inputNumber>
                        </ng-container>
                        <ng-container *ngIf="chiso.LoaiInput === 'string'">
                           <input
                              type="text"
                              class="p-inputtext-sm"
                              [(ngModel)]="chiso.GiaTri_String"
                              pInputText />
                        </ng-container>
                        <ng-container *ngIf="chiso.LoaiInput === 'id'">
                           <p-dropdown
                              [filter]="true"
                              [options]="listLoHang"
                              placeholder="Chọn lô hàng"
                              styleClass="p-inputtext-sm"
                              [(ngModel)]="chiso.GiaTri_Id"></p-dropdown>
                        </ng-container>
                     </td>
                  </ng-container>
               </tr>
            </tbody>
         </table>
      </div>
   </div>
</div>
<div class="modal-footer"></div>
