<div style="width: 100%;">
    <div *ngIf="editing">
        <input style="width: 100%;" [required]="required" (blur)="onBlur($event)" (keyup.enter)="onEnter($event)" [name]="value" [(ngModel)]="value" [placeholder]="label" />
    </div>
    <div *ngIf="!editing">
        <a href="#" (click)="beginEdit(value)"  tabindex="0">{{value}}</a>
        <!-- (focus)="beginEdit(value)" -->
    </div>
</div>
