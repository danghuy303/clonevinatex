<div class="modal-header">
    <h5 class="modal-title">{{opt==='add'?'Thêm mới':'Cập nhật'}} phiếu nhập thông số chất lượng</h5>
    <div class="p-col-12 p-lg-4 p-p-0 d-flex flex-column flex-lg-row">
        <!-- <label class="p-col-12 p-lg-4 p-p-0 my-auto">Nhà máy:</label>
        <div class="p-col-12 p-lg-8 p-p-0">
            <p-dropdown [filter]="true" [options]="listNhaMay" placeholder="Chọn nhà máy" styleClass="p-inputtext-sm"
                [(ngModel)]="item.NhaMay"></p-dropdown>
        </div> -->
    </div>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="onClose()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="onClose()"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm " (click)="GhiLai()"
                *ngIf="checkbutton.Ghi"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton pRipple type="button" label="Không duyệt" class="p-mr-2 p-button-sm" (click)="KhongDuyet()"
                *ngIf="checkbutton.KhongDuyet"></button>
            <button pButton pRipple type="button" label="Chuyển duyệt" class="p-mr-2 p-button-sm"
                (click)="ChuyenDuyet()" *ngIf="checkbutton.ChuyenTiep"></button>
            <!-- <button pButton pRipple type="button" label="Kết xuất" class="p-mr-2 p-button-sm"></button> -->
        </div>

    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Lô bông:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [ngModel]="item.TenLoBong" disabled="true" pInputText/>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày nhập:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [locale]="lang"
                    [monthNavigator]="true" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true"
                    [(ngModel)]="item.Ngay" inputId="icon" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Container:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [ngModel]="item.TenContainer" disabled="true" pInputText/>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Số hợp đồng:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.SoHopDong" pInputText/>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Trọng lượng bình quân của 1 kiện:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <input type="number" class="p-inputtext-sm" [(ngModel)]="item.TrongLuong" pInputText/>
            </div>
        </div>
        <div class="p-col-12 p-p-0 d-flex flex-column">
            <div class="p-d-flex p-flex-row p-jc-between p-mb-3">
                <!-- <button pButton pRipple type="button" label="Nhận từ Excel" class="p-mr-2 p-button-sm"
                    (click)="chonThuaDat()"></button> -->
                <button pButton pRipple type="button" label="Nhập excel" class="p-mr-2 p-button-sm" (click)="importExcel()"></button>
            </div>
            <p-table [lazy]="true" [scrollable]="true" scrollHeight="45vh"
            [value]="item.listItem|isXoa" styleClass="p-datatable-sm wrap-text p-datatable-striped"
                selectionMode="single" [scrollable]="true" scrollHeight="40vh" [lazy]="true">
                <ng-template pTemplate="colgroup">
                    <colgroup>
                        <col style="width:50px">
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col style="width:100px">
                    </colgroup>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th rowspan="2">#</th>
                        <th rowspan="2">Kiện</th>
                        <th colspan="10">Chất lượng bông</th>
                        <th style="width:100px"></th>
                    </tr>
                    <tr>
                        <th>Neps</th>
                        <th>Mic</th>
                        <th>Mat</th>
                        <th>UHML</th>
                        <th>Str</th>
                        <th>SFI</th>
                        <th>Rd</th>
                        <th>+b</th>
                        <th>Tạp</th>
                        <th>Ẩm</th>
                        <th style="width: 100px;"></th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-item let-i="rowIndex">
                    <tr *ngIf="item.editField !== true">
                        <td class="text-center">{{i+1}}</td>
                        <td class="text-center">{{item.Ten}}</td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Neps">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Mic">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Mat">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.UHML">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Str">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.SFI">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Rd">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Tap">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.b">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="item.Am">
                            </p-inputNumber>
                         </td>
                        <td>
                            <!-- <button pButton pRipple icon="pi pi-pencil"
                                class="p-button-sm p-button-rounded p-button-secondary p-button-text"
                                (click)="editChiTiet(item,i)" pTooltip="Sửa" showDelay="1000"
                                tooltipPosition="bottom"></button> -->
                            <button pButton pRipple icon="pi pi-trash"
                                class="p-button-sm p-button-rounded p-button-secondary p-button-text"
                                (click)="delete(i)" pTooltip="Xóa" showDelay="1000"
                                tooltipPosition="bottom"></button>
                        </td>
                    </tr>
                    <tr *ngIf="item.editField === true">
                        <td class="text-center">{{i+1}}</td>
                        <td class="text-center">
                            <input pInputText type="text" [(ngModel)]="editTableItem.Ten">
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Neps">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Mic">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Mat">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.UHML">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Str">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.SFI">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Rd">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Tap">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.b">
                            </p-inputNumber>
                        </td>
                        <td class="text-center">
                            <p-inputNumber [minFractionDigits]="2" locale="vi-VN" [(ngModel)]="editTableItem.Am">
                            </p-inputNumber>
                         </td>
                        <td>
                            <button pButton pRipple icon="pi pi-check"
                                class="p-button-sm p-button-rounded p-button-secondary p-button-text"
                                (click)="saveEdit(editTableItem, i)" pTooltip="Lưu"
                                tooltipPosition="bottom"></button>
                            <button pButton pRipple icon="pi pi-times"
                                class="p-button-sm p-button-rounded p-button-secondary p-button-text"
                                (click)="cancelEdit(item, i)" pTooltip="Hủy"
                                tooltipPosition="bottom"></button>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
<div class="modal-footer">
    <!-- <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2" (click)="accept()"></button>
    <button pButton pRipple label="Thoát" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"
        (click)="activeModal.dismiss()"></button> -->
</div>
