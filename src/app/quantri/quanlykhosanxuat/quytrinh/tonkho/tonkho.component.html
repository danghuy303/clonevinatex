<div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <div class="p-col-3">
        <h4 style="color:#1f2779">Tồn kho</h4>
    </div>
    <div class=" p-d-flex p-ai-center p-jc-between p-col-9">
        <div class="p-mr-2">
            <h4 style="color:#1f2779">Danh sách chi tiết</h4>
        </div>
        <div></div>
        <div class="p-d-flex p-flex-row">
            <div class="p-inputgroup" style="width:200px">
                <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText
                    (keyup.enter)="GetListQuyTrinh(true)" [(ngModel)]="filter.KeyWord" />
                <button type="button" pButton pRipple icon="pi pi-search"
                    class="p-button-secondary p-button-sm p-button-text" (click)="GetListQuyTrinh(true)"
                    pTooltip="Tìm kiếm" showDelay="1000" tooltipPosition="bottom"></button>
                <button type="button" pButton pRipple icon="pi pi-refresh"
                    class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
            </div>
        </div>
    </div>

</div>
<div class="p-grid">
    <div class="p-col-3">
        <div class="card-body border scollTable">
            <dd style="max-height: 37rem; overflow-y: auto;">
                <li *ngFor="let item of listdmKho">
                    <span (click)="GetListQuyTrinh(true, item.Id)">
                        {{item.Ten}}
                    </span>
                </li>
            </dd>
        </div>
    </div>
    <div class="p-col-9">
        <p-table [value]="items" styleClass="p-datatable-sm p-datatable-striped" [scrollable]="true">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width:50px">
                    <col *ngFor="let col of cols" [ngStyle]="{width:col.width}">
                    <col style="width: 100px;">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center">STT</th>
                    <th *ngFor="let header of cols">
                        {{header.header}}
                    </th>
                    <th></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center">
                        {{ 20 * (paging.CurrentPage - 1) + i + 1 }}
                    </td>
                    <td class="text-center">
                        {{item.Ma}}
                    </td>
                    <td class="text-center">
                        {{item.Ten}}
                    </td>
                    <td class="text-center">
                        {{item.SoLuong|number:'0.0'}}
                    </td>
                    <td class="text-center">
                        <button pButton pRipple type="button" icon="pi pi-pencil"
                            class="p-button-text p-button-sm p-button-secondary p-mr-2"
                            (click)="changeParam(item.Id)"></button>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="summary">
                <div class="p-d-flex p-ai-center p-jc-between">
                    Tổng số bản ghi {{paging.TotalItem}}.<p-paginator #paginator [totalRecords]="paging.TotalItem"
                        [rows]="20" (onPageChange)="changePage($event)"></p-paginator>
                </div>
            </ng-template>
        </p-table>
    </div>
</div>
