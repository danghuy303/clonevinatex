<div class="modal-header">
    <h5 class="modal-title">Danh mục mặt hàng</h5>
</div>
<div class="modal-body">
    <div class="p-grid">
        <div class="p-col-12 p-p-0 d-flex flex-column">
            <div class="p-d-flex p-flex-row p-jc-between p-mb-3">
                <div>
                    <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2"  (click)="ChapNhan()"></button>
                    <button pButton pRipple label="Đóng" class="p-button-sm p-mr-2"
                        (click)="activeModal.dismiss()"></button>
                </div>
                <div>
                    <div class="p-inputgroup">
                        <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText
                            [(ngModel)]="filter.KeyWord" />
                        <button type="button" pButton pRipple icon="pi pi-refresh"
                            class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
                    </div>
                </div>
            </div>

            <p-table [value]="items|filter:filter.KeyWord"
                styleClass="p-datatable-sm wrap-text p-datatable-striped p-datatable-gridlines">
                <ng-template pTemplate="colgroup">
                    <colgroup>
                        <col style="width:50px">
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                    </colgroup>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <th>
                            <p-checkbox [(ngModel)]="checkedAll" (onChange)="checkAll($event)" binary="true"
                                inputId="binary"></p-checkbox>
                        </th>
                        <th>Mặt hàng</th>
                        <th>Mã</th>
                        <th>Loại sợi</th>
                        <th>Chi số Ne</th>
                        <th>Độ săn</th>
                        <th>Ghi chú</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-item let-i="rowIndex">
                    <tr>
                        <td class="text-center">
                            <p-checkbox [(ngModel)]="item.checked" (onChange)="checked()" binary="true"
                                inputId="binary"></p-checkbox>
                        </td>
                        <td>{{item.Ten}}</td>
                        <td>{{item.Ma}}</td>
                        <td>{{item.TendmLoaiSoi}}</td>
                        <td class="text-right">{{item.Ne|number:'0.0' }}</td>
                        <td class="text-right">{{item.DoSan|number:'0.0'}}</td>
                        <td>{{item.GhiChu}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
