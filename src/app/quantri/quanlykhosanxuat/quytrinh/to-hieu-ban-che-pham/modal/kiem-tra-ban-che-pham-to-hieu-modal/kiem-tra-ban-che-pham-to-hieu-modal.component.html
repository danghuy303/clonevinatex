<div class="modal-header">
    <h5 class="modal-title">
        Chọn máy kiểm kê</h5>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span>
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span>
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span>
        </div>
    </div>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" *ngIf="isKiemKe" label="Chấp nhận" class="p-mr-2 p-button-sm "
                (click)="ChapNhan()"></button>
            <button pButton pRipple *ngIf="checkbutton.Ghi" type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton *ngIf="checkbutton.ChuyenTiep" pRipple type="button" label="Chuyển duyệt"
                class="p-mr-2 p-button-sm " (click)="ChuyenDuyet()"></button>
            <button pButton *ngIf="checkbutton.KhongDuyet" pRipple type="button" label="Không duyệt"
                class="p-mr-2 p-button-sm " (click)="KhongDuyet()"></button>
        </div>
    </div>
    <div class="p-grid" *ngIf="isKiemKe">
        <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tháng/Năm:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                    [locale]="lang" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon"
                    [(ngModel)]="kiemke.Nam" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Phân xưởng:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn "
                    [(ngModel)]="kiemke.IddmPhanXuong" styleClass="p-inputtext-sm" [showClear]="false"
                    [filter]="true"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Máy:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-dropdown [filter]="true" [options]="listMay" placeholder="Chọn" [(ngModel)]="kiemke.CongDoan"
                    styleClass="p-inputtext-sm" [showClear]="false" [filter]="true"></p-dropdown>
            </div>
        </div>
    </div>
    <div *ngIf="!isKiemKe">
        <div class="p-grid">
            <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tháng/Năm:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                        [locale]="lang" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon"
                        [(ngModel)]="item.Nam" placeholder="dd/mm/yyyy" [disabled]="true">
                    </p-calendar>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Phân xưởng:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn "
                        [(ngModel)]="item.IddmPhanXuong" styleClass="p-inputtext-sm" [showClear]="false" [filter]="true"
                        [disabled]="true"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Máy:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-dropdown [filter]="true" [options]="listMay" placeholder="Chọn" [(ngModel)]="item.CongDoan"
                        styleClass="p-inputtext-sm" [showClear]="false" [filter]="true" [disabled]="true"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ca sản xuất:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-dropdown [filter]="true" [options]="listMay" placeholder="Chọn" [(ngModel)]="item.IddmMay"
                        styleClass="p-inputtext-sm" [showClear]="false" [filter]="true"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-8 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input locale="en-EN" [(ngModel)]="item.GhiChu" pInputText />
                </div>
            </div>
        </div>
        <div>
            <p-table [value]="item.listData1" styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines">
                <ng-template pTemplate="header">
                    <tr>
                        <th *ngFor="let kiemkehead of item.listHeader1" [attr.rowspan]="kiemkehead.rowspan"
                            [attr.colspan]="kiemkehead.colspan"
                            [ngStyle]="{'display': (kiemkehead.colspan || kiemkehead.rowspan) ? '' : 'none'}">
                            {{kiemkehead.name}}
                        </th>
                    </tr>
                    <tr>
                        <th *ngFor="let kiemkehead of item.listHeader1"
                            [ngStyle]="{'display': (kiemkehead.colspan || kiemkehead.rowspan) ? 'none' : ''}">
                            {{kiemkehead.name}}</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-item1 let-i="rowIndex">
                    <tr>
                        <td>{{item1.STT}}</td>
                        <td>{{item1.TendmMay}}</td>
                        <td>{{item1.ThanhPhan}}</td>
                        <td *ngFor="let data of item1.listGiaTri">
                            <p-inputNumber [minFractionDigits]="data.SoSauDauPhay" mode="decimal" locale="en-US" 
                                [(ngModel)]="data?.GiaTri"
                                [disabled]="data.isDisable"></p-inputNumber>
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
