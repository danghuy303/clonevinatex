<div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-grid">
        <div class="p-col-12 p-d-flex p-flex-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Mã<span class="text-danger">*</span>:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-d-flex p-flex-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tên<span class="text-danger">*</span>:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ten" pInputText />
            </div>
        </div>  
        <div class="p-col-12 p-d-flex p-flex-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.GhiChu" pInputText />
            </div>
        </div>       
        <div class="p-col-12 p-p-0 d-flex flex-column">
            <div class="p-d-flex p-flex-sm-row p-jc-between p-mt-3 p-mb-3">
                <div class="p-d-flex p-flex-row">
                    <button pButton pRipple label="Danh sách hàng" icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="DanhSachHang()"></button>               
                </div>
                <div class="p-d-flex p-flex-row">
                    <div class="p-inputgroup">
                        <input type="text" placeholder="Tìm kiếm" [(ngModel)]="keyWord" (keyup.enter)="TimKiem(true)" class="p-inputtext-sm" pInputText />
                        <button type="button" pButton pRipple icon="pi pi-refresh" class="p-button-secondary p-button-text"(click)="resetFilter()" pTooltip="Làm mới" showDelay="1000" tooltipPosition="bottom"></button>                    
                    </div>
                </div>
            </div>
            <p-table [value]="items" [(selection)]="selectedItems" styleClass="p-datatable-sm wrap-text p-datatable-striped" [scrollable]="true">
                <ng-template pTemplate="colgroup">
                    <colgroup>
                        <col style="width:50px">                
                        <col>
                        <col>
                        <col>
                        <col>
                        <col>
                        <col style="width: 50px;">                   
                    </colgroup>
                </ng-template>
                <ng-template pTemplate="header">
                    <tr>
                        <!-- <th>
                            <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                        </th> -->    
                        <th class="text-center">STT</th>                
                        <th>Mặt hàng</th>
                        <th>Năng suất LT</th>
                        <th>Hiệu suất (%)</th>
                        <th>Định mức năng suất</th>
                        <th>Ghi chú</th>
                        <th></th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-item let-i="rowIndex">
                    <tr>                
                        <td class="text-center">
                            {{ i + 1 }}
                        </td>
                        <td>
                            <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText [disabled]="true"/>
                        </td>
                        <td>
                            <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="items.SoCu">
                            </p-inputNumber>
                        </td>
                        <td>
                            <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="items.SoCu">
                            </p-inputNumber>
                        </td>
                        <td>
                            <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="items.SoCu" [disabled]="true">
                            </p-inputNumber>
                        </td>
                        <td>
                            <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText/>
                        </td>
                        <td class="text-center" >                        
                            <button pButton pRipple type="button" icon="pi pi-trash"
                                class="p-button-text p-button-sm p-button-secondary" (click)="delete(item)" pTooltip="Xóa" showDelay="1000" tooltipPosition="bottom"></button>
                        </td>                 
                    </tr>
                </ng-template>           
            </p-table>
        </div>                
    </div>
</div>
<div class="modal-footer">
    <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2" (click)="accept()" [disabled]="khongclicknhieu"></button>
    <button pButton pRipple label="Thoát" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"
        (click)="activeModal.dismiss()"></button>
</div>
