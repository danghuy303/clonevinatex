<div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-col-12 p-p-0 d-flex flex-column">
        <div class="p-d-flex p-flex-sm-row p-jc-between p-mt-3 p-mb-3">
            <div class="p-d-flex p-flex-row">
                
            </div>
            <div class="p-d-flex p-flex-row">
                <p-dropdown [filter]="true" [options]="listloaisoi" placeholder="Chọn" [(ngModel)]="filter.idNhaMay"
                styleClass="p-inputtext-sm"></p-dropdown>
                <div class="p-inputgroup">
                    <input type="text" placeholder="Tìm kiếm" [(ngModel)]="filter.keyWord" (keyup.enter)="TimKiem(true)" class="p-inputtext-sm" pInputText />
                    <button type="button" pButton pRipple icon="pi pi-refresh" class="p-button-secondary p-button-text"(click)="resetFilter()" pTooltip="Làm mới" showDelay="1000" tooltipPosition="bottom"></button>                    
                </div>
            </div>
        </div>
        <p-table [value]="items" [(selection)]="selectedItems" styleClass="p-datatable-sm wrap-text p-datatable-striped" [scrollable]="true">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width:50px">                   
                    <col *ngFor="let col of cols" [ngStyle]="{width:col.width}">                    
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center">
                        <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                    </th>                   
                    <th *ngFor="let header of cols">
                        {{header.header}}
                    </th>  
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>       
                    <td class="text-center">
                        <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                    </td>           
                    <td *ngFor="let col of cols">
                        {{item[col.field]}}
                    </td>                  
                </tr>
            </ng-template>           
        </p-table>
    </div>      
</div>
<div class="modal-footer">
    <button pButton pRipple label="Chấp nhận" class="p-button-sm p-mr-2" (click)="accept()" [disabled]="khongclicknhieu"></button>
    <button pButton pRipple label="Thoát" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"
        (click)="activeModal.dismiss()"></button>
</div>
