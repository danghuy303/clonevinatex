<div class="modal-header">
    <h4 style="color:#1f2779">Định mức</h4>
</div>
<div class="modal-body">
    <div class="p-d-flex p-ai-center p-jc-between p-mb-3">
        <div class="modal-bt ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('Cross click')"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm"
                (click)="handleSave()"></button>
        </div>
    </div>
    <p-table [value]="items" styleClass="p-datatable-sm  p-datatable-gridlines my-sticky-table" [scrollable]="true"
        scrollHeight="70vh" scrollDirection="both">
        <ng-template pTemplate="colgroup" let-columns>
            <colgroup>
                <col style="width:120px">
                <col style="width:120px">
                <col style="width:120px">
                <col style="width:120px">
                <col style="width:120px">
                <col style="width:120px">
            </colgroup>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th class="text-center">kWh/Kg (HB1+HB2)</th>
                <th class="text-center">kWh/Kg (HB3+4)</th>
                <th class="text-center">kWh/Kg (HB5+6)</th>
                <th class="text-center">kWh/Kg (HBCK)</th>
                <th class="text-center">kWh/Kg Ne30</th>
                <th class="text-center">kWh/Kg sợi xe quy về Ne30/2, săn 600</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item let-i="rowIndex">
            <tr>
                <td class="text-right">
                    <p-inputNumber mode="decimal" [minFractionDigits]="3" [maxFractionDigits]="3" locale="en-US"
                        [(ngModel)]="item.kWhKgHB12" class="text-right"></p-inputNumber>
                </td>
                <td class="text-right">
                    <p-inputNumber mode="decimal" [minFractionDigits]="3" [maxFractionDigits]="3" locale="en-US"
                        [(ngModel)]="item.kWhKgHB34" class="text-right"></p-inputNumber>
                </td>
                <td class="text-right">
                    <p-inputNumber mode="decimal" [minFractionDigits]="3" [maxFractionDigits]="3" locale="en-US"
                        [(ngModel)]="item.kWhKgHB56" class="text-right"></p-inputNumber>
                </td>
                <td class="text-right">
                    <p-inputNumber mode="decimal" [minFractionDigits]="3" [maxFractionDigits]="3" locale="en-US"
                        [(ngModel)]="item.kWhKgHBCK" class="text-right"></p-inputNumber>
                </td>
                <td class="text-right">
                    <p-inputNumber mode="decimal" [minFractionDigits]="3" [maxFractionDigits]="3" locale="en-US"
                        [(ngModel)]="item.kWhNe30" class="text-right"></p-inputNumber>
                </td>
                <td class="text-right">
                    <p-inputNumber mode="decimal" [minFractionDigits]="3" [maxFractionDigits]="3" locale="en-US"
                        [(ngModel)]="item.kWhNe30Xe" class="text-right"></p-inputNumber>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
