<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}}
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span> {{item.Created|date:"dd/MM/yyyy HH:mm"}}
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span> {{item.NgayDuyet|date:"dd/MM/yyyy HH:mm"}}
        </div>
    </div>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple *ngIf="checkbutton.Ghi" type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton *ngIf="checkbutton.ChuyenTiep" pRipple type="button" label="Chuyển duyệt"
                class="p-mr-2 p-button-sm " (click)="ChuyenDuyet()"></button>
            <button pButton *ngIf="checkbutton.KhongDuyet" pRipple type="button" label="Không duyệt"
                class="p-mr-2 p-button-sm " (click)="KhongDuyet()"></button>
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày bảo hiểm:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                    [locale]="lang" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon"
                    [(ngModel)]="item.NgayBaoHiem" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Số phiếu:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <input locale="en-EN" [(ngModel)]="item.SoPhieu" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Nội dung: </label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <input locale="en-EN" [(ngModel)]="item.NoiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Giá trị:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-inputNumber inputId="integeronly" [(ngModel)]="item.GiaTri"> </p-inputNumber>
            </div>
        </div>
        <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày bắt đầu:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                    [locale]="lang" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon"
                    [(ngModel)]="item.NgayBatDau" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày hết hạn:</label>
            <div class="p-col-12 p-lg-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                    [locale]="lang" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon"
                    [(ngModel)]="item.NgayHetHan" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-3 d-flex flex-column flex-xl-row">
            <div class="p-field-checkbox">
                <p-checkbox [(ngModel)]="item.isNhacHetHan" binary="true"></p-checkbox>
                <label for="ny">Nhắc hết hạn</label>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Đơn vị bảo hiểm:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-dropdown [filter]="true" [options]="listKiemDinh" placeholder="Chọn" styleClass="p-inputtext-sm"
                    [(ngModel)]="item.IdDonViKiemDinh">
                </p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <textarea [(ngModel)]="item.GhiChu" [rows]="1" pInputTextarea></textarea>
            </div>
        </div>
    </div>
    <div class="p-d-flex p-flex-row p-jc-between p-grid">
        <div class="modal-bt p-col-12 p-lg-4 p-py-3 p-px-0 d-flex flex-column flex-xl-row ">
            <button pButton pRipple type="button" label="Thêm máy/thiết bị" class="p-mr-2 p-button-sm "
                (click)="ThemMoiDanhSachTaiSan()"></button>
        </div>
    </div>
    <p-treeTable [value]="item.listTaiSan" styleClass="p-treetable p-treetable-caption">
        <ng-template pTemplate="colgroup">
            <colgroup>
                <col style="width: 50px;">
                <col>
                <col>
                <col>
                <col style="width: 80px;">
            </colgroup>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th class="text-center">STT</th>
                <th class="text-center">Mã </th>
                <th class="text-center">Tên</th>
                <th class="text-center">Ghi chú</th>
                <th class="text-center">Thao tác</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
            <tr>
                <td class="text-center"> {{rowData.STT}}</td>
                <td class="">
                    <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
                    {{rowData.MaTaiSan}}
                </td>
                <td>
                    {{rowData.TenTaiSan}}
                </td>
                <td class="text-center">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="rowData.GhiChu" [ngbTooltip]="rowData.GhiChu"
                        pInputText />
                </td>
                <td class="text-center">
                    <button pButton pRipple type="button" icon="pi pi-trash"
                        class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Xóa"
                        (click)=" delete(rowData)"></button>
                </td>
            </tr>
        </ng-template>
    </p-treeTable>
</div>
