  <div class="p-col-12 p-p-0 pintable-container" style="height: 45vh;" voiPintable [pinnedCols]="1">
    <table>
        <thead>
            <tr>
                <th class="tc-w-300 text-center" style="z-index: 999;">Tài sản/vật tư</th>
                <th class="tc-w-100 text-center"></th>
                <th *ngFor="let label of labelThang" class="tc-w-300"> {{label}}</th>
                <th class="tc-w-300 text-center">Tổng tiền (VNĐ)</th>
            </tr>
        </thead>
        <tbody>
            <ng-container *ngFor="let item of items; let i = index">
                <tr> 
                    <td class="tc-w-300" style="font-weight: bold; background-color: white;z-index: 999; "> {{item.TenTaiSan}} </td>
                    <td class="tc-w-100"></td>
                    <td class="text-right tc-w-300" *ngFor=" let thanhtien of item.TongThanhTien; let i=index"  style="font-weight: bold;" > 
                        <div [ngStyle]="{'display': ((i+1) < item.ThoiGian ?'none':'block')}">
                            {{thanhtien | number:'0.0-0'}}
                        </div>
                    </td>
                    <td  class="tc-w-300 text-right">
                        {{ item.TongGiaTri | number:'0.0-0'}}
                    </td>
                </tr>
                <tr *ngFor="let vattu of item.listVatTu">
                    <td class="tc-w-300"  style="background-color: white;z-index: 999; "> {{vattu.TenTenSan}}</td>
                    <td class="tc-w-100">
                        <div style="padding: 6.125px 0px;">
                            <span>Số lượng:</span>
                        </div>
                        <div style="padding: 6.125px 0px;">
                            <span>Đơn giá:</span>
                        </div>
                    </td>
                    <td *ngFor="let ThoiGianVatTu of vattu.listThoiGian" class="tc-w-300 text-right"> 
                        <div class=" tc-w-300" style="align-items: center;"> 
                            <p-inputNumber inputId="locale-indian" mode="decimal" locale="en-IN" styleClass="p-inputtext-sm"
                                [(ngModel)]="ThoiGianVatTu.SoLuong" (onBlur)="tongTien(item)" [disabled]="ThoiGianVatTu.ThoiGian<item.ThoiGian">
                            </p-inputNumber>
                        </div>
                        <div class="tc-w-300" style="align-items: center;">
                            <p-inputNumber inputId="locale-indian" mode="decimal" locale="en-IN" styleClass="p-inputtext-sm" (onBlur)="tongTien(item)" [disabled]="ThoiGianVatTu.ThoiGian<item.ThoiGian"
                                [(ngModel)]="ThoiGianVatTu.DonGia">
                            </p-inputNumber>
                        </div>
                    </td>
                    <td class="tc-w-300 text-right"> {{ vattu.ThanhTien12Thang | number:'0.0-0'}}</td>
                </tr>
            </ng-container>
        </tbody>
    </table>
</div>
