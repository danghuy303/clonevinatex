<div class="p-d-flex p-flex-row p-jc-end p-grid flex-d">
    <div class="modal-bt p-mb-4 p-col-12 p-lg-2  p-p-3 d-flex flex-column flex-lg-row">
        <label class="p-col-12 p-lg-4 p-p-0 my-auto"> </label>
        <div class="p-col-12 p-lg-8 p-p-0">
            Tổng số:thiết bị
        </div>
    </div>
</div>
<p-table [value]="item" styleClass="p-datatable-sm wrap-text p-datatable-striped p-datatable-gridlines">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width:100px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
            <col style="width:50px">
        </colgroup>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th class="text-center">Tài sản/vật tư</th>
            <th class="text-center">Tháng 1</th>
            <th class="text-center">Tháng 2</th>
            <th class="text-center">Tháng 3</th>
            <th class="text-center">Tháng 4</th>
            <th class="text-center">Tháng 5</th>
            <th class="text-center">Tháng 6</th>
            <th class="text-center">Tháng 7</th>
            <th class="text-center">Tháng 8</th>
            <th class="text-center">Tháng 9</th>
            <th class="text-center">Tháng 10</th>
            <th class="text-center">Tháng 11</th>
            <th class="text-center">Tháng 12</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
        <tr>
            <td class="text-center"> {{item.TenTaiSan}}</td>
            <td  style="text-align: right;" *ngFor="let chiPhi of item?.listChiPhi">
                <p-inputNumber *ngFor="let bd of chiPhi.ChiTietChiPhi" [minFractionDigits]="0" locale="en-EN" Class="p-inputtext-sm" [(ngModel)]="bd.DonGia" >
                </p-inputNumber>
                <p-inputNumber *ngFor="let bd of chiPhi.ChiTietChiPhi" [minFractionDigits]="0" locale="en-EN" Class="p-inputtext-sm" [(ngModel)]="bd.SoLuong" >
                </p-inputNumber>
            </td>
        </tr>
    </ng-template>
</p-table>
