<div class="modal-header">
    <h5 class="modal-title"> {{title}}
    </h5>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm"
                (click)="GhiLai()"></button>

        </div>
    </div>
    <div class="">
        <p-table [value]="listTaiSan" [paginator]="true" [rows]="10"
            styleClass="p-datatable-sm p-datatable-striped p-datatable-gridlines">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width:50px">
                    <col style="width: 150px;">
                    <col>
                    <col style="width: 150px;">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center">STT</th>
                    <th class="text-center">Mã</th>
                    <th class="text-center">Tên</th>
                    <th class="text-center">Đơn giá</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center"> {{ i + 1 }} </td>
                    <td class=""> {{item.Ma}} </td>
                    <td class="">{{item.Ten}}</td>
                    <td>
                        <p-inputNumber locale="en-EN" [(ngModel)]="item.DonGia" [minFractionDigits]="2"
                            [maxFractionDigits]="2" placeholder="">
                        </p-inputNumber>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="paginatorleft">
                <b>Tổng số bản ghi {{listTaiSan.length}}</b>
            </ng-template>
        </p-table>
    </div>
</div>
