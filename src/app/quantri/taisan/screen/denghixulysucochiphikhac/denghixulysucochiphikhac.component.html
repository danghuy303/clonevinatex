<div class="p-d-flex p-flex-row p-jc-between p-ai-center">
    <div class="modal-bt p-mb-4 ">
        <!-- <button pButton pRipple type="button" label="Thêm tài sản" class="p-mr-2 p-button-sm"></button> -->
    </div>
    <div class="modal-bt p-mb-4 ">
        Tổng chi phí: {{this.TongChiPhi}}
    </div>
</div>
<p-table [value]="items" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width: 50px;">
            <col>
            <col>
            <col>
            <col>
            <col style="width: 100px;">
        </colgroup>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th class="text-center ">
                STT
            </th>
            <th class="text-center ">Mã</th>
            <th class="text-center">Tên</th>
            <th class="text-center ">Giá trị </th>
            <th class="text-center ">Ghi chú</th>
            <th class="text-center ">Thao tác</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
        <tr>
            <td>{{i+1}}</td>
            <td>{{item.MaTaiSan}}</td>
            <td>{{item.TenTaiSan}}</td>
            <td class=" text-right">{{item.ThanhTien}}</td>
            <td>{{item.GhiChu}}</td>
            <td class="text-center">
                <button pButton pRipple type="button" icon="pi pi-plus" class="p-button-rounded p-button-sm "
                    (click)="add2(item)"></button>
            </td>
        </tr>
        <ng-container *ngFor="let chiphi of item.listChiPhiKhac">
            <tr>
                <td></td>
                <td></td>
                <td style="padding-left: 50px;"><input type="text" pInputText [(ngModel)]="chiphi.Ten"
                        placeholder="Chi pHí khác" /></td>
                <td class=" text-right">
                    <p-inputNumber [(ngModel)]="chiphi.GiaTri" (onBlur)="TinhTong(chiphi)"></p-inputNumber>
                </td>
                <td></td>
                <td class="text-center"> <button pButton pRipple type="button" icon="pi pi-trash"
                        class="p-button-text p-button-sm p-button-secondary" (click)="delete(item,index)" pTooltip="Xóa"
                        showDelay="1000" tooltipPosition="bottom"></button></td>
            </tr>
        </ng-container>

    </ng-template>
</p-table>
