<div class="p-mb-3 p-mt-3">
  <h4 style="color:#1f2779">Lịch sử sử dụng tài sản</h4>
</div>

<div class="p-d-flex p-ai-center p-jc-end p-mb-3">
  <div class="p-d-flex p-flex-row">
    <div class="p-mr-2">
      <p-dropdown placeholder="Loại tài sản" [filter]="true" [showClear]="true" styleClass="p-inputtext-sm">
      </p-dropdown>
    </div>
    <div class="p-mr-2">
      <p-dropdown placeholder="Bộ phận sử dụng" [filter]="true" [showClear]="true" styleClass="p-inputtext-sm">
      </p-dropdown>
    </div>
    <div class="p-mr-2">
      <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" inputId="icon"
        placeholder="Từ ngày">
      </p-calendar>
    </div>
    <div class="p-mr-2">
      <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" inputId="icon"
        placeholder="Đến ngày">
      </p-calendar>
    </div>
    <div class="p-inputgroup" style="width: 200px;">
      <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText />
      <button type=" button" pButton pRipple icon="pi pi-search"
        class="p-button-secondary p-button-sm p-button-text"></button>
      <button type="button" pButton pRipple icon="pi pi-refresh"
        class="p-button-secondary p-button-sm p-button-text"></button>
    </div>
  </div>
</div>

<p-table [value]="items" styleClass="p-datatable-gridlines p-datatable-sm  p-datatable-striped">
  <ng-template pTemplate="colgroup">
    <colgroup>
      <col style="width: 50px">
      <col>
      <col>
      <col>
      <col>
      <col style="width: 50px">
    </colgroup>
  </ng-template>
  <ng-template pTemplate="header">
    <tr>
      <th>STT</th>
      <th>Mã tài sản</th>
      <th>Tên tài sản</th>
      <th>Ngày</th>
      <th>Nội dung biến động</th>
      <th></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item let-i="rowIndex">
    <tr>
      <td  class="text-center">{{20 * (paging.CurrentPage - 1) + i + 1 }}</td>
      <td>{{item.MaTaiSan}}</td>
      <td>{{item.TenTaiSan}}</td>
      <td  class="text-center">{{item.Ngay | date:'dd/MM/yyyy'}}</td>
      <td>{{item.NoiDungBienDong}}</td>
      <td  class="text-center">
        <button pButton pRipple type="button" icon="pi pi-pencil"
          class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Chỉnh sửa" (click)="Edit(item)"></button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="summary">
    <div class="p-d-flex p-ai-center p-jc-between"> Tổng số bản ghi {{paging.totalCount}}.
      <p-paginator #paginator [totalRecords]="paging.totalCount" [rows]="20" (onPageChange)="changePage($event)">
      </p-paginator>
    </div>
  </ng-template>
</p-table>
