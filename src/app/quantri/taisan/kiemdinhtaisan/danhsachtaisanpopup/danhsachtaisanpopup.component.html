<div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 d-flex">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm"
                (click)="handleChapNhan()"></button>
        </div>
        <div class="mr-3 p-inputgroup" [style]="{ width: '20vw', height: '36px' }">
            <input #inputtt1 type="text" pInputText class="p-inputtext-sm"
                (input)="tb.filterGlobal($event.target.value, 'contains')" placeholder="Tìm kiếm" />
            <button type="button" pButton pRipple icon="pi pi-refresh" styleClass="p-button-warn p-inputtext-sm"
                (click)="tb.filterGlobal($event.target.value, '')" (click)="inputtt1.value = ''"></button>
        </div>
    </div>
    <div class="p-mt-3">
        <p-table #tb [value]="listView" [globalFilterFields]="['Ma','Ten']"
            styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width: 50px">
                    <col style="width: 50px">
                    <col style="width: 180px">
                    <col>
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center">
                        <p-checkbox [(ngModel)]="checkAll" binary="true" inputId="binary"
                            (onChange)="selectAll()"></p-checkbox>
                    </th>
                    <th class="text-center">STT</th>
                    <th class="text-center">Mã</th>
                    <th class="text-center">Tên</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center">
                        <p-checkbox [(ngModel)]="item.checked" binary="true" inputId="binary"
                            (onChange)="select()"></p-checkbox>
                    </td>
                    <td class="text-center">{{i+1}} </td>
                    <td class="">{{item.MaTaiSan}} </td>
                    <td class="">{{item.TenTaiSan}} </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
