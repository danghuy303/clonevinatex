<div class="modal-header">
  <div class="p-d-flex p-flex-row">
    <div class="p-mr-2">
      <div class="p-field-checkbox ischon">
        <p-checkbox binary="true" [(ngModel)]="item.isChon" (onChange)="isChon(item)"></p-checkbox>
        <label>Tình trạng bảo dưỡng</label>
      </div>
    </div>
    <div class="p-mr-2">
      <div class="p-field-radiobutton ischon" *ngIf="item.isChon">
        <p-radioButton [value]="0" [(ngModel)]="item.isChonNam" (onClick)="isChonNam()"></p-radioButton>
        <label>Theo năm</label>
      </div>
    </div>
    <div class="p-mr-2">
      <div class="p-field-radiobutton ischon" *ngIf="item.isChon ">
        <p-radioButton [value]="1" [(ngModel)]="item.isChonThang" (onClick)="isChonThang()"></p-radioButton>
        <label>Theo tháng</label>
      </div>
    </div>
    <div class="p-mr-2" *ngIf="item.isChonNam === 0 && item.isChon">
      <p-dropdown [filter]="true" [options]="listNam" placeholder="Chọn năm" [(ngModel)]="filter.Nam"
        styleClass="p-inputtext-sm" (onChange)="isChonNam()"></p-dropdown>
    </div>
    <div class="p-mr-2" *ngIf="item.isChonThang ===1 && item.isChon">
      <p-dropdown [filter]="true" [options]="listThang" placeholder="Chọn tháng" [(ngModel)]="filter.Thang"
        styleClass="p-inputtext-sm" (onChange)="isChonThang()"></p-dropdown>
    </div>
  </div>
</div>

<div class="modal-body">
  <p-table [value]="itemLichBaoDuong" *ngIf="!item.isChon" styleClass="p-datatable-sm wrap-text p-datatable-striped">
    <ng-template pTemplate="colgroup">
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th class="text-center">STT</th>
        <th class="text-center">Máy/Thiết bị</th>
        <!-- <th class="text-center" *ngFor="let tendm of itemLichBaoDuong[0]?.listThoiGianNangSuat"> {{tendm.TGNS}}</th> -->
        <th *ngFor="let dmbd of listdmLoaiBaoDuong" class="text-center">{{dmbd.TendmLoaiBaoDuong}}</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
      <tr>
        <td class="text-center">{{i + 1}}</td>
        <!-- <td class="text-center">{{item.TendmLoaiBaoDuong}}</td> -->
        <td class="text-center">{{item.TenTaiSan }}</td>
        <td class="text-center" *ngFor="let newItem of item.listBaoDuong">
          {{newItem.IsChon?'X':''}}
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-table [value]="items.listBaoDuong" *ngIf="item.isChon"
    styleClass="p-datatable-sm wrap-text p-datatable-striped  p-datatable-gridlines" [scrollable]="false">
    <ng-template pTemplate="colgroup">

    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th class="text-center" style="width: 120px !important; max-width: 120px !important;">Loại bảo dưỡng</th>
        <ng-container *ngIf="!item.isChonNam">
          <th class="text-center" *ngFor="let label of items.listThoiGian">Tháng {{label}}</th>
        </ng-container>
        <ng-container *ngIf="item.isChonNam">
          <th class="text-center" *ngFor="let label of items.listThoiGian"> {{label}}</th>
        </ng-container>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
      <tr>
        <td>
          {{item.TendmLoaiBaoDuong}}
        </td>
        <td class="text-center" *ngFor="let newItem of item.listItemTheoThoiGian" [style.backgroundColor]="newItem.Mau">
          {{newItem.isChon?'X':''}}
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
