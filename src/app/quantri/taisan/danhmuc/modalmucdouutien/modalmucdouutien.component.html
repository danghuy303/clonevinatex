<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
    <!-- <span class="p-button-sm p-button-sm p-button-text close" aria-hidden="true"
    (click)="activeModal.dismiss('Cross click')">×</span> -->
</div>
<div class="modal-body">
    <div class="col-12 col-lg-12">
        <div class="p-d-flex p-flex-row p-jc-between">
            <div class="modal-bt p-mb-4 ">
                <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                    (click)="activeModal.dismiss()"></button>
                <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                    (click)="GhiLai()"></button>
            </div>
        </div>
        <div class="p-grid">
            <div class="p-col-12 p-lg-6  p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Mã </label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-3 p-mb-4 p-p-3 d-flex flex-column flex-xl-row ">
                <label class="p-col-12 p-lg-5 p-p-0 my-auto">Thứ tự </label>
                <div class="p-col-12 p-lg-7 p-p-0">
                    <p-inputNumber [minFractionDigits]="0" locale="en-EN" [(ngModel)]="item.ThuTu">
                    </p-inputNumber>
                </div>
            </div>
            <div class="p-col-12 p-lg-2  p-p-3 d-flex flex-column flex-xl-row ">
                <div class="p-field-checkbox ">
                    <p-checkbox [(ngModel)]="item.isHoatDong" binary="true" inputId="binary"></p-checkbox>
                    <label for="binary">Hoạt động </label>
                </div>
            </div>
            <div class="p-col-12 p-lg-12  p-p-3 d-flex flex-column flex-xl-row ">
                <label class="p-col-12 p-lg-1 p-p-0 my-auto">Tên </label>
                <div class="p-col-12 p-lg-11 p-p-0">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ten" pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-12  p-p-3 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-1 p-p-0 my-auto">Ghi chú</label>
                <div class="p-col-12 p-lg-11 p-p-0">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.GhiChu" pInputText />
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-footer">
    <!-- <button pButton pRipple label="Lưu" icon="pi pi-save" class="p-button-sm p-mr-2" (click)="GhiLai()" ></button>
<button pButton pRipple label="Đóng" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"
    (click)="activeModal.dismiss()"></button> -->
</div>
