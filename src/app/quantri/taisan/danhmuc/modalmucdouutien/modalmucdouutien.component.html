<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
    <!-- <span class="p-button-sm p-button-sm p-button-text close" aria-hidden="true"
    (click)="activeModal.dismiss('Cross click')">×</span> -->
</div>
<div class="modal-body">
    <div class="col-12 col-lg-12">
        <div class="p-d-flex p-flex-row p-jc-between">
            <!-- <div class="modal-bt p-mb-4 ">
                <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                    (click)="activeModal.dismiss()"></button>
                <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                    (click)="GhiLai()"></button>
            </div> -->
        </div>
        <div class="p-grid">
            <div class="p-col-12 p-lg-6   d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Mã:<span class="text-danger">(*)</span> : </label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-3 p-p-0 my-auto"></label>
                <div class="p-col-12 p-lg-9 p-p-0">
                    <p-checkbox class="p-mr-2" [(ngModel)]="item.isHoatDong" binary="true" inputId="binary">
                    </p-checkbox>
                    <label class="p-m-0" for="binary">Hoạt động </label>
                </div>
            </div>
            <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row ">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Tên: <span class="text-danger">(*)</span>: </label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ten" pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-6 d-flex flex-column flex-xl-row ">
                <label class="p-col-12 p-lg-3 p-p-0 my-auto">Thứ tự: <span class="required">(*)</span> </label>
                <div class="p-col-12 p-lg-9 p-p-0">
                    <!-- <p-inputNumber [minFractionDigits]="0" [min]="0" [maxFractionDigits]="0" [(ngModel)]="item.ThuTu" > 
                    </p-inputNumber> -->
                    <input min='0' type="number" class="p-inputtext-sm" [(ngModel)]="item.ThuTu"
                        onkeypress="return (event.charCode == 8 || event.charCode == 0) ? null : event.charCode >= 48 && event.charCode <= 57"
                        pInputText>

                </div>
            </div>
            <div class="p-col-12 p-lg-12   d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-1 p-p-0 my-auto">Ghi chú</label>
                <div class="p-col-12 p-lg-11 p-p-0">
                    <textarea pInputTextarea class="p-inputtext-sm" [(ngModel)]="item.GhiChu"></textarea>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-footer p-d-flex p-flex-column p-flex-sm-row p-jc-end p-mb-3">
    <button pButton pRipple label="Đóng" class="p-button-sm p-mr-2 p-button-secondary"
        (click)="activeModal.dismiss()"></button>
    <button pButton pRipple label="Chấp nhận" icon="pi pi-save" class="p-button-sm p-mr-2" (click)="GhiLai()"></button>
</div>
