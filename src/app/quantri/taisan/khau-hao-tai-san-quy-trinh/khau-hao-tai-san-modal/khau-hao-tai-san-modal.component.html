<div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}}
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span> {{item.Created|date:"dd/MM/yyyy HH:mm"}}
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span> {{item.Modified|date:"dd/MM/yyyy HH:mm"}}
        </div>
    </div>
</div>

<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm " (click)="GhiLai()"
                *ngIf="checkbutton.Ghi"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton pRipple type="button" label="Không duyệt" class="p-mr-2 p-button-sm" (click)="KhongDuyet()"
                *ngIf="checkbutton.KhongDuyet"></button>
            <button pButton pRipple type="button" label="Chuyển tiếp" class="p-mr-2 p-button-sm" (click)="ChuyenDuyet()"
                *ngIf="checkbutton.ChuyenTiep"></button>
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Bộ phận sử dụng <span class="required">*</span>:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <p-dropdown [filter]="true" [options]="listdmPhanXuong" (onChange)="ChonLoaiTaiSan()" placeholder="Bộ phận sử dụng"
                    styleClass="p-inputtext-sm" [(ngModel)]="item.IdBoPhanSuDung"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-3 p-p-0 my-auto">Ngày<span class="required">*</span></label>
            <div class="p-col-12 p-lg-9 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm"
                    [showIcon]="true" [(ngModel)]="item.Ngay" [minDate]="minDate"
                    inputId="icon" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0">Nội dung</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-3 p-p-0">Ghi chú</label>
            <div class="p-col-12 p-lg-9 p-p-0">
                <textarea pInputTextarea [(ngModel)]="item.GhiChu"></textarea>
            </div>
        </div>
        <div class="p-field-checkbox p-d-flex p-ai-center p-px-3">
            <p-checkbox [(ngModel)]="item.IsTatCa" binary="true" inputId="binary"></p-checkbox>
            <label class="p-mb-0 p-ml-2" for="binary">Khấu hao tất cả tài sản</label>
        </div>
    </div>
    <p-panel header="Tài sản" [toggleable]="true" *ngIf="!item.IsTatCa">
        <div class="p-d-flex p-flex-row p-jc-between">
            <div class="modal-bt p-my-3">
                <button pButton pRipple type="button" label="Thêm tài sản" class="p-mr-2 p-button-sm "
                    (click)="ThemMoiDanhSachTaiSan()" *ngIf="tabTrangThai===0"></button>
            </div>
        </div>

        <p-table [value]="item.listTaiSan" styleClass="p-datatable-sm p-datatable-gridlines">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width: 50px">
                    <col>
                    <col>
                    <col>
                    <col>
                    <col>
                    <col>
                    <col style="width: 50px" *ngIf="tabTrangThai===0">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center" rowspan="2">STT</th>
                    <th class="text-center" rowspan="2">Mã</th>
                    <th class="text-center" rowspan="2">Tên</th>
                    <th class="text-center" rowspan="2">Giá trị đầu năm (VNĐ)</th>
                    <th class="text-center" colspan="2">Giá trị sau khấu hao (VNĐ)</th>
                    <th class="text-center" rowspan="2">Ghi chú</th>
                    <th *ngIf="tabTrangThai===0" rowspan="2"></th>
                </tr>
                <tr>
                    <th class="text-center">Theo hệ thống</th>
                    <th class="text-center">Thực tế</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item>
                <tr>
                    <td class="text-center">{{item.STT}}</td>
                    <td class="text-center">
                        {{item.MaTaiSan}}
                    </td>
                    <td>{{item.TenTaiSan}}</td>
                    <td>
                        <p-inputNumber [minFractionDigits]="0" locale="en-EN" [disabled]="true" [(ngModel)]="item.GiaTriTruocKhauHao">
                        </p-inputNumber>
                    </td>
                    <td>
                        <p-inputNumber [minFractionDigits]="0" locale="en-EN" [disabled]="true" [(ngModel)]="item.GiaTriConLaiTheoHeThong">
                        </p-inputNumber>
                    </td>
                    <td [style.backgroundColor]="item.GiaTriConLai>item.GiaTriTruocKhauHao?'red':null">
                        <p-inputNumber [minFractionDigits]="0" locale="en-EN" [(ngModel)]="item.GiaTriConLai">
                        </p-inputNumber>
                    </td>
                    <td>
                        <input type="text" class="p-inputtext-sm" [(ngModel)]="item.GhiChu" [ngbTooltip]="item.GhiChu" pInputText />
                    </td>
                    <td class="text-center" *ngIf="tabTrangThai===0">
                        <button pButton pRipple type="button" icon="pi pi-trash"
                            class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Xóa"
                            (click)="XoaTaiSan(item.STT)"></button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </p-panel>
</div>
