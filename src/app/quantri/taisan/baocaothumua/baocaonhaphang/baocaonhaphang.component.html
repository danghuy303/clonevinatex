<h4 class="title" style="color:#1f2779">
    BÁO CÁO NHẬP HÀNG
</h4>
<div class="p-d-flex p-flex-column p-flex-sm-row p-jc-between p-mb-3">
    <div class="p-d-flex p-flex-row">
        <button pButton label="Xuất excel" pRipple class="p-button-sm p-mr-2" (click)="export()"></button>
    </div>
    <div class="p-d-flex p-flex-row">
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listDuAn" placeholder="Chọn dự án" class="p-inputtext-sm"
                [(ngModel)]="filter.IdDuAn" [showClear]="true" (onChange)="handleDuAn($event.value)"></p-dropdown>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listKho" placeholder="Chọn kho" class="p-inputtext-sm"
                [(ngModel)]="filter.IddmKho" [showClear]="true" (onChange)="GetList(true)"></p-dropdown>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listNhaCungUng" placeholder="Chọn ncc" class="p-inputtext-sm"
                [(ngModel)]="filter.IddmNhaCungUng" [showClear]="true" (onChange)="GetList(true)"></p-dropdown>
        </div>
        <div class="p-mr-2">
            <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                [(ngModel)]="filter.TuNgay" [maxDate]="filter.DenNgay" inputId="icon" placeholder="Từ ngày"
                (onSelect)="GetList(true)">
            </p-calendar>
        </div>
        <div class="p-mr-2">
            <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                [(ngModel)]="filter.DenNgay" [minDate]="filter.TuNgay" inputId="icon" placeholder="Đến ngày"
                (onSelect)="GetList(true)">
            </p-calendar>
        </div>
        <div class="p-inputgroup" style="width:200px">
            <input type="text" placeholder="Tìm kiếm" [(ngModel)]="filter.Keyword" (keyup.enter)="GetList(true)"
                class="p-inputtext-sm" pInputText />
            <button type="button" pButton pRipple icon="pi pi-search"
                class="p-button-secondary p-button-sm p-button-text" (click)="GetList(true)"></button>
            <button type="button" pButton pRipple icon="pi pi-refresh"
                class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
        </div>
    </div>
</div>

<div class="sticky-table p-pt-3" appStickycolumn [fixedIndex]="0">
    <table style="width: 100%;">
        <thead>
            <tr *ngFor="let eleHead of item.listHeader; let i=index">
                <th [style]="{'min-width':x.DoRong,'max-width':x.DoRong,'text-align':'center'}"
                    *ngFor="let x of eleHead.Header" [attr.rowspan]="x.rowspan" [attr.colspan]="x.colspan">
                    {{x.name}}</th>
            </tr>
        </thead>
        <tbody>
            <ng-container *ngTemplateOutlet="recursiveTable; context:{ rowData: item.listData }"></ng-container>
        </tbody>
    </table>
    <ng-template #recursiveTable let-rowData="rowData">
        <ng-container *ngFor="let item of rowData">
            <tr class="">
                <td *ngFor="let data of item.data.RowData; let index=index">
                    <div class="flex align-items-center" [appMarginleft]="data.isTree?item.data.level:0">
                        <Span (click)="toggleChildren(item)" *ngIf="item.children.length && data.isTree"><i
                                [style]="{'margin-right':'8px'}"
                                [ngClass]="item.showChildren?'pi pi-chevron-down' : 'pi pi-chevron-right'"></i>
                        </Span>
                        <div *ngIf="data.DinhDang === 'float'"
                            [style]="{width:'100%', 'text-align':data.Horizontal}">
                            {{data.GiaTri | number:'0.0-0'}}
                        </div>
                        <div *ngIf="data.DinhDang !== 'float'" [style]="{width:'100%','text-align':data.Horizontal}">
                            {{data.GiaTri}}
                        </div>
                    </div>
                </td>

            </tr>
            <ng-container *ngIf="item.showChildren">
                <ng-container *ngTemplateOutlet="recursiveTable; context:{ rowData: item.children }"></ng-container>
            </ng-container>
        </ng-container>
    </ng-template>
</div>

<div class="d-flex align-items-center justify-content-between">
    Tổng số bản ghi {{paging.TotalCount}}.
    <p-paginator #paginator [totalRecords]="paging.TotalCount" [rows]="20" (onPageChange)="changePage($event)">
    </p-paginator>
</div>
