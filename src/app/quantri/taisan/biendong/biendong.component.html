<p-table [value]="listItems" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm" [scrollable]="true">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width:50px">
            <col style="width: 200px;">
            <col style="width: 200px;">
            <col style="width: 200px;">
            <col style="width: 200px;">
            <col style="width: 200px;">  
            <!-- <col style="width: 200px;">            -->
            <!-- <col style="width: 100px;"> -->
        </colgroup>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th class="text-center">STT</th>
            <th>Loại biến động</th>
            <th>Nhà máy </th>
            <th>Bộ phận </th>       
            <th>Ngày ký</th>
            <th>Nội dung biến động</th>
            <!-- <th>Thao tác</th> -->
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-Chon_Vao let-i="rowIndex">
        <tr>
            <td class="text-center">
                {{i+1}}
            </td>
            <td class="text-center">{{Chon_Vao.LoaiBienDong	}}</td>
            <td class="text-center">{{Chon_Vao.TenNhaMay}}</td>
            <td class="text-center">{{Chon_Vao.TendmPhanXuong}}</td>
            <td class="text-center">{{Chon_Vao.Ngay|date:'dd/MM/yyyy'}}</td>
            <td class="text-center">{{Chon_Vao.NoiDungBienDong}}</td>
            <!-- <td class="text-center"> 
                <button pButton pRipple type="button" icon="pi pi-pencil"
                    class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Chỉnh sửa" (click)="changeParam(item.id)"></button>
            </td> -->
        </tr>
    </ng-template>
    <ng-template pTemplate="summary">
        <div class="p-d-flex p-ai-center p-jc-between"> Tổng số bản ghi {{paging.TotalCount}}.
            <p-paginator #paginator [totalRecords]="paging.TotalCount" [rows]="20" (onPageChange)="changePage($event)">
            </p-paginator>
        </div>
    </ng-template>
</p-table>
