<div class="modal-header">
    <h5 class="modal-title"> Nhập vật tư
    </h5>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-column p-flex-sm-row p-jc-between">
        <div class="p-d-flex p-flex-row">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
    </div>
    <!-- <div class="modal-bt p-mb-4 text-center" style="position: absolute; right: 0;transform: translate(-180%,-25%);"
        [style.visibility]="item.Ma?'visible':'hidden'">
        <qrcode [qrdata]="item.Ma" [width]="100" [errorCorrectionLevel]="'M'" [elementType]="'svg'"></qrcode>
    </div> -->
    <div class="p-grid">
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Loại tài sản <span class="text-danger">(*)</span> : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listLoaiTaiSan" (onChange)="LayMa($event)"
                    placeholder="Chọn loại tài sản" [(ngModel)]="item.IddmLoaiTaiSan" [showClear]="true"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Mã vật tư <span class="text-danger">(*)</span> : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ma" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">

        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nhóm tài sản : </label>
            <div class="p-col-12 p-xl-8 p-p-0 d-flex">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.TendmTaiSan " pInputText disabled />
                <button pButton pRipple icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="ChonTaiSan()"></button>
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Tên vật tư <span class="text-danger">(*)</span> : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Ten" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Số lượng : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-inputNumber [minFractionDigits]="0" locale="en-EN" [min]="0" [(ngModel)]="item.SoLuong">
                </p-inputNumber>
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Model : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.Modem" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Số seri : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.SoSeri" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Đơn vị <span class="text-danger">(*)</span> : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.DonViNangSuat" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Tuổi thọ (tháng) : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-inputNumber [minFractionDigits]="1" locale="en-EN" [min]="0" [(ngModel)]="item.TuoiTho">
                </p-inputNumber>
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Sản lượng (tấn) : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.SanLuong" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Hãng sản xuất : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.HangSanXuat" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nhà cung cấp : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listCungSanXuat" placeholder="Nhập nhà cung cấp"
                    [(ngModel)]="item.IddmNhaCungUng" [showClear]="true"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ngày sản xuất : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                    [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" [(ngModel)]="item.NgayNhap"
                    inputId="icon" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-4  p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian đưa vào sử dụng 
                <span
                *ngIf="IdBoPhanSuDung != null" class="text-danger">(*)</span>: </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                    [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true"
                    [(ngModel)]="item.ThoiGianDuaVaoSuDung" inputId="icon" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
            <div class="p-field-checkbox p-col-12 p-xl-4 p-p-0 my-auto">
                <p-checkbox binary="true" [(ngModel)]="item.isGiaTriCao"></p-checkbox>
                <label>Giá trị cao</label>
            </div>
            <div class="p-field-checkbox p-col-12 p-xl-4 p-p-0 my-auto">
                <p-checkbox (onClick)="isCanDuTru()" binary="true" [(ngModel)]="item.isCanDuTru"></p-checkbox>
                <label>Cần dự trữ</label>
            </div>
            <div *ngIf="item.isCanDuTru" class="p-col-12 p-xl-4 p-p-0 my-auto">
                <p-inputNumber [minFractionDigits]="0" [min]="0" locale="en-EN" [(ngModel)]="item.DuTruToiThieu">
                </p-inputNumber>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ghi chú : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <textarea pInputTextarea class="p-inputtext-sm" [(ngModel)]="item.GhiChu"></textarea>
            </div>
        </div>
        <div class="p-mb-3">
            <app-tai-lieu-danh-sach [item]="item"></app-tai-lieu-danh-sach>
        </div>
    </div>

    <p-panel header="Chi tiết vật tư" [toggleable]="true">
        <ng-template pTemplate="content">
            <p-tabView (onChange)="changeTab($event)">
                <!-- <p-tabPanel header="Lịch bảo dưỡng">
                    <ng-template pTemplate="content">
                        <app-taomoilichbaoduongcopy *ngIf="item.TaiSan !== undefined" [item]="item.TaiSan">
                        </app-taomoilichbaoduongcopy>
                        <app-taomoilichbaoduongcopy *ngIf="item.TaiSan === undefined" [item]="item">
                        </app-taomoilichbaoduongcopy>
                    </ng-template>
                </p-tabPanel> -->
                <p-tabPanel header="Thông số kỹ thuật">
                    <ng-template pTemplate="content">
                        <app-thongsokythuat *ngIf="item.TaiSan !== undefined"
                            [listThongSoKyThuat]="item.TaiSan.listThongSoKyThuat">
                        </app-thongsokythuat>
                        <app-thongsokythuat *ngIf="item.TaiSan === undefined"
                            [listThongSoKyThuat]="item.listThongSoKyThuat">
                        </app-thongsokythuat>
                    </ng-template>
                </p-tabPanel>
                <p-tabPanel header="Thông số an toàn">
                    <ng-template pTemplate="content">
                        <app-antoan *ngIf="item.TaiSan !== undefined" [item]="item.TaiSan.listThongSoAnToan">
                        </app-antoan>
                        <app-antoan *ngIf="item.TaiSan === undefined" [item]="item.listThongSoAnToan"></app-antoan>
                    </ng-template>
                </p-tabPanel>
            </p-tabView>
        </ng-template>
    </p-panel>
</div>
<div class="modal-footer">

</div>
