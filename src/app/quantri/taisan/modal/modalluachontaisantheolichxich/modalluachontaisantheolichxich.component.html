<div class="modal-header">
    <h5 class="modal-title">Lựa chọn tài sản</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-column p-flex-sm-row p-jc-between p-mb-3">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
        <div class="p-d-flex p-flex-row">

                <div style="width:200px; margin-right:10px ;">

                            [(ngModel)]="filter.IddmLoaiTaisan" styleClass="p-inputtext-sm" [showClear]="true"
                            [filter]="true" (onChange)="GetList()">
                        </p-dropdown>
                    </div>
                </div>
            </div>
            <div class="p-inputgroup" style="width:200px">
                <input type="text" placeholder="Tìm kiếm" [(ngModel)]="Keyword" (keyup.enter)="GetList()"
                    class="p-inputtext-sm" pInputText />
                <button type="button" pButton pRipple icon="pi pi-refresh" class="p-button-secondary p-button-text"
                    (click)="resetFilter()" pTooltip="Làm mới" showDelay="1000" tooltipPosition="bottom"></button>
                <button type="button" pButton pRipple icon="pi pi-search" class="p-button-secondary p-button-text"
                    (click)="GetList()" pTooltip="Tìm kiếm" showDelay="1000"
                    tooltipPosition="bottom"></button>
            </div> -->
        </div>
    </div>
    <p-treeTable [value]="items" styleClass="p-treetable p-treetable-caption">
        <ng-template pTemplate="colgroup">
            <!-- <colgroup>
                <col style="width:50px">
                <col>
                <col>               
                <col>  
            </colgroup> -->
        </ng-template>
        <ng-template pTemplate="header" let-columns>
            <tr>
                <th style="width:50px" class="text-center">
                    <p-checkbox [(ngModel)]="checkedAll" binary="false" inputId="binaryall"
                        (onChange)="checkAll($event)"></p-checkbox>
                </th>
                <th class="text-center">Mã</th>
                <th class="text-center">Tên</th>
                <th *ngFor="let dmbd of listdmLoaiBaoDuong" class="text-center">{{dmbd.TendmLoaiBaoDuong}}</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
            <tr>
                <td class="text-center">
                    <!-- *ngIf="rowNode.level===0" -->
                    <p-checkbox [(ngModel)]="rowData.checked" binary="true" inputId="binary" (onChange)="checked()">
                    </p-checkbox>
                </td>
                <td class="text-center">
                    <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
                    {{rowData.Ma}}
                </td>
                <td class="text-center">{{rowData.Ten}}</td>
                <td *ngFor="let datatiem of rowData.listItem" class="text-center"> <input [(ngModel)]="datatiem.Ngay"
                        pInputText /></td>
            </tr>
        </ng-template>
    </p-treeTable>
</div>
<div class="modal-footer">

</div>
