<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="col-12 col-lg-12">
        <div class="p-grid">
            <div class="p-col-12 p-lg-8 d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-3 p-p-0 my-auto">Công đoạn <span class="text-danger">(*)</span> : </label>
                <div class="p-col-12 p-lg-9 p-p-0">
                    <p-dropdown [filter]="true" [options]="listCongDoan" placeholder="Chọn công đoạn"
                        styleClass="p-inputtext-sm" [(ngModel)]="item.IdCongDoan"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 d-flex flex-column flex-xl-row">
                <div class="p-field-checkbox p-col-12 p-p-0 my-auto">
                    <p-checkbox [(ngModel)]="item.isHoatDong" binary="true" inputId="binary"></p-checkbox>
                    <label for="binary">Hoạt động </label>
                </div>
            </div>
            <div class="p-col-12 p-lg-12 d-flex flex-column flex-xl-row ">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Nội dung <span class="text-danger">(*)</span>: </label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText />
                </div>
            </div>
            <div class="p-col-12 p-lg-12 d-flex flex-column flex-xl-row ">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Nhân sự: </label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <p-multiSelect [options]="listUser" [(ngModel)]="item.listIdUser" [filter]="false"
                        [showToggleAll]="true" [maxSelectedLabels]="1" selectedItemsLabel="{0} nhân sự được chọn"
                        display="chip">
                    </p-multiSelect>
                </div>
            </div>
            <div class="p-col-12 p-lg-12   d-flex flex-column flex-xl-row">
                <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú:</label>
                <div class="p-col-12 p-lg-10 p-p-0">
                    <textarea pInputTextarea [(ngModel)]="item.GhiChu"></textarea>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal-footer p-d-flex p-flex-column p-flex-sm-row p-jc-end p-mb-3">
    <button pButton pRipple label="Đóng" class="p-button-sm p-mr-2 p-button-secondary"
        (click)="activeModal.dismiss()"></button>
    <button pButton pRipple label="Chấp nhận" icon="pi pi-save" class="p-button-sm p-mr-2" (click)="GhiLai()"></button>
</div>
