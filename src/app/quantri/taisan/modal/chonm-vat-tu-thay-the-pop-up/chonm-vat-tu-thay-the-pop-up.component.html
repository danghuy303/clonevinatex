<div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between p-mb-3">
        <div>
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
        <div class="p-d-flex p-flex-row"> </div>
    </div>
    <div class="table">
        <p-table [value]="listHienThi" styleClass="p-datatable-gridlines p-datatable-sm wrap-text p-datatable-striped">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width:50px">
                    <col style="width:50px">
                    <col>
                    <col style="width:150px">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th>
                        <p-checkbox [(ngModel)]="checkedAll" (onChange)="checkAll()" binary="true"
                            inputId="binary"></p-checkbox>
                    </th>
                    <th class="text-center">STT</th>
                    <th class="text-center">Tên vật tư</th>
                    <th class="text-center">Số lượng</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center">
                        <p-checkbox [(ngModel)]="item.checked" binary="true" inputId="binary"
                            (onChange)="checkItem()"></p-checkbox>
                    </td>
                    <td class="text-center">
                        {{i + 1 }}
                    </td>
                    <td class=""> {{item.TenTaiSan}} </td>
                    <td class="text-right">
                        {{item.SoLuong}}
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="paginatorleft">

            </ng-template>
        </p-table>
    </div>
</div>
