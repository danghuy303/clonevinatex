<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
    <!-- <span class="p-button-sm p-button-sm p-button-text close" aria-hidden="true"
      (click)="activeModal.dismiss('Cross click')">×</span> -->
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>

        </div>
    </div>
    <div class="col-12 col-lg-12">
        <div class="p-grid">
            <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
                <label class="p-col-12 p-lg-5 p-p-0 my-auto">Thu hồi của bộ phận:</label>
                <div class="p-col-12 p-lg-7 p-p-0">
                    <p-dropdown [filter]="true" [options]="listBoPhan" placeholder="Chọn bộ phận"
                        styleClass="p-inputtext-sm" [(ngModel)]="item.IdBoPhan"></p-dropdown>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
                <label class="p-col-12 p-lg-4 p-p-0 my-auto">Ngày chứng từ:</label>
                <div class="p-col-12 p-lg-8 p-p-0">
                    <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" inputId="icon">
                    </p-calendar>
                </div>
            </div>
            <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-lg-row">
                <label class="p-col-12 p-lg-4 p-p-0 my-auto">Người bàn giao:</label>
                <div class="p-col-12 p-lg-8 p-p-0">
                    <p-inputNumber [minFractionDigits]="" locale="vi-VN" [(ngModel)]="item.NguoiBanGiao">
                    </p-inputNumber>
                </div>
            </div>
        </div>

    </div>
    <p-table [value]="item.listItem|isXoa" styleClass="p-datatable-sm wrap-text p-datatable-striped">
        <ng-template pTemplate="colgroup">
            <colgroup>
                <col style="width:50px">
                <col style="width:300px">
                <col style="width:250px">
                <col style="width:250px">
                <col style="width:250px">
                <col style="width:100px">
            </colgroup>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th>STT</th>
                <th>Tài sản thu hồi</th>
                <th>Số lượng đã cấp</th>
                <th>Số lượng thu hồi</th>
                <th>Lý do thu hồi</th>
                <th style="width: 100px;">Edit</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item let-i="rowIndex">
            <tr>
                <td class="text-center"> {{ 20 * (paging.Page - 1) + i + 1 }}</td>
                <td class="text-center">
                    <p-dropdown [disabled]="!item.edit" [filter]="true" [options]="list" placeholder="Chọn "
                        styleClass="p-inputtext-sm" [(ngModel)]="item.Iddm"></p-dropdown>
                </td>
                <td class="text-center">
                    <p-inputNumber [disabled]="!item.edit" [minFractionDigits]="0" locale="vi-VN"
                        [(ngModel)]="item.DaCap">
                    </p-inputNumber>
                </td>
                <td class="text-center">
                    <p-inputNumber [disabled]="!item.edit" [minFractionDigits]="0" locale="vi-VN"
                        [(ngModel)]="item.ThuHoi">
                    </p-inputNumber>
                </td>
                <td class="text-center">
                    <p-inputNumber [disabled]="!item.edit" [minFractionDigits]="0" locale="vi-VN"
                        [(ngModel)]="item.LyDo">
                    </p-inputNumber>
                </td>
                <td class="text-center">
                    <button pButton pRipple icon="pi pi-trash" *ngIf="!item.edit"
                        class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2" (click)="delete(i)"
                        pTooltip="Xóa" showDelay="1000" tooltipPosition="bottom"></button>
                    <button pButton pRipple icon="pi pi-pencil" *ngIf="!item.edit"
                        class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2"
                        (click)="edit(item)"></button>

                    <button pButton pRipple icon="pi pi-check" *ngIf="item.edit"
                        class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2"
                        (click)="save(item)"></button>
                    <!-- <button pButton pRipple icon="pi pi-times" *ngIf="item.edit"
                  class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2"
                  (click)="xoa(item)"></button> -->
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="footer">
            <tr>
                <td class="text-center"></td>
                <td class="text-center">
                    <p-dropdown [filter]="true" [options]="list" placeholder="Chọn loại" styleClass="p-inputtext-sm"
                        [(ngModel)]="newitem.Iddm"></p-dropdown>
                </td>
                <td class="text-center">
                    <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="newitem.DaThu">
                    </p-inputNumber>
                </td>
                <td class="text-center">
                    <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="newitem.ThuHoi">
                    </p-inputNumber>
                </td>
                <td class="text-center">
                    <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="newitem.LyDo">
                    </p-inputNumber>
                </td>

                <td class="text-center">
                    <button pButton pRipple type="button" icon="pi pi-plus" class="p-button-rounded p-button-sm "
                        (click)="add()">
                    </button>
                </td>
            </tr>

        </ng-template>
    </p-table>
</div>

    <button pButton pRipple label="Đóng" class="p-button-sm p-button-outlined p-button-secondary p-mr-2"

  </div> -->
