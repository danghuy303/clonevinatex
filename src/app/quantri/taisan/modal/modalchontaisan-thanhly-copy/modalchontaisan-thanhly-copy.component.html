<div class="modal-header">
    <h5 class="modal-title">Lựa chọn tài sản</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between p-mb-3">
        <div>
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
        <div class="p-d-flex p-flex-row">
            <div class="p-mr-2 p-inputgroup">
                <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" [(ngModel)]="filter.Keyword" pInputText
                    (keyup.enter)="GetList(true)" />
                    <button type="button" pButton pRipple icon="pi pi-search"
                    class="p-button-secondary p-button-sm p-button-text" (click)="GetList(true)"></button>
                <button type="button" pButton pRipple icon="pi pi-refresh"
                    class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
            </div>
        </div>
    </div>
    <p-treeTable [value]="items" styleClass="p-treetable p-treetable-caption " selectionMode="checkbox" [(selection)]="selectedNodes" [paginator]="true" [rows]="10" >
        <ng-template pTemplate="colgroup">
            <colgroup>
                <col style="width:50px">
                <col>
                <col>
                <col>
                <col>
                <col>
            </colgroup>
        </ng-template>
        <ng-template pTemplate="header" let-columns>
            <tr>
                <!-- <th class="text-center">
                    <p-checkbox [(ngModel)]="checkedAll" binary="false" inputId="binaryall" (onChange)="checkAll($event)"></p-checkbox>  
                </th>                -->
                <th >
                    <p-treeTableHeaderCheckbox [value]="checkAll"></p-treeTableHeaderCheckbox>
                   
                </th>
                <th class="text-center"> Mã</th>
                <th class="text-center">Tên</th>
                <th class="text-center">Nguyên giá (VNĐ)</th>
                <th class="text-center">Giá còn lại (VNĐ)</th>
                <th class="text-center">Ngày nhập</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
            <tr>
                <!-- <td class="text-center">
                    <p-checkbox [(ngModel)]="rowData.checked" binary="true" inputId="binary" (onChange)="checked()">
                    </p-checkbox>
                </td>                -->
                <td>
                    <p-treeTableCheckbox [value]="rowNode"></p-treeTableCheckbox>
                </td>
                <td>
                    <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler>
                    {{rowData.Ma}}
                </td>
                <td>{{rowData.Ten}}</td>
                <td class="text-right">{{rowData.NguyenGia|number:'0.0'}}</td>
                <td class="text-right">{{rowData.GiaTriConLai|number:'0.0'}}</td>
                <td class="text-center">{{rowData.ThoiGianDuaVaoSuDung|date:'dd/MM/yyyy'}}</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="paginatorleft">
            Tổng số bản ghi {{items?.length}}.
        </ng-template>
    </p-treeTable>
</div>
