<div class="modal-header">
    <h5 class="modal-title">Danh sách tài sản</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between p-mb-3">
        <div>
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
        <div class="p-d-flex p-flex-row">
            <div class="p-mr-2 p-inputgroup">
                <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" [(ngModel)]="filter.Keyword" pInputText
                    (keyup.enter)="GetList()" />
                <button type="button" pButton pRipple icon="pi pi-search"
                    class="p-button-secondary p-button-sm p-button-text" (click)="GetList()"></button>
                <button type="button" pButton pRipple icon="pi pi-refresh"
                    class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
            </div>
        </div>
    </div>
    <!-- <div>
        <h5>Tạo mã QR</h5>
        <div class="p-inputgroup" style="width: 200px;">
            <p-inputNumber [(ngModel)]="filter.SoLuong" placeholder="Nhập số lượng QR"></p-inputNumber>
            <button type="button" (click)="TaoQR()" pButton pRipple label="Tạo" styleClass="p-button-warn"></button>
        </div>
    </div> -->
    <div class="table">
        <p-table [value]="items" [paginator]="true" [rows]="20"
            styleClass="p-datatable-gridlines p-datatable-sm wrap-text p-datatable-striped">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width:50px">
                    <col style="width:50px">
                    <col>
                    <col style="width:150px">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th>
                        <!-- <p-checkbox [(ngModel)]="checkedAll" (onChange)="checkAll($event)" binary="true"
                            inputId="binary"></p-checkbox> -->
                    </th>
                    <th class="text-center">STT</th>
                    <th class="text-center">Mã QR</th>
                    <th class="text-center">Trạng thái</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center">
                        <p-checkbox [(ngModel)]="item.checked" binary="true" inputId="binary"
                            (onChange)="checkItem(item)"></p-checkbox>
                    </td>
                    <td class="text-center">
                        {{i + 1 }}
                    </td>
                    <td class="text-center">
                        <div class="d-flex p-jc-center p-ai-center">
                            <qrcode [qrdata]="item.MaQr" [width]="50" [errorCorrectionLevel]="'M'" [elementType]="'svg'">
                            </qrcode>
                        </div>
                    </td>
                    <td class="text-center">
                        {{item.TrangThai}}
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="paginatorleft">
                Tổng số bản ghi {{items.length}}
            </ng-template>
        </p-table>
    </div>
</div>
