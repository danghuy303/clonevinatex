<div class="modal-header">
    <h5 class="modal-title">{{title}}</h5>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}}
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span> {{item.Created|date:"dd/MM/yyyy HH:mm"}}
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span> {{item.Modified|date:"dd/MM/yyyy HH:mm"}}
        </div>
    </div>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm " (click)="GhiLai()"
                *ngIf="checkbutton.Ghi"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton pRipple type="button" label="Không duyệt" class="p-mr-2 p-button-sm" (click)="KhongDuyet()"
                *ngIf="checkbutton.KhongDuyet"></button>
            <button pButton pRipple type="button" label="Chuyển duyệt" class="p-mr-2 p-button-sm"
                (click)="ChuyenDuyet()" *ngIf="checkbutton.ChuyenTiep"></button>
            <button pButton pRipple type="button" label="Kết xuất" *ngIf="canExport" (click)="exportExcel()"
                class="p-mr-2 p-button-sm"></button>
        </div>
        <div class="modal-bt p-mb-4 text-center">
            <qrcode [qrdata]="item.Id" [width]="100" [errorCorrectionLevel]="'M'" [elementType]="'svg'"></qrcode>
        </div>
    </div>
    <!-- phần cha -->
    <app-thongtitaisancha [(item)]="item.TaiSan" [listDonVi]="listDonVi" [listLoaiTaiSan]="listLoaiTaiSan"
        [listTinhTrangTaiSan]="listTinhTrangTaiSan" [listNhaSanXuat]="listNhaSanXuat" [listTinhTrangTaiSan_copy]="listTinhTrangTaiSan_copy" [itemDonVi]="itemDonVi" [opt]="opt" [TaiSanChaCon]="'cha'">
    </app-thongtitaisancha>
    <!-- phần con -->
    <p-panel header="Tài sản" [toggleable]="true">
        <div class="p-d-flex p-flex-row p-jc-between">
            <div class="modal-bt p-mb-4 ">
                <button pButton pRipple type="button" label="Thêm mới" class="p-mr-2 p-button-sm "
                    (click)="ThemMoiTaiSanCon()"></button>
            </div>
        </div>
        <p-table [value]="item.listTaiSan|isXoa" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm"
            [scrollable]="true">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width: 50px;">
                    <col>
                    <col>
                    <col>                
                    <col>
                    <col>                   
                    <col style="width: 150px;">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center">
                        STT
                    </th>
                    <th class="text-center">Mã</th>
                    <th class="text-center">Tên</th>
                    <th class="text-center">Ghi chú</th>                   
                    <th class="text-center">Nguyên giá</th>                    
                    <th class="text-center">Thời gian sử dụng</th>
                    <th></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center">
                        {{i + 1}}
                    </td>
                    <td class="text-center">{{item.Ma}}</td>
                    <td class="text-center">{{item.Ten}}</td>
                    <td class="text-center">{{item.GhiChu}}</td>                    
                    <td class="text-center">{{item.NguyenGia|number:'0.0'}}</td>                   
                    <td class="text-center">{{item.ThoiGianSuDung}}</td>
                    <td class="text-center">
                        <button pButton pRipple type="button" icon="pi pi-pencil"
                            class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Chỉnh sửa"
                            (click)="CapNhatTaiSanCon(item)"></button>
                        <button pButton pRipple type="button" icon="pi pi-align-justify"
                            class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Tạo lịch bảo dưỡng"
                            (click)="TaoLichBaoDuong(item)"></button>                   
                        <button pButton pRipple type="button" icon="pi pi-trash"
                            class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Xóa"
                            (click)="XoaTaiSanCon(item,i)"></button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </p-panel>
</div>
