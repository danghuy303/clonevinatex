    <div class="p-d-flex p-ai-center p-jc-between p-mb-3">
        <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
            (click)="activeModal.dismiss('close')"></button>
        <div></div>
        <div class="p-d-flex p-flex-row">
            <div class="p-mr-2">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                    [(ngModel)]="filter.TuNgay" inputId="icon" placeholder="Từ ngày">
                </p-calendar>
            </div>
            <div class="p-mr-2">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                    [(ngModel)]="filter.DenNgay" inputId="icon" placeholder="Đến ngày">
                </p-calendar>
            </div>
            <div class="p-inputgroup" style="width: 200px;">
                <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText
                    [(ngModel)]="filter.KeyWord" />
                <button type="button" pButton pRipple icon="pi pi-search"
                    class="p-button-secondary p-button-sm p-button-text"></button>
                <button type="button" pButton pRipple icon="pi pi-refresh"
                    class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
            </div>
        </div>
    </div>

    <!-- Phần cha -->
    <div class="p-grid">
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Loại tài sản : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder=""></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Mã tài sản : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Tên tài sản : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Mã QR : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Số lượng : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Model : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Số seri : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Đơn vị năng xuất : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Tuổi thọ : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nước sản xuất : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Hãng sản xuất : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nhà cung cấp : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder=""></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Ngày sản xuất : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-calendar inputStyleClass="p-inputtext-sm bold" [locale]="lang" [monthNavigator]="true"
                    [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" inputId="icon"
                    placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian đưa vào sử dụng: </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm bold" [locale]="lang"
                    [monthNavigator]="true" [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true"
                    inputId="icon" placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Số năm khấu hao : </label>
            <div class="p-col-12 p-xl-8 p-p-0">

        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nguyên giá: </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Giá trị còn lại : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Bộ phận sử dụng : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn bộ phận"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Tài liệu đính kèm : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <div class="p-inputgroup">
                    <input type="text" pInputText class="p-inputtext-sm" [ngModel]="NameFile" disabled>
                    <button type="button" pButton pRipple icon="pi pi-upload"
                        class="p-button-sm p-button-text p-button-secondary" (click)="taiLenFileDinhKem()"></button>
                </div>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <div class="p-field-checkbox p-col-12 p-xl-4 p-p-0 my-auto">
                <p-checkbox name="group1" value="" inputId="ny"></p-checkbox>
                <label for="ny">Giá trị cao</label>
            </div>
            <div class="p-field-checkbox p-col-12 p-xl-4 p-p-0 my-auto">
                <p-checkbox name="group1" value="" inputId="ny"></p-checkbox>
                <label for="ny">Cần dự trữ</label>
            </div>
            <div class="p-col-12 p-xl-4 p-p-0 my-auto">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
       
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Ghi chú : </label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input type="text" class="p-inputtext-sm" pInputText />
            </div>
        </div>
    </div>

    <!-- phần con -->
    <p-panel header="Chi tiết tài sản" [toggleable]="true">
        <ng-template pTemplate="content">
            <p-tabView (onChange)="changeTab($event)">
                <p-tabPanel header="Danh sách tài sản">
                    <ng-template pTemplate="content">
                        <div class="p-d-flex p-flex-row p-jc-between">
                            <div class="modal-bt p-mb-4 ">
                                <button pButton pRipple type="button" label="Thêm mới" class="p-mr-2 p-button-sm"
                                    (click)="ThemMoiTaiSanCon()"></button>
                            </div>
                        </div>
                        <p-table [value]="item.listTaiSan|isXoa"
                            styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm" [scrollable]="true">
                            <ng-template pTemplate="colgroup">
                                <colgroup>
                                    <col style="width: 50px;">
                                    <col>
                                    <col>
                                    <col>
                                    <col>
                                    <col style="width: 150px;">
                                </colgroup>
                            </ng-template>
                            <ng-template pTemplate="header">
                                <tr>
                                    <th class="text-center">
                                        STT
                                    </th>
                                    <th class="text-center">Mã</th>
                                    <th class="text-center">Tên</th>
                                    <th class="text-center">Hãng sản xuất</th>
                                    <th class="text-center">Thời gian sử dụng</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-item let-i="rowIndex">
                                <tr>
                                    <td class="text-center">
                                        {{i + 1}}
                                    </td>
                                    <td class="text-center">{{item.Ma}}</td>
                                    <td class="text-center">{{item.Ten}}</td>
                                    <td class="text-center">{{item.GhiChu}}</td>
                                    <!-- <td class="text-center">{{item.NguyenGia|number:'0.0'}}</td> -->
                                    <td class="text-center">{{item.ThoiGianSuDung}}</td>
                                    <td class="text-center">
                                        <button pButton pRipple type="button" icon="pi pi-pencil"
                                            class="p-button-text p-button-sm p-button-secondary p-mr-2"
                                            pTooltip="Chỉnh sửa" (click)="CapNhatTaiSanCon(item)"></button>
                                        <button pButton pRipple type="button" icon="pi pi-align-justify"
                                            class="p-button-text p-button-sm p-button-secondary p-mr-2"
                                            pTooltip="Tạo lịch bảo dưỡng" (click)="TaoLichBaoDuong(item)"></button>
                                        <button pButton pRipple type="button" icon="pi pi-trash"
                                            class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Xóa"
                                            (click)="XoaTaiSanCon(item,i)"></button>
                                    </td>
                                </tr>
                            </ng-template>
                        </p-table>
                    </ng-template>
                </p-tabPanel>
                <p-tabPanel header="Lịch bảo dưỡng">
                    <ng-template pTemplate="content">
                        <app-lichbaoduongcopy></app-lichbaoduongcopy>
                    </ng-template>
                </p-tabPanel>
                <p-tabPanel header="Thông số kỹ thuật">
                    <ng-template pTemplate="content">
                        <app-thongsokythuat></app-thongsokythuat>
                    </ng-template>
                </p-tabPanel>
                <p-tabPanel header="Thông số an toàn">
                    <ng-template pTemplate="content">
                        <app-antoan></app-antoan>
                    </ng-template>
                </p-tabPanel>
            </p-tabView>
        </ng-template>
    </p-panel>
