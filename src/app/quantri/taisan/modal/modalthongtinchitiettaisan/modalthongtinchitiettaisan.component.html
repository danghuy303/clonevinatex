    <div class="p-d-flex p-ai-center p-jc-between p-mb-3">
        <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
        (click)="activeModal.dismiss('close')"></button>
        <div></div>
        <div class="p-d-flex p-flex-row">
            <div class="p-mr-2">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                    [(ngModel)]="filter.TuNgay" inputId="icon" placeholder="Từ ngày" (onSelect)="GetListBienDongById(true)">
                </p-calendar>
            </div>
            <div class="p-mr-2">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                    [(ngModel)]="filter.DenNgay" inputId="icon" placeholder="Đến ngày" (onSelect)="GetListBienDongById(true)">
                </p-calendar>
            </div>
            <div class="p-inputgroup" style="width: 200px;">
                <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText (keyup.enter)="GetListBienDongById(true)"
                    [(ngModel)]="filter.KeyWord" />
                <button type="button" pButton pRipple icon="pi pi-search"
                    class="p-button-secondary p-button-sm p-button-text" (click)="GetListBienDongById(true)"></button>
                <button type="button" pButton pRipple icon="pi pi-refresh"
                    class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
            </div>
        </div>
    </div>
    <p-tabView (onChange)="changeTab($event)" styleClass="no-content">
        <p-tabPanel header="Thông tin chung">
            <!-- <app-thongtinchung [Du_Lieu_Thong_Tin_Chung]="Du_Lieu_Thong_Tin_Chung" ></app-thongtinchung> -->
            <app-thongtinchung [Du_Lieu_Thong_Tin_Chung]="Du_Lieu_Cha"></app-thongtinchung>
        </p-tabPanel>
        <p-tabPanel header="Biến động">
            <app-biendong [Du_Lieu_Bien_Dong]="Du_Lieu_Cha_Bien_Dong" [Phan_Trang_Bien_Dong]="Phan_Trang_Cha_Bien_Dong"></app-biendong>
        </p-tabPanel>
        <p-tabPanel header="Lịch bảo dưỡng">
            <app-lichbaoduong></app-lichbaoduong>
        </p-tabPanel>
        <p-tabPanel header="Sự cố/Sửa chữa">
            <app-sucosuachua></app-sucosuachua>
        </p-tabPanel>
    </p-tabView>
</div>
