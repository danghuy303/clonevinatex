<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
    <!-- <span class="p-button-sm p-button-sm p-button-text close" aria-hidden="true"
    (click)="activeModal.dismiss('Cross click')">×</span> -->
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Người đăng ký : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.noiDung" pInputText disabled="true" />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Phòng ban : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhongBan" placeholder="Chọn phòng ban"
                    styleClass="p-inputtext-sm"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian xảy ra sự cố : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-calendar inputStyleClass="p-inputtext-sm" [locale]="lang" dateFormat="dd/mm/yy"
                    [yearNavigator]="true" [yearRange]="yearRange" [(ngModel)]="item.ngayBatDau"
                    placeholder="dd/mm/yyyy">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Địa điểm : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.noiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Mô tả sự việc : </label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.noiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Loại sự cố : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listDonVi" placeholder="Chọn loai sự cố"
                    styleClass="p-inputtext-sm"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Mức độ ưu tiên : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listMucDoUuTien" placeholder="Mức độ ưu tiên"
                    styleClass="p-inputtext-sm"></p-dropdown>
            </div>
        </div>
    </div>
    <p-table [value]="items" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm"
        [scrollable]="true">
        <ng-template pTemplate="colgroup">
            <colgroup>
                <col style="width: 50px;">
                <col>
                <col>
                <col>
                <col style="width: 100px;">
            </colgroup>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th class="text-center">
                    STT
                </th>
                <th class="text-center">
                    Người hỗ trợ
                </th>
                <th class="text-center">
                    Thời gian sửa chữa
                </th>
                <th class="text-center">Hướng xử lý dự kiến
                </th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item let-i="rowIndex">
            <!-- <tr>
                <td class="text-center">
                    {{ 20 * (paging.CurrentPage - 1) + i + 1 }}
                </td>
                <td class="text-center">{{item.soQuyTrinh}}</td>
                <td class="text-center">{{item.created|date:'dd/MM/yyyy'}}</td>
                <td class="text-center">{{item.noiDung}}</td>
                <td class="text-center">{{item.tenPhanXuong}}</td>
                <td class="text-center">{{item.ngayBatDau|date:'dd/MM/yyyy'}}</td>
                <td class="text-center">{{item.ngayKetThuc|date:'dd/MM/yyyy'}}</td>
                <td class="text-center" *ngFor="let col of cols">
                    {{item[col.field]}}
                </td>
                <td class="text-center"> 
                    <button pButton pRipple type="button" icon="pi pi-pencil"
                        class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Chỉnh sửa" (click)="changeParam(item.id)"></button>
                </td>
            </tr> -->
        </ng-template>
        <ng-template pTemplate="footer">
            <tr>
                <td>
                </td>
                <td>
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="newTableItem.noiDung" pInputText/>
                </td>
                <td>
                    <p-inputNumber [minFractionDigits]="0" locale="vi-VN" [(ngModel)]="newTableItem.soLuong">
                    </p-inputNumber>
                </td>
                <td>
                    <input type="text" class="p-inputtext-sm" [(ngModel)]="newTableItem.noiDung" pInputText/>
                </td>               
                <td class="text-center">
                    <button pButton pRipple type="button" icon="pi pi-plus" class="p-button-rounded p-button-sm "
                        (click)="add()"></button>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
