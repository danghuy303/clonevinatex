<div class="modal-header">
    <h5 class="modal-title">
        Thông tin chi tiết </h5>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm"
                (click)="ChapNhan()"></button>
        </div>
    </div>
    <div>
        <p-table [value]="listVatTu" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm"
            [scrollable]="true">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width: 50px;">
                    <col style="width: 50px;">
                    <col style="width: 150px;">
                    <col>
                    <col style="width: 100px;">
                    <col style="width: 150px;">
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th class="text-center"></th>
                    <th class="text-center">STT</th>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>Đơn vị</th>
                    <th>Số lượng</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-vattu let-i="rowIndex">
                <tr>
                    <td>
                        <p-checkbox [(ngModel)]="vattu.checked" binary="true"
                            inputId="binary"></p-checkbox>
                    </td>
                    <td class="text-center">{{i + 1}}</td>
                    <td class="text-center">{{vattu.Ma}}</td>
                    <td class="text-center">{{vattu.Ten}}</td>
                    <td class="text-center">{{vattu.DonViTinh}}</td>
                    <td class="text-center">
                        <p-inputNumber locale="en-EN" [(ngModel)]="vattu.SoLuong"></p-inputNumber>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
