<div class="modal-header">
    <h4 style="color:#1f2779">
        Bảo dưỡng thiết bị</h4>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}}
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span> {{item.Created|date:"dd/MM/yyyy HH:mm"}}
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span> {{item.Modified|date:"dd/MM/yyyy HH:mm"}}
        </div>
    </div>

</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" label="Chấp nhận" class="p-mr-2 p-button-sm " (click)="GhiLai()"
                *ngIf="checkbutton.Ghi"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton pRipple type="button" label="Không duyệt" class="p-mr-2 p-button-sm" (click)="KhongDuyet()"
                *ngIf="checkbutton.KhongDuyet"></button>
            <button pButton pRipple type="button" label="Chuyển duyệt" class="p-mr-2 p-button-sm"
                (click)="ChuyenDuyet()" *ngIf="checkbutton.ChuyenTiep"></button>
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Bộ phận sử dụng<span class="required">(*)</span></label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" [(ngModel)]="item.IdBoPhanSuDung"
                    placeholder="Chọn bộ phận"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Loại tài sản<span class="required">(*)</span></label>
            <div class="p-col-12 p-lg-10 p-p-0" >
                <p-dropdown [filter]="true" [options]="listLoaiTaiSan" [(ngModel)]="item.IdDmLoaiTaiSan"
                    placeholder="Chọn loại tài sản" ></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-lg-row">
            <!-- <label class="p-col-12 p-lg-2 p-p-0 my-auto"> Ngày bảo dưỡng<span class="text-danger">(*)</span></label> -->
            <label class="p-col-12 p-lg-2 p-p-0 my-auto"> Ngày</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true"
                    yearRange="2000:2040" [showIcon]="true" inputId="icon" placeholder="dd/mm/yyyy"
                    [(ngModel)]="item.NgayBaoDuong">
                </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Nội dung:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 d-flex flex-column flex-lg-row">
            <label class="p-col-12 p-lg-2 p-p-0 my-auto">Ghi chú:</label>
            <div class="p-col-12 p-lg-10 p-p-0">
                <textarea pInputTextarea [(ngModel)]="item.GhiChu"></textarea>
            </div>
        </div>
    </div>
    
    <p-panel header="Chi tiết tài sản" [toggleable]="true">
        <ng-template pTemplate="content">
            <p-tabView (onChange)="changeTab($event)">

                <!-- panel danh sach tai san -->
                <p-tabPanel header="Danh sách tài sản">
                    <ng-template pTemplate="content">
                        <div class="p-d-flex p-flex-row p-jc-between">
                            <div class="modal-bt p-mb-4 ">
                                <button pButton pRipple type="button" label="Thêm tài sản" class="p-mr-2 p-button-sm"
                                    (click)="ThemMoiDanhSachTaiSan()" pTooltip="Làm mới" showDelay="1000" tooltipPosition="bottom" ></button>
                            </div>
                        </div>
                        <app-taisanbaoduong [items]="item.listTaiSan"></app-taisanbaoduong>
                    </ng-template>
                </p-tabPanel>

                <!-- table nhan cong -->
                <p-tabPanel header="Nhân công">
                    <app-nhancong [items]="item.listNhanCong"></app-nhancong>
                </p-tabPanel>

                <!-- table vat tu -->
                <p-tabPanel header="Vật tư">
                    <ng-template pTemplate="content">
                        <app-vattu [items]="item.listTaiSan"></app-vattu>
                    </ng-template>
                </p-tabPanel>

                <!-- table chi phi khac -->
                <p-tabPanel header="Chi phí khác">
                    <ng-template pTemplate="content">
                        <app-chiphikhac [items]="item.listTaiSan"></app-chiphikhac>
                    </ng-template>
                </p-tabPanel>

            </p-tabView>
        </ng-template>
    </p-panel>
</div>
