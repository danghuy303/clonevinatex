    <div>
        <p-tabView>
            <p-tabPanel header="Thông tin chung">
                <div class="p-grid">
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Bộ phận sử dụng<span
                                class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-dropdown [filter]="true" (onChange)="chonBoPhanSuDung($event.value)"
                                [options]="listPhanXuong" [(ngModel)]="item.IdBoPhanSuDung"
                                placeholder="Chọn bộ phận"></p-dropdown>
                        </div>
                    </div>


                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Loại tài sản<span
                                class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-dropdown [filter]="true" [options]="listLoaiTaiSan" [(ngModel)]="item.IddmLoaiTaiSan"
                                placeholder="Chọn loại tài sản" (onChange)="GetListTaiSanDangSuDung()"></p-dropdown>
                        </div>
                    </div>

                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Tài sản<span class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-dropdown [filter]="true" [options]="listMay" [(ngModel)]="item.IdTaiSan"
                                placeholder="Chọn tài sản" (onChange)="ChonBaoDuong()"></p-dropdown>
                        </div>
                    </div>

                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Ngày kế hoạch<span
                                class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                                style="width: 100%" [(ngModel)]="item.NgayKeHoach" inputId="icon"
                                (onSelect)="ChonBaoDuong()">
                            </p-calendar>
                        </div>
                    </div>
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row"
                        *ngIf="item.IddmLoaiTaiSan && item.IdTaiSan && item.IdBoPhanSuDung && item.NgayKeHoach">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Loại bảo dưỡng<span
                                class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-dropdown [filter]="true" [options]="listTaiSan" [(ngModel)]="item.IdTaiSan_BaoDuong"
                                placeholder="Chọn loại bảo dưỡng" (onChange)="GetDaTa($event.value)"></p-dropdown>
                        </div>
                    </div>
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Ngày bảo dưỡng</label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                                style="width: 100%" [(ngModel)]="item.NgayBaoDuong" inputId="icon">
                            </p-calendar>
                        </div>
                    </div>
                </div>
            </p-tabPanel>
            <p-tabPanel header="Bảo dưỡng">
                <div>
                    <!-- <div class="d-flex">
                        <button pButton pRipple type="button" label="Xác nhận bảo dưỡng" class="p-mr-2 p-button-sm"
                            (click)="XacNhan()"></button>
                        <button pButton pRipple type="button" label="Hoàn thành bảo dưỡng" class="p-mr-2 p-button-sm"
                            (click)="HoanThanh()"></button>
                    </div> -->
                    <div class="p-grid">
                        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
                            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian bắt đầu</label>
                            <div class="p-col-12 p-xl-8 p-p-0">
                                <p-calendar dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true"
                                    yearRange="2000:2040" [showTime]="true" [showIcon]="true" inputId="icon"
                                    placeholder="dd/mm/yyyy" [(ngModel)]="item.NgayBatDau" [maxDate]="item.NgayKetThuc"
                                    [disabled]="checkbutton.XacNhan?true:false">
                                </p-calendar>
                            </div>
                        </div>
                        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
                            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian kết thúc</label>
                            <div class="p-col-12 p-xl-8 p-p-0">
                                <p-calendar dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true"
                                    [disabled]="(item.isKhoiTao==false && item.Id!=null)? true : false"
                                    yearRange="2000:2040" [showTime]="true" [showIcon]="true" inputId="icon"
                                    [minDate]="item.NgayBatDau" placeholder="dd/mm/yyyy" [(ngModel)]="item.NgayKetThuc">
                                </p-calendar>
                            </div>
                        </div>
                        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
                            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Đội/người bảo dưỡng<span
                                    class="required">(*)</span></label>
                            <div class="p-col-12 p-xl-8 p-p-0">
                                <p-dropdown [filter]="true" [options]="listDoiBaoDuong" [(ngModel)]="item.IdDoiBaoDuong"
                                    [disabled]="(item.isKhoiTao==false && item.Id!=null)? true : false"
                                    placeholder="Chọn"></p-dropdown>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p-table [value]="item.listCongViec"
                            styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
                            <ng-template pTemplate="colgroup">
                                <colgroup>
                                    <col style="width: 50px;">
                                    <col>
                                    <col>
                                    <col *ngFor="let x of listCVBaoDuong">
                                </colgroup>
                            </ng-template>
                            <ng-template pTemplate="header">
                                <tr>
                                    <th class="text-center">
                                        STT
                                    </th>
                                    <th class="text-center">Nội dung công việc</th>
                                    <th class="text-center">Vật tư</th>
                                    <th class="text-center" *ngFor="let x of listCVBaoDuong">{{x.Ten}}</th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-baoduong let-i="rowIndex">
                                <tr>
                                    <td class="text-center">{{i + 1}}</td>
                                    <td>{{baoduong.NoiDung}}</td>
                                    <td>
                                        <p-dropdown [filter]="true" [options]="listNoiDungVatTu"
                                            (onChange)="ThayThe(baoduong)" [(ngModel)]="baoduong.IdVatTu"
                                            placeholder="Chọn"></p-dropdown>
                                    </td>
                                    <ng-container *ngFor="let x of listCVBaoDuong">
                                        <td class="text-center">
                                            <!-- <div *ngIf="x.Id === baoduong.IddmLoaiThucHienBaoDuong">
                                                <p-checkbox [(ngModel)]="baoduong.isThucHien" binary="true" [disabled]="baoduong.isThucHien && !checkbutton.ChuyenTiep"
                                                    (onChange)="ThayThe(baoduong)" inputId="binary"></p-checkbox>
                                            </div> -->
                                            <div *ngIf="x.Id === baoduong.IddmLoaiThucHienBaoDuong">
                                                <p-checkbox [(ngModel)]="baoduong.isThucHien" binary="true"
                                                    [disabled]="(item.isKhoiTao==false && item.Id!=null)? true : false"
                                                    (onChange)="ThayThe(baoduong)" inputId="binary"></p-checkbox>
                                            </div>
                                        </td>
                                    </ng-container>
                                </tr>
                            </ng-template>
                        </p-table>
                    </div>
                </div>
            </p-tabPanel>
            <p-tabPanel header="Vật tư">
                <div class="d-flex p-pb-2">
                    <!-- <button *ngIf="(item.Id && isHoanThanhBaoDuong) ? false : item.Id" pButton pRipple type="button" label="Đề xuất cấp vật tư" class="p-mr-2 p-button-sm"
                        (click)="CapVatTu()"></button>
                    <button *ngIf="(item.Id && isHoanThanhBaoDuong) ? false : true" pButton pRipple type="button" label="Chọn vật tư" class="p-mr-2 p-button-sm"
                        (click)="ChonVatTuThayThe()"></button> -->
                    <button *ngIf="(item.isKhoiTao==false && item.Id!=null)? false : true" pButton pRipple type="button"
                        label="Đề xuất cấp vật tư" class="p-mr-2 p-button-sm" (click)="CapVatTu()"></button>
                    <button *ngIf="(item.isKhoiTao==false && item.Id!=null)? false : true" pButton pRipple type="button"
                        label="Chọn vật tư" class="p-mr-2 p-button-sm" (click)="ChonVatTuThayThe()"></button>
                </div>
                <p-table [value]="item.listVatTu"
                    styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
                    <ng-template pTemplate="colgroup">
                        <colgroup>
                            <col style="width: 50px;">
                            <col>
                            <col style="width: 100px;">
                            <col style="width: 150px;">
                            <col style="width: 50px;">
                        </colgroup>
                    </ng-template>
                    <ng-template pTemplate="header">
                        <tr>
                            <th class="text-center">
                                STT
                            </th>
                            <th class="text-center">Nội dung</th>
                            <th class="text-center">ĐVT</th>
                            <th class="text-center">Số lượng</th>
                            <th class="text-center"></th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-baoduong let-i="rowIndex">
                        <tr>
                            <td class="text-center">{{i + 1}}</td>
                            <td>
                                {{baoduong.TenTaiSan}}
                            </td>
                            <td class="text-center">Cái</td>
                            <td>
                                <p-inputNumber [minFractionDigits]="0" locale="en-EN" [(ngModel)]="baoduong.SoLuong">
                                </p-inputNumber>
                            </td>
                            <td>
                                <button pButton pRipple icon="pi pi-trash"
                                    class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2"
                                    (click)="delete(i)" pTooltip="Xóa" showDelay="1000"
                                    tooltipPosition="bottom"></button>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </p-tabPanel>
        </p-tabView>
    </div>
</div>
