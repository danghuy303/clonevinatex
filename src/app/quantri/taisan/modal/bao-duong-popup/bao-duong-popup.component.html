<div class="modal-header">
    <h5 class="modal-title">
        Thông tin chi tiết </h5>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
        </div>
    </div>
    <div>
        <p-tabView>
            <p-tabPanel header="Thông tin chung">
                <div class="p-grid">
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Mã tài sản : </label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <input type="text" class="p-inputtext-sm" [(ngModel)]="item.MaTaiSan" pInputText />
                        </div>
                    </div>
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Tên tài sản : </label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <input type="text" class="p-inputtext-sm" [(ngModel)]="item.TenTaiSan" pInputText />
                        </div>
                    </div>
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Bộ phận sử dụng<span
                                class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-dropdown [filter]="true" [options]="listPhanXuong" [(ngModel)]="item.IdBoPhanSuDung"
                                placeholder="Chọn bộ phận"></p-dropdown>
                        </div>
                    </div>
                    <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
                        <label class="p-col-12 p-xl-2 p-p-0 my-auto">Loại tài sản<span
                                class="required">(*)</span></label>
                        <div class="p-col-12 p-xl-10 p-p-0">
                            <p-dropdown [filter]="true" [options]="listLoaiTaiSan" [(ngModel)]="item.IddmLoaiTaiSan"
                                placeholder="Chọn loại tài sản" (onChange)="GetDaTa($event.value)"></p-dropdown>
                        </div>
                    </div>
                </div>
            </p-tabPanel>
            <p-tabPanel header="Bảo dưỡng">
                <div>
                    <div class="d-flex">
                        <button pButton pRipple type="button" label="Xác nhận bảo dưỡng" class="p-mr-2 p-button-sm"
                            (click)="XacNhan()"></button>
                        <button pButton pRipple type="button" label="Hoàn thành bảo dưỡng" class="p-mr-2 p-button-sm"
                            (click)="HoanThanh()"></button>
                    </div>
                    <div class="p-grid">
                        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
                            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian bắt đầu</label>
                            <div class="p-col-12 p-xl-8 p-p-0">
                                <p-calendar dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true"
                                    yearRange="2000:2040" [showIcon]="true" inputId="icon" placeholder="dd/mm/yyyy"
                                    [(ngModel)]="item.ThoiGianBatDau">
                                </p-calendar>
                            </div>
                        </div>
                        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
                            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Thời gian kết thúc</label>
                            <div class="p-col-12 p-xl-8 p-p-0">
                                <p-calendar dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true"
                                    yearRange="2000:2040" [showIcon]="true" inputId="icon" placeholder="dd/mm/yyyy"
                                    [(ngModel)]="item.ThoiGianKetThuc">
                                </p-calendar>
                            </div>
                        </div>
                        <div class="p-col-12 p-lg-4 p-p-3 d-flex flex-column flex-xl-row">
                            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Đội/người bảo dưỡng</label>
                            <div class="p-col-12 p-xl-8 p-p-0">
                                <p-dropdown [filter]="true" [options]="listDoiBaoDuong" [(ngModel)]="item.IdDoiBaoDuong"
                                    placeholder="Chọn"></p-dropdown>
                            </div>
                        </div>
                    </div>
                    <div>
                        <p-table [value]="item.listCongViec"
                            styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm" [scrollable]="true">
                            <ng-template pTemplate="colgroup">
                                <colgroup>
                                    <col style="width: 50px;">
                                    <col>
                                    <col *ngFor="let x of listCVBaoDuong">
                                </colgroup>
                            </ng-template>
                            <ng-template pTemplate="header">
                                <tr>
                                    <th class="text-center">
                                        STT
                                    </th>
                                    <th class="text-center">Nội dung công việc</th>
                                    <th class="text-center" *ngFor="let x of listCVBaoDuong">{{x.Ten}}</th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-baoduong let-i="rowIndex">
                                <tr>
                                    <td class="text-center">{{i + 1}}</td>
                                    <td>{{baoduong.TenVatTu}}</td>
                                    <ng-container *ngFor="let x of listCVBaoDuong">
                                        <td class="text-center">
                                            <div *ngIf="x.Id === baoduong.IddmLoaiThucHienBaoDuong">
                                                <p-checkbox [(ngModel)]="baoduong.isThucHien" binary="true"
                                                    inputId="binary"></p-checkbox>
                                            </div>
                                        </td>
                                    </ng-container>
                                </tr>
                            </ng-template>
                        </p-table>
                    </div>
                </div>
            </p-tabPanel>
            <p-tabPanel header="Vật tư">
            </p-tabPanel>
        </p-tabView>
    </div>

</div>
