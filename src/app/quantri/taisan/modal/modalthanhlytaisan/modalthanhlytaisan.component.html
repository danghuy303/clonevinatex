<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}}
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span> {{item.Created|date:"dd/MM/yyyy HH:mm"}}
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span> {{item.Modified|date:"dd/MM/yyyy HH:mm"}}
        </div>
    </div>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple *ngIf="checkbutton.Ghi" type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton *ngIf="checkbutton.ChuyenTiep" pRipple type="button" label="Chuyển duyệt"
                class="p-mr-2 p-button-sm " (click)="ChapNhan()"></button>
            <button pButton *ngIf="checkbutton.KhongDuyet" pRipple type="button" label="Không duyệt"
                class="p-mr-2 p-button-sm " (click)="KhongDuyet()"></button>
        </div>
    </div>
    <div class="p-grid">
        <!-- <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Ngày thanh lý:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [monthNavigator]="true"
                [yearNavigator]="true" [yearRange]="yearRange" [showIcon]="true" [(ngModel)]="item.NgayThanhLy"
                inputId="icon" placeholder="dd/mm/yyyy">
            </p-calendar>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Người thanh lý:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <input locale="en-EN" [(ngModel)]="item.NguoiThanhLy" pInputText />
            </div>
        </div> -->
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Bộ phận sử dụng:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <p-dropdown [filter]="true" [options]="" placeholder="Chọn bộ phận"></p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-4 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-3 p-p-0 my-auto">Tài liệu đính kèm:</label>
            <div class="p-col-12 p-lg-9 p-p-0">
                <div class="p-inputgroup">
                    <input type="text" pInputText class="p-inputtext-sm" [ngModel]="NameFile" disabled>
                    <button type="button" pButton pRipple icon="pi pi-upload"
                        class="p-button-sm p-button-text p-button-secondary" (click)="taiLenFileDinhKem()"></button>
                    <!-- <button type="button" pButton pRipple icon="pi pi-download" class="p-button-sm p-button-text p-button-secondary"
                        (click)="taiXuongFileDinhKem()"></button> -->
                </div>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Lý do:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-3 p-p-0 my-auto">Ghi chú:</label>
            <div class="p-col-12 p-xl-9 p-p-0">
                <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText />
            </div>
        </div>
    </div>
   
    <p-panel header="Tài sản" [toggleable]="true">
        <div class="p-d-flex p-flex-row p-jc-between">
            <div class="modal-bt p-mb-4 ">
                <button pButton pRipple type="button" label="Thêm tài sản" class="p-mr-2 p-button-sm "
                    (click)="ThemMoiDanhSachTaiSan()"></button>
            </div>
        </div>
        <p-table [value]="item.listTaiSan|isXoa" styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm"
            [scrollable]="true">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width: 50px;">
                    <col>
                    <col>                    
                    <col>
                    <col>
                    <col>
                    <!-- <col style="width: 100px;"> -->
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th>STT</th>
                    <th>Mã</th>
                    <th>Tên</th>
                    <!-- <th>Số seri</th>
                    <th>Số lượng</th> -->
                    <th>Giá trị còn lại</th>
                    <th>Giá trị thanh lý </th>
                    <th>Ghi chú</th>
                    <!-- <th style="width: 100px;">Thao tác</th> -->
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center"> {{ i + 1 }}</td>
                    <td class="text-center">
                        {{item.TaiSan.Ma}}
                    </td>
                    <td class="text-center">
                        {{item.TaiSan.Ten}}
                        <!-- <p-dropdown [disabled]="!item.edit" [filter]="true" [options]="listdsTaiSan" placeholder="Chọn "
                            styleClass="p-inputtext-sm" [(ngModel)]="item.IdTaiSan"></p-dropdown> -->
                    </td>
                    <td class="text-center">
                        
                    </td>
                    <td class="text-center">
                        <p-inputNumber [minFractionDigits]="0" locale="en-EN" [(ngModel)]="item.GiaTriThanhLy">
                        </p-inputNumber>
                    </td>
                    <td class="text-center">
                        <input type="text" class="p-inputtext-sm" [(ngModel)]="item.NoiDung" pInputText />
                    </td>
                    <!-- <td class="text-center">
                        <button pButton pRipple icon="pi pi-trash" *ngIf="!item.edit"
                            class="p-button-sm p-button-rounded p-button-secondary p-button-text p-mr-2" (click)="delete(i)"
                            pTooltip="Xóa" showDelay="1000" tooltipPosition="bottom"></button>
                    </td> -->
                </tr>
            </ng-template>
        </p-table>
    </p-panel>
</div>
