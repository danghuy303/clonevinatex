<div class="modal-header">
    <h5 class="modal-title">Lựa chọn tài sản</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between p-mb-3">
        <div>
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm"
                (click)="activeModal.dismiss('close')"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
        <div class="p-d-flex p-flex-row">
            <div class="p-mr-2">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" inputId="icon"
                    placeholder="Từ ngày" (onSelect)="GetList()" [(ngModel)]="filter.TuNgay">
                </p-calendar>
            </div>
            <div class="p-mr-2">
                <p-calendar dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" inputId="icon"
                    placeholder="Đến ngày" (onSelect)="GetList()" [(ngModel)]="filter.DenNgay">
                </p-calendar>
            </div>
            <div class="p-mr-2 p-inputgroup">
                <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" [(ngModel)]="filter.Keyword" pInputText
                    (keyup.enter)="GetList()" />
                <button type="button" pButton pRipple icon="pi pi-search"
                    class="p-button-secondary p-button-sm p-button-text" (click)="GetList()"></button>
                <button type="button" pButton pRipple icon="pi pi-refresh"
                    class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
            </div>
        </div>
    </div>
    <p-treeTable [value]="items" styleClass="p-treetable p-treetable-caption" [paginator]="true" [rows]="10">
        <ng-template pTemplate="header" let-columns>
            <tr>
                <th style="width:50px" class="text-center">
                    <p-checkbox [(ngModel)]="checkedAll" binary="false" inputId="binaryall"
                        (onChange)="checkAll($event)"></p-checkbox>
                </th>
                <th class="text-center" style="width: 150px;">Mã</th>
                <th class="text-center">Tên</th>
                <th class="text-center">Loại bảo dưỡng</th>
                <th class="text-center">Thời gian kế hoạch</th>
                <th class="text-center">Ghi chú</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
            <tr>
                <td class="text-center">
                    <p-checkbox [(ngModel)]="rowData.checked" binary="true" inputId="binary"
                        (onChange)="checked(rowData.checked,rowData.IdTaiSan_BaoDuong)">
                    </p-checkbox>
                </td>
                <td style="width: 150px;">
                    <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler> {{rowData.MadmLoaiBaoDuong}}
                </td>
                <td>{{rowData.TenTaiSan}}</td>
                <td> {{rowData.TendmLoaiBaoDuong}}</td>
                <td class="text-center"> {{rowData.ThoiGianKeHoach | date: 'dd/MM/yyyy'}}</td>
                <td>{{rowData.GhiChu}}</td>
            </tr>
        </ng-template>
        <!-- <ng-template pTemplate="summary">
            <div class="p-d-flex p-ai-center p-jc-between">
                Tổng số bản ghi {{paging.TotalCount}}.
                <p-paginator #paginator [totalRecords]="paging.TotalCount" [rows]="10"
                    (onPageChange)="changePage($event)">
                </p-paginator>
            </div>
        </ng-template> -->
        <ng-template pTemplate="paginatorleft">
            <span><b>
                    Tổng số bản ghi {{paging.TotalCount}}.
                </b></span>
            <!-- <button type="button" pButton icon="pi-cloud-upload"></button> -->
        </ng-template>
    </p-treeTable>
</div>
<div class="modal-footer">
</div>
