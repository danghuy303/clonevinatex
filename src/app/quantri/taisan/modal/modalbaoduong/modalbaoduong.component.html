<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>

</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-5 p-p-0 my-auto">Mã:</label>
            <div class="p-col-12 p-xl-7 p-p-0">
                <input locale="en-EN" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-7 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Tên:</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input locale="en-EN" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Loại tài sản :</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <p-dropdown [filter]="true" [options]="" placeholder="Chọn loại tài sản" styleClass="p-inputtext-sm">
                </p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Nội dung:</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input locale="en-EN" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Thời gian và số người thực hiện theo NCC:</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input locale="en-EN" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Thời gian và số người thực hiện theo thực tế:</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input locale="en-EN" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Ghi chú:</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input locale="en-EN" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Lịch bảo dưỡng:</label>
            <div class="p-col-12 p-xl-10 p-p-0 d-flex flex-column flex-xl-row">
                <div class="p-col-12 p-xl-12 p-p-0 d-flex flex-column flex-xl-row">
                    <div class="p-col-12 p-xl-2 p-p-0">
                        <div class="field-radiobutton">
                            <p-radioButton name="city" inputId="city1"></p-radioButton>
                            <label class="city" for="city1">Ngày</label>
                        </div>
                    </div>
                    <div class="p-col-12 p-xl-2 p-p-0">
                        <div class="field-radiobutton">
                            <p-radioButton name="city" inputId="city1"></p-radioButton>
                            <label class="city" for="city1">Tuần</label>
                        </div>
                    </div>
                    <div class="p-col-12 p-xl-2 p-p-0">
                        <div class="field-radiobutton">
                            <p-radioButton name="city" inputId="city1"></p-radioButton>
                            <label class="city" for="city1">Tháng</label>
                        </div>
                    </div>
                    <div class="p-col-12 p-xl-2 p-p-0">
                        <div class="field-radiobutton">
                            <p-radioButton name="city" inputId="city1"></p-radioButton>
                            <label class="city" for="city1">Năm</label>
                        </div>
                    </div>
                    <div class="p-col-12 p-xl-4 p-p-0 d-flex flex-column flex-xl-row">
                        <div class="p-col-12 p-xl-10 p-p-0"><input locale="en-EN" pInputText /> </div>
                        
                        <div  class="p-col-12 p-xl-2 p-p-0" > (tuần)</div>
                       
                    </div>
                </div>
            </div>
        </div>
        <div class="p-col-12 p-lg-5 p-mb-3 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-5 p-p-0 my-auto">Sản lượng:</label>
            <div class="p-col-12 p-xl-7 p-p-0 d-flex flex-column flex-xl-row">
                <input locale="en-EN" pInputText />
                (tấn)

            </div>
        </div>


    </div>
    <div class="modal-footer">

    </div>
