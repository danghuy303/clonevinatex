<div class="p-mb-3 p-mt-3">
    <h4 style="color:#1f2779">Thư viện tài sản</h4>
</div>
<div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <button pButton label="Thêm mới" icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="add()"
       ></button>
    <div></div>
    <div class="p-d-flex p-flex-row">
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn bộ phận sử dụng "
                [(ngModel)]="filter.IdBoPhanSuDung" styleClass="p-inputtext-sm" (onChange)="getList(true)"
                [showClear]="true"></p-dropdown>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listLoaiTaiSan" placeholder="Chọn loại tài sản "
                [(ngModel)]="filter.IddmLoaiTaiSan" styleClass="p-inputtext-sm" (onChange)="getList(true)"
                [showClear]="true"></p-dropdown>
        </div>
        <div class="p-inputgroup" style="width: 200px;">
            <input type="text" placeholder="Tìm kiếm" class="p-inputtext-sm" pInputText (keyup.enter)="getList()"
                [(ngModel)]="filter.Keyword" />
            <button type="button" pButton pRipple icon="pi pi-search"
                class="p-button-secondary p-button-sm p-button-text" (click)="getList(true)"></button>
            <button type="button" pButton pRipple icon="pi pi-refresh"
                class="p-button-secondary p-button-sm p-button-text" (click)="resetFilter()"></button>
        </div>
    </div>
</div>

<p-treeTable [value]="items" styleClass="p-treetable p-treetable-caption">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width:200px">
            <col>
            <col>
            <col>
            <col>
            <col>
            <col>
        </colgroup>
    </ng-template>
    <ng-template pTemplate="header" let-columns>
        <tr>
            <th class="text-center" rowspan="2">Mã</th>
            <th class="text-center" rowspan="2">Tên</th>
            <th class="text-center" rowspan="2">Loại tài sản</th>
            <th class="text-center" rowspan="2">Nước sản xuất</th>
            <th class="text-center" rowspan="2">Hãng sản xuất</th>
            <th class="text-center" rowspan="2">Nguyên giá</th>
            <th class="text-center" rowspan="2">Thao tác</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-rowNode let-rowData="rowData">
        <tr>
            <td>
                <p-treeTableToggler [rowNode]="rowNode"></p-treeTableToggler> {{rowData.Ma}}

            </td>
            <td>{{rowData.Ten}}</td>
            <td>{{rowData.TendmLoaiTaiSan}}</td>
            <td>{{rowData.HangSanXuat}}</td>
            <td>{{rowData.HangSanXuat}}</td>
            <td class="text-right">{{rowData.NguyenGia|number:'0.0'}}</td>
            <td class="text-center">
                <button pButton pRipple type="button" icon="pi pi-pencil"
                    class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Chỉnh sửa"
                    (click)="update(rowData)"></button>
            </td>
        </tr>
    </ng-template>
    <ng-template pTemplate="summary">
        <div class="p-d-flex p-ai-center p-jc-between">
            Tổng số bản ghi {{paging.TotalCount}}.<p-paginator #paginator [totalRecords]="paging.TotalCount" [rows]="20"
                (onPageChange)="changePage($event)"></p-paginator>
        </div>
    </ng-template>
</p-treeTable>
