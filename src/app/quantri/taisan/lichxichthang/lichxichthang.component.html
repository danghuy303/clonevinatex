<div class="p-mb-3 p-mt-3">
    <h4 style="color:#1f2779">Lịch xích tháng</h4>
</div>
<div class="p-d-flex p-ai-center p-jc-between p-mb-3">
  
    <div></div>
    <div class="p-d-flex p-flex-row">
        <div class="p-mr-2">
            <p-calendar dateFormat="mm/yy" view="month" inputStyleClass="p-inputtext-sm" [monthNavigator]="true" [locale]="lang"
            [yearNavigator]="true" [yearRange]="yearRange"  [showIcon]="true" [(ngModel)]="filter.Ngay" (onSelect)="GetList(true)"
            inputId="icon" placeholder="mm/yyyy">
        </p-calendar>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn bộ phận sử dụng "[(ngModel)]="filter.IdBoPhanSuDung" styleClass="p-inputtext-sm"
                [showClear]="true" [filter]="true" (onChange)="GetList(true)"></p-dropdown>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="listLoaiTaiSan" placeholder="Chọn loại tài sản " [(ngModel)]="filter.IddmLoaiTaiSan" styleClass="p-inputtext-sm"
                [showClear]="true" [filter]="true" (onChange)="GetList(true)"></p-dropdown>
        </div>
    </div>
</div>
<div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <div></div>
    <div class="p-mr-2">
        <strong>Tổng số: <span style="color: red;">{{TongSoTaiSan}}</span> thiết bị</strong>
    </div>

</div>

<div class="p-col-12 p-p-0 pintable-container bg-white" style="height: calc(100vh - 250px)" voiPintable [pinnedCols]="1">
    <table>
        <thead>
            <tr>
                <th style="min-width: 200px;max-width: 200px">Loại bảo dưỡng</th>
                <th style="min-width: 150px;max-width: 150px;" *ngFor="let label of labelThang">{{label}}</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of items.listBaoDuong">
                <td style="min-width: 200px;max-width: 200px;background-color: white; cursor: pointer;" (click)="ChiTietBaoDuong(item)">{{item.TendmLoaiBaoDuong}}</td>
                <td style="min-width: 150px;max-width: 150px;background-color: white;" class="text-center" *ngFor="let newItem of item.listItemTheoThoiGian">
                    <a href="javascript:void(0)" *ngFor="let taisan of newItem.listChiTiet"
                        (click)="ChiTietThongTin(taisan)">
                        {{taisan.TenTaiSan}}<br>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
