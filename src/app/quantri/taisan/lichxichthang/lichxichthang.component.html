<div class="p-mb-3 p-mt-3">
    <h4 style="color:#1f2779">Lịch xích tháng</h4>
</div>
<div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <!-- <button pButton lab el="Thêm mới" icon="pi pi-plus" class="p-button-sm p-mr-2" (click)="add()"
        *ngIf="checkQuyen.ThemMoi"></button> -->

    <div></div>
    <div class="p-d-flex p-flex-row">
        <div class="p-mr-2">
            <p-calendar dateFormat="mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                 inputId="icon" placeholder="Chọn tháng, năm" >
            </p-calendar>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="" placeholder="Chọn bộ phận sử dụng " styleClass="p-inputtext-sm"
                [showClear]="true" [filter]="true"></p-dropdown>
        </div>
        <div class="p-mr-2">
            <p-dropdown [filter]="true" [options]="" placeholder="Chọn tài sản " styleClass="p-inputtext-sm"
                [showClear]="true" [filter]="true"></p-dropdown>
        </div>
    </div>
</div>
<div class="p-d-flex p-ai-center p-jc-between p-mb-3">
    <div></div>
    <div class="p-mr-2">
        <p>Tổng số: thiết bị</p>
    </div>

</div>

<p-table styleClass="p-datatable-sm wrap-text p-datatable-striped">
    <ng-template pTemplate="colgroup">
        <colgroup>
            <col style="width:200px">

        </colgroup>
    </ng-template>
    <ng-template pTemplate="header">
        <tr>
            <th class="text-center">Loại bảo dưỡng</th>
            <th *ngFor="let label of labelThang" class="tc-w-100">{{label}}</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item let-i="rowIndex">
        <tr>
            <td class="text-center">

            </td>
            <td></td>
        </tr>
    </ng-template>
</p-table>
