<div class="modal-header">
    <h5 class="modal-title">Danh sách dự án</h5>
</div>

<div class="modal-body">
    <div class="p-d-flex p-ai-center p-jc-between p-mb-3">
        <div>
            <button pButton pRipple type="button" label="Quay lại" class="p-button-outlined p-mr-2"
                (click)="activeModal.dismiss()"></button>
            <p-button label="Chấp nhận" class="p-button-sm" (click)="chapNhan()"></p-button>
        </div>
    </div>
    <div>
        <p-table [value]="listDuAn" styleClass="p-datatable-sm p-datatable-gridlines" [paginator]="true" [rows]="20">
            <ng-template pTemplate="colgroup">
                <colgroup>
                    <col style="width: 50px">
                    <col style="width: 150px">
                    <col>
                </colgroup>
            </ng-template>
            <ng-template pTemplate="header">
                <tr>
                    <th>
                        <p-checkbox [(ngModel)]="checkedAll" binary="true" inputId="binary"
                            (onChange)="CheckAll($event)">
                        </p-checkbox>
                    </th>
                    <th>Mã</th>
                    <th>Tên</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-item let-i="rowIndex">
                <tr>
                    <td class="text-center">
                        <p-checkbox [(ngModel)]="item.checked" binary="true" (onChange)="getCheck()"
                            inputId="binary"></p-checkbox>
                    </td>
                    <td >{{item.MaDuAn}}</td>
                    <td>{{item.TenDuAn}}</td>
                </tr>
            </ng-template>
            <ng-template pTemplate="paginatorleft">
                <b>
                    Tổng số bản ghi {{listDuAn?.length}}.
                </b>
            </ng-template>
        </p-table>
    </div>
</div>
