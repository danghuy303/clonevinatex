<div class="modal-header">
    <h5 class="modal-title">
        {{title}}</h5>
    <div class="d-flex flex-column flex-lg-row">
        <div>
            <span style="font-weight: bold;">Số quy trình:</span> {{item.SoQuyTrinh}}
        </div>
        <div class="ml-lg-3 mr-lg-3">
            <span style="font-weight: bold;">TG Tạo:</span> {{item.Created|date:"dd/MM/yyyy HH:mm"}}
        </div>
        <div>
            <span style="font-weight: bold;">TG Duyệt:</span> {{item.Modified|date:"dd/MM/yyyy HH:mm"}}
        </div>
    </div>
    <button *ngIf="false" type="button" class="close" aria-label="Close" (click)="activeModal.dismiss('Cross click')">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt p-mb-4 ">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple *ngIf="checkbutton.Ghi" type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton *ngIf="checkbutton.ChuyenTiep" pRipple type="button" label="Chuyển duyệt"
                class="p-mr-2 p-button-sm " (click)="ChuyenDuyet()"></button>
            <button pButton *ngIf="checkbutton.KhongDuyet" pRipple type="button" label="Không duyệt"
                class="p-mr-2 p-button-sm " (click)="KhongDuyet()"></button>
        </div>
    </div>
    <div class="p-grid">
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Bộ phận sử dụng <span class="required">(*)</span>:</label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn bộ phận sử dụng" (onChange)="chonBoPhanSD($event)"
                    styleClass="p-inputtext-sm" [showClear]="true" [filter]="true" [(ngModel)]="item.IdBoPhanSuDung">
                </p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Loại sự cố  <span class="required">(*)</span> :</label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listLoaiSuCo" placeholder="Loại sự cố "
                    styleClass="p-inputtext-sm" [showClear]="true" [filter]="true" [(ngModel)]="item.IdDmLoaiSuCo">
                </p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Mức độ ưu tiên  <span class="required">(*)</span> : </label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <p-dropdown [filter]="true" [options]="listDoUuTien" placeholder="Mức độ ưu tiên"
                    styleClass="p-inputtext-sm" [showClear]="true" [filter]="true" [(ngModel)]="item.IdDoUuTien">
                </p-dropdown>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nội dung:</label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <input locale="en-EN" [(ngModel)]="item.NoiDung" pInputText />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Đánh giá tình trạng:</label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <textarea pInputTextarea class="p-inputtext-sm" [(ngModel)]="item.DanhGiaTinhTrang"></textarea>
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-4 p-p-0 my-auto">Nguyên nhân:</label>
            <div class="p-col-12 p-xl-8 p-p-0">
                <textarea pInputTextarea class="p-inputtext-sm" [(ngModel)]="item.NguyenNhan"></textarea>
            </div>
        </div>
        <div class="p-col-12 p-lg-12 p-p-3 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Phương án xử lý:</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <textarea pInputTextarea class="p-inputtext-sm" [(ngModel)]="item.PhuongAnXuLy"></textarea>
            </div>
        </div>
        <div class="p-mb-4">
            <app-tai-lieu-danh-sach [item]="item"></app-tai-lieu-danh-sach>
        </div>
    </div>
    <p-tabView>
        <p-tabPanel header="Danh sách tài sản">
            <ng-template pTemplate="content">
                <div class="p-d-flex p-flex-row p-jc-between">
                    <div class="modal-bt p-mb-2 ">
                        <button pButton pRipple type="button" label="Thêm tài sản" class="p-mr-2 p-button-sm"
                            (click)=" ThemMoiDanhSachTaiSan()"></button>
                    </div>
                </div>
                <p-table [value]="item.listTaiSan"
                    styleClass="p-datatable-customers p-datatable-gridlines p-datatable-sm">
                    <ng-template pTemplate="colgroup">
                        <colgroup>
                            <col style="width: 50px;">
                            <col>
                            <col>
                            <col>
                            <col>
                            <col style="width: 100px;">
                            <col>
                            <col style="width: 50px;">
                        </colgroup>
                    </ng-template>
                    <ng-template pTemplate="header">
                        <tr>
                            <th class="text-center" rowspan="2">
                                STT
                            </th>
                            <th class="text-center" rowspan="2">Mã</th>
                            <th class="text-center" rowspan="2">Tên</th>
                            <th colspan="2">Thời gian sửa chữa</th>
                            <th class="text-center" rowspan="2">Đã sửa chữa</th>
                            <th class="text-center" rowspan="2">Ghi chú</th>
                            <th class="text-center" rowspan="2">Thao tác</th>
                        </tr>
                        <tr>
                            <th>Từ</th>
                            <th>Đến</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-item let-i="rowIndex">
                        <tr>
                            <td class="text-center">
                                {{i + 1}}
                            </td>
                            <td>{{item.Ma}}</td>
                            <td>{{item.TenTaiSan}}</td>
                            <td class="text-center">
                                <p-calendar [showTime]="true" dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm" [showIcon]="true" [maxDate]="item.DenGio"
                                    [(ngModel)]="item.TuGio" inputId="icon">
                                </p-calendar>
                            </td>
                            <td class="text-center">
                                <p-calendar [showTime]="true" dateFormat="dd/mm/yy" inputStyleClass="p-inputtext-sm"
                                    [(ngModel)]="item.DenGio" [minDate]="item.TuGio" [showIcon]="true" inputId="icon" placeholder="Đến">
                                </p-calendar>
                            </td>
                            <td class="text-center">
                                <p-checkbox [(ngModel)]="item.IsXuLy" [binary]="true"></p-checkbox>
                            </td>
                            <td>
                                <input type="text" [(ngModel)]="item.GhiChu" [ngbTooltip]="item.GhiChu" pInputText />
                            </td>
                            <td class="text-center">
                                <button pButton pRipple type="button" icon="pi pi-trash"
                                    class="p-button-text p-button-sm p-button-secondary p-mr-2" pTooltip="Xóa"
                                    (click)=" delete(i)"></button>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </ng-template>
        </p-tabPanel>
        <p-tabPanel header="Nhân công">
            <app-denghixulysuconhancong [listNhanCong]="item.listNhanCong"></app-denghixulysuconhancong>
        </p-tabPanel>
        <p-tabPanel header="Vật tư">
            <ng-template pTemplate="content">
                <app-denghixulysucovattu [items]="item.listTaiSan"></app-denghixulysucovattu>
            </ng-template>
        </p-tabPanel>
        <p-tabPanel header="Chi phí khác">
            <ng-template pTemplate="content">
                <app-denghixulysucochiphikhac [items]="item.listTaiSan"></app-denghixulysucochiphikhac>
            </ng-template>
        </p-tabPanel>
    </p-tabView>
