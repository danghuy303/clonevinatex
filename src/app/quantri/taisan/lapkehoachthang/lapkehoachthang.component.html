<div class="modal-header">
    <app-stepper [title]="'Lập kế hoạch lịch xích tháng'" [quyTrinh]="item" style="width: 100%"></app-stepper>
</div>
<div class="modal-body">
    <div class="p-d-flex p-flex-row p-jc-between">
        <div class="modal-bt">
            <button pButton pRipple type="button" label="Quay lại" class="p-mr-2 p-button-sm "
                (click)="activeModal.dismiss()"></button>
            <button pButton pRipple *ngIf="checkbutton.Ghi" type="button" label="Ghi lại" class="p-mr-2 p-button-sm "
                (click)="GhiLai()"></button>
            <button pButton pRipple type="button" label="Xóa" class="p-mr-2 p-button-sm" *ngIf="checkbutton.Xoa"
                (click)="XoaQuyTrinh()"></button>
            <button pButton *ngIf="checkbutton.ChuyenTiep" pRipple type="button" label="Chuyển duyệt"
                class="p-mr-2 p-button-sm " (click)="ChapNhan()"></button>
            <button pButton *ngIf="checkbutton.KhongDuyet" pRipple type="button" label="Không duyệt"
                class="p-mr-2 p-button-sm " (click)="KhongDuyet()"></button>
        </div>
        <div class="d-flex flex-column flex-lg-row">
            <div>
                <span style="font-weight: bold;">Số quy trình:</span> {{item?.SoQuyTrinh}}
            </div>
            <div class="ml-lg-3 mr-lg-3">
                <span style="font-weight: bold;">TG Tạo:</span> {{item?.Created|date:"dd/MM/yyyy HH:mm"}}
            </div>
            <div>
                <span style="font-weight: bold;">TG Duyệt:</span> {{item?.NgayDuyet|date:"dd/MM/yyyy HH:mm"}}
            </div>
        </div>
    </div>
    <app-chuyenbuoc [(quyTrinh)]="item"></app-chuyenbuoc>

    <div class="p-grid">
        <div class="p-col-12 p-lg-6  p-p-2 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Nội dung</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <input locale="en-EN" pInputText [(ngModel)]="item.NoiDung" />
            </div>
        </div>
        <div class="p-col-12 p-lg-6 p-p-2 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Bộ phận sử dụng <span class="required">(*)</span></label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <p-dropdown [filter]="true" [options]="listPhanXuong" placeholder="Chọn bộ phận"
                    [(ngModel)]="item.IdBoPhanSuDung" (onChange)="ThemMoiDanhSachTaiSan('CHONLAI')"
                    (onShow)="SaveOldVal()"></p-dropdown>
            </div>
        </div>

                <label class="p-col-12 p-xl-2 p-p-0 my-auto">Chọn công đoạn</label>
                <div class="p-col-12 p-xl-10 p-p-0">
                    <p-dropdown #congdoan [filter]="true" [showClear]="true" [options]="listCongDoan"
                        [resetFilterOnHide]="true" [(ngModel)]="item.MaCongDoan" placeholder="Chọn công đoạn"
                        (onChange)="ThemMoiDanhSachTaiSan('CHONLAI')" (onShow)="SaveOldVal()"></p-dropdown>
                </div>
            </div> -->

        <div class="p-col-12 p-lg-6 p-p-2 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-xl-2 p-p-0 my-auto">Ghi chú</label>
            <div class="p-col-12 p-xl-10 p-p-0">
                <textarea pInputTextarea [(ngModel)]="item.GhiChu" placeholder="Ghi chú" [rows]="1"></textarea>
            </div>
        </div>
        <div class="p-col-12 p-lg-2 p-p-2 d-flex flex-column flex-xl-row">
            <label class="p-col-12 p-lg-6 p-p-0 my-auto p-mr-2">Chọn tháng, năm <span
                    class="required">(*)</span></label>
            <div class="p-col-12 p-lg-6 p-p-0">
                <p-calendar dateFormat="mm/yy" view="month" inputStyleClass="p-inputtext-sm" [showIcon]="true"
                    inputId="icon" (onSelect)="ThemMoiDanhSachTaiSan('CHONLAI')" placeholder="Chọn tháng, năm"
                    [locale]="vi" [(ngModel)]="item.ThoiGian" (onFocus)="SaveOldVal()">
                </p-calendar>
            </div>
        </div>
    </div>

    <p-tabView>

                <app-taisanlichxichthang [listTaiSan]="item.listTaiSan" [soNgay]="ngayCuoiCungCuaThangDaChon"

</div>

<div class=" p-mx-3">
    <div class="p-mb-3">
        <p-accordion styleClass="p-accordion-sm">
            <p-accordionTab>
                <ng-template pTemplate="header">
                    <h6 class="">Đánh giá</h6>
                </ng-template>
                <ng-template pTemplate="content">
                    <app-danh-gia [quyTrinh]="item"></app-danh-gia>
                </ng-template>
            </p-accordionTab>
        </p-accordion>
    </div>
    <div class="p-mb-3">
        <p-accordion styleClass="p-accordion-sm">
            <p-accordionTab>
                <ng-template pTemplate="header">
                    <h6 class="">Vướng mắc</h6>
                </ng-template>
                <ng-template pTemplate="content">
                    <app-vuong-mac [quyTrinh]="item"></app-vuong-mac>
                </ng-template>
            </p-accordionTab>
        </p-accordion>
    </div>
    <div class="p-mb-3">
        <p-accordion styleClass="p-accordion-sm">
            <p-accordionTab>
                <ng-template pTemplate="header">
                    <h6 class="">Phân công công việc</h6>
                </ng-template>
                <ng-template pTemplate="content">
                    <app-phan-cong-cong-viec [quyTrinh]="item"></app-phan-cong-cong-viec>
                </ng-template>
            </p-accordionTab>
        </p-accordion>
    </div>
    <div class="p-mb-3">
        <p-accordion styleClass="p-accordion-sm">
            <p-accordionTab>
                <ng-template pTemplate="header">
                    <h6 class="">Danh sách tài liệu</h6>
                </ng-template>
                <ng-template pTemplate="content">
                    <app-danh-sach-tai-lieu></app-danh-sach-tai-lieu>
                </ng-template>
            </p-accordionTab>
        </p-accordion>
    </div>
    <div class="p-mb-3">
        <p-accordion styleClass="p-accordion-sm">
            <p-accordionTab>
                <ng-template pTemplate="header">
                    <h6 class="">Trao đổi / Vướng mắc</h6>
                </ng-template>
                <ng-template pTemplate="content">
                    <app-trao-doi [IdTable]="item.Id" [eAction]="eAction"></app-trao-doi>
                </ng-template>
            </p-accordionTab>
        </p-accordion>
    </div>

</div>
